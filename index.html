<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STREETO</title>
<!-- PWA — installable from phone home screen -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streeto">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --font-header: 'VT323', monospace;
  --font-body:   'Pixelify Sans', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: var(--font-body);
}

#game {
  width: 390px;
  height: 844px;
  position: relative;
  overflow: hidden;
  background: #05080f;
  image-rendering: pixelated;
}

/* ===== SCREENS ===== */
.screen { position:absolute; inset:0; display:none; flex-direction:column; }
.screen.active { display:flex; }

/* ===== STREET BG ===== */
#street-bg {
  position:absolute; inset:0; overflow:hidden;
  background: linear-gradient(180deg, #05060f 0%, #0a0d1e 40%, #111828 60%, #1a1a28 80%, #252525 100%);
}

.stars { position:absolute; top:0; left:0; right:0; height:45%; }
.star { position:absolute; background:#fff; border-radius:50%; animation: twinkle 2s infinite; }
@keyframes twinkle { 0%,100%{opacity:0.4} 50%{opacity:1} }

.horizon {
  position:absolute; top:44%; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, #ff6600 20%, #ff9900 50%, #ff6600 80%, transparent);
  box-shadow: 0 0 20px #ff6600, 0 0 40px #ff4400;
}

.road {
  position:absolute; bottom:0; left:0; right:0; height:56%;
  background: #1a1a20;
}
.road-line {
  position:absolute; left:50%; top:0; width:6px; height:100%;
  transform:translateX(-50%);
  background: repeating-linear-gradient(180deg, #ff6600 0px, #ff6600 40px, transparent 40px, transparent 80px);
  opacity:0.6;
  animation: roadScroll 0.6s linear infinite;
}
@keyframes roadScroll { from{background-position:0 0} to{background-position:0 80px} }

.sidewalk-l, .sidewalk-r {
  position:absolute; top:0; width:80px; height:100%;
  background: #222230;
}
.sidewalk-l { left:0; border-right:3px solid #333340; }
.sidewalk-r { right:0; border-left:3px solid #333340; }

.streetlight {
  position:absolute; bottom:50%; width:6px;
  background: #555;
  border-radius:3px;
}
.streetlight::before {
  content:''; position:absolute; top:-4px; left:-12px;
  width:30px; height:8px;
  background: #666; border-radius:4px 4px 0 0;
}
.streetlight::after {
  content:''; position:absolute; top:-50px; left:-40px;
  width:90px; height:60px;
  background: radial-gradient(ellipse at 50% 100%, rgba(255,180,0,0.35) 0%, transparent 70%);
  pointer-events:none;
}
.streetlight.l { left:55px; height:120px; }
.streetlight.r { right:55px; height:120px; }

/* ===== BUILDINGS ===== */
.building { position:absolute; bottom:44%; image-rendering:pixelated; }

/* ===== CARS ===== */
.car-lane {
  position:absolute; width:100%; height:50px;
  animation: carMove linear infinite;
}
@keyframes carMove {
  from { transform: translateX(-120px); }
  to   { transform: translateX(510px); }
}
.car-block {
  position:absolute; top:8px; height:34px; border-radius:4px;
  image-rendering: pixelated;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  justify-content: center; align-items: center;
  background: #05060e; /* covers shared #street-bg so GIFs sit on clean black */
}

/* Hand-drawn city + sky canvas on top half, hand-drawn perspective road
   canvas on bottom half. Same coordinate system so they blend at the
   centre horizon line. */
#title-city-canvas {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 50%;
  image-rendering: pixelated;
  pointer-events: none;
  z-index: 1;
  display: block;
}
#title-road-canvas {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 50%;
  image-rendering: pixelated;
  pointer-events: none;
  z-index: 1;
  display: block;
}

/* Subtle gradient overlay so the logo stays readable on top of the GIFs */
.title-overlay {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 75%);
  pointer-events: none;
  z-index: 2;
}

.title-wrap {
  z-index:10; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  position: relative; /* needed for z-index above GIFs */
}

.game-logo {
  font-family: var(--font-header);
  font-size: 90px; letter-spacing: 6px;
  color: #ff6600;
  text-shadow: 0 0 10px #ff6600, 0 0 30px #ff4400, 0 0 60px #ff2200,
               4px 4px 0 #7a2200, 8px 8px 0 #3d1100;
  animation: logoPulse 3s ease-in-out infinite;
  line-height:1;
}
@keyframes logoPulse {
  0%,100% { text-shadow: 0 0 10px #ff6600, 0 0 30px #ff4400, 4px 4px 0 #7a2200, 8px 8px 0 #3d1100; }
  50%      { text-shadow: 0 0 20px #ff8800, 0 0 60px #ff6600, 0 0 90px #ff4400, 4px 4px 0 #7a2200, 8px 8px 0 #3d1100; }
}

.subtitle { font-family: var(--font-header); font-size:26px; color:#aaa; letter-spacing:6px; margin-top:2px; }
.tagline  { font-family: var(--font-body);   font-size:16px; color:#ff9944; margin-top:10px; line-height:1.9; text-align:center; }

.tap-prompt {
  font-family: var(--font-header);
  font-size:24px; color:#ff6600; letter-spacing:2px;
  margin-top:40px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ===== CHARACTER SELECT ===== */
#char-select {
  justify-content: flex-start; align-items: stretch;
}

.select-header {
  z-index:10; padding:24px 20px 12px;
  font-family: var(--font-header);
  font-size:28px; color:#ff6600; letter-spacing:3px;
  border-bottom:2px solid #ff660033;
}

.suburb-list {
  z-index:10; flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:8px;
}

.suburb-card {
  background:#0d1224; border:2px solid #1e2a44;
  padding:14px 16px; cursor:pointer;
  transition: border-color 0.1s, background 0.1s;
  display:flex; flex-direction:column; gap:4px;
  image-rendering:pixelated;
}
.suburb-card:hover, .suburb-card:active { border-color:#ff6600; background:#12192e; }
.suburb-card.locked { opacity:0.4; cursor:not-allowed; }

.suburb-name { font-family: var(--font-header); font-size:26px; color:#ff9944; letter-spacing:2px; }
.suburb-desc { font-family: var(--font-body);   font-size:13px; color:#8899aa; line-height:1.6; }
.suburb-rep  { font-family: var(--font-body);   font-size:13px; color:#ff6600; margin-top:2px; }

/* ===== DIALOGUE SCREEN ===== */
#dialogue-screen {
  justify-content: flex-end;
}

.scene-canvas {
  position:absolute; inset:0;
}
/* Animated scene takeover image (e.g. Brenno's engine bay diagnostic GIF).
   Sits above the canvas backdrop, below the dialogue panel.
   Centered horizontally in the top section. */
#scene-overlay-img {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 370px;
  height: 370px;
  image-rendering: pixelated;
  z-index: 5;
  border: 2px solid #ff660088;
  background: #04050e;
  pointer-events: none;
}

.dialogue-panel {
  z-index:20; position:relative;
  background: rgba(5, 10, 20, 0.95);
  border-top: 3px solid #ff6600;
  box-shadow: 0 -10px 40px rgba(255,100,0,0.2);
  padding: 0 0 20px;
  min-height: 320px;
}

.portrait-row {
  display:flex; align-items:flex-end;
  padding: 0 16px;
  gap: 14px;
  margin-top: -70px;
}

.portrait-wrap {
  flex-shrink:0; position:relative;
  width:100px; height:100px;
  border:3px solid #ff6600;
  background:#0a1020;
  box-shadow: 0 0 20px rgba(255,100,0,0.5);
  image-rendering: pixelated;
}

.portrait-wrap canvas {
  width:100%; height:100%;
  image-rendering:pixelated;
  display:block;
}

.speaker-block { flex:1; padding-top:70px; }
.speaker-name {
  font-family: var(--font-header);
  font-size:28px; color:#ff6600; letter-spacing:2px; margin-bottom:4px;
}

.dialogue-body { padding:12px 20px 8px; }
.dialogue-text {
  font-family: var(--font-body);
  font-size:16px; color:#e8ddb5; line-height:1.7;
  min-height:70px;
  white-space: pre-wrap;
}

.choices-area { padding:10px 16px 0; display:flex; flex-direction:column; gap:7px; }
.choice-btn {
  background:#0a1020; border:2px solid #1e2a44;
  color:#aabbcc;
  font-family: var(--font-body);
  font-size:14px;
  padding:10px 14px; text-align:left; cursor:pointer;
  line-height:1.5;
  transition: border-color 0.1s, color 0.1s, background 0.1s;
}
.choice-btn:hover, .choice-btn:active {
  border-color:#ff6600; color:#ff9944; background:#12192e;
}
.choice-btn::before { content:'> '; color:#ff6600; }
.choice-btn.used {
  background:#070a14;
  border-color:#1a1f30;
  color:#3a4555;
  cursor:default;
  text-decoration:line-through;
  opacity:0.55;
}
.choice-btn.used:hover {
  background:#070a14;
  border-color:#1a1f30;
  color:#3a4555;
}
.choice-btn.used::before { content:'x '; color:#3a4555; }

.tap-continue {
  font-family: var(--font-header);
  font-size:18px; color:#ff660088; text-align:right;
  padding:6px 20px 0; letter-spacing:1px;
  animation: blink 1.2s step-end infinite;
}

/* ===== RACE SCREEN ===== */
#race-screen {
  flex-direction: column;
  background: #050508;
}

#race-canvas {
  display: block;
  width: 390px;
  flex: 1;        /* fills space between top and controls */
  min-height: 0;
  image-rendering: pixelated;
}

#race-controls {
  flex-shrink: 0;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #0a0a14;
  border-top: 2px solid #ff660055;
  gap: 16px;
}

.race-btn {
  flex: 1;
  height: 88px;
  background: rgba(255,100,0,0.08);
  border: 2px solid #ff660088;
  color: #ff6600;
  font-family: var(--font-header);
  font-size: 50px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.06s, border-color 0.06s;
}
.race-btn:active { background: rgba(255,100,0,0.35); border-color: #ff6600; }

#countdown-display {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);
  font-size: 140px;
  color: #ff6600;
  text-shadow: 0 0 30px #ff4400, 0 0 70px #ff2200;
  z-index: 20;
  pointer-events: none;
  background: rgba(0,0,0,0.35);
}

#race-result {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);
  font-size: 70px;
  letter-spacing: 4px;
  text-shadow: 0 0 25px currentColor;
  z-index: 20;
  pointer-events: none;
  background: rgba(0,0,0,0.5);
}

/* ===== DRAG RACE SCREEN ===== */
#drag-screen {
  flex-direction: column;
  background: #06070d;
}
#drag-canvas {
  display: block;
  width: 390px;
  flex: 1;
  min-height: 0;
  image-rendering: pixelated;
}
#drag-controls {
  flex-shrink: 0;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  background: #0a0a14;
  border-top: 2px solid #ff660055;
}
.drag-btn {
  flex: 1;
  height: 88px;
  background: rgba(255,100,0,0.10);
  border: 2px solid #ff6600cc;
  color: #ff6600;
  font-family: var(--font-header);
  font-size: 30px;
  letter-spacing: 2px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.05s, border-color 0.05s, transform 0.05s;
}
.drag-btn:active {
  background: rgba(255,100,0,0.45);
  border-color: #ff6600;
  transform: scale(0.97);
}
/* ===== SESH SCREEN (Cabra carpark stealth deal) ===== */
#sesh-screen {
  flex-direction: column;
  background: #060708;
}
#sesh-canvas {
  display: block;
  width: 390px;
  flex: 1;
  min-height: 0;
  image-rendering: pixelated;
}
#sesh-hud {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  height: 36px;
  pointer-events: none;
  font-family: var(--font-header);
  color: #88ccff;
  font-size: 14px;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
}
#sesh-controls {
  flex-shrink: 0;
  height: 120px;
  display: flex;
  padding: 12px 20px;
  background: #0a0a14;
  border-top: 2px solid #6688aa55;
}
.sesh-btn {
  flex: 1;
  height: 88px;
  background: rgba(102,136,170,0.10);
  border: 2px solid #6688aacc;
  color: #88ccff;
  font-family: var(--font-header);
  font-size: 28px;
  letter-spacing: 3px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.05s, border-color 0.05s, transform 0.05s,
              color 0.05s, box-shadow 0.05s;
}
.sesh-btn.armed {
  background: rgba(60,200,90,0.18);
  border-color: #44dd55;
  color: #66ee77;
  box-shadow: 0 0 30px #44dd5566;
}
.sesh-btn.danger {
  background: rgba(220,40,40,0.25);
  border-color: #ff5544;
  color: #ff7766;
}
.sesh-btn:active {
  transform: scale(0.97);
}
#sesh-countdown {
  position: absolute; top: 0; left: 0; right: 0; bottom: 120px;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
  font-family: var(--font-header); font-size: 28px;
  color: #88ccff; text-shadow: 0 0 30px #6688aa88;
  pointer-events: none;
  z-index: 10;
  text-align: center; padding: 0 30px;
}
#sesh-result {
  position: absolute; top: 0; left: 0; right: 0; bottom: 120px;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--font-header);
  background: rgba(6,7,13,0.92);
  z-index: 10;
}

/* ===== TRANSITION SCREEN (driving between suburbs) ===== */
#transition-screen {
  flex-direction: column;
  align-items: stretch;
  justify-content: stretch;
  background: #0a0814;
  overflow: hidden;
}
#transition-bg-img {
  position: absolute;
  top: 35%;
  left: 0;
  width: 100%;
  height: 35%;
  image-rendering: pixelated;
  object-fit: cover;
  pointer-events: none;
}
#transition-car-img {
  position: absolute;
  left: 50%;
  top: 53%;
  width: 200px;
  height: 100px;
  margin-left: -100px;
  image-rendering: pixelated;
  pointer-events: none;
  /* Subtle bob/vibration to feel like it's driving */
  animation: transitionBob 0.15s steps(2) infinite;
}
@keyframes transitionBob {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(2px); }
  100% { transform: translateY(0); }
}
#transition-label {
  position: absolute;
  top: 14%;
  left: 0; right: 0;
  text-align: center;
  font-family: var(--font-header);
  color: #ffaa33;
  font-size: 16px;
  letter-spacing: 4px;
  text-shadow: 0 0 16px #ff6600cc;
}
#transition-destination {
  position: absolute;
  top: 22%;
  left: 0; right: 0;
  text-align: center;
  font-family: var(--font-header);
  color: #ffeeaa;
  font-size: 34px;
  letter-spacing: 6px;
  text-shadow: 0 0 28px #ff8800aa;
}
#transition-distance {
  position: absolute;
  bottom: 8%;
  left: 0; right: 0;
  text-align: center;
  font-family: var(--font-body);
  color: #88ccff;
  font-size: 14px;
  letter-spacing: 2px;
}

/* ===== HILL CLIMB SCREEN ===== */
#hill-screen {
  flex-direction: column;
  background: #06070d;
}
#hill-canvas {
  display: block;
  width: 390px;
  flex: 1;
  min-height: 0;
  image-rendering: pixelated;
}
#hill-hud {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  height: 40px;
  pointer-events: none;
  font-family: var(--font-header);
  color: #ffaa00;
  font-size: 14px;
  letter-spacing: 2px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
}
#hill-controls {
  flex-shrink: 0;
  height: 120px;
  display: flex;
  gap: 14px;
  padding: 12px 20px;
  background: #0a0a14;
  border-top: 2px solid #88661a55;
}
.hill-btn {
  flex: 1;
  height: 88px;
  background: rgba(136,102,26,0.10);
  border: 2px solid #88661acc;
  color: #d4a64a;
  font-family: var(--font-header);
  font-size: 30px;
  letter-spacing: 2px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.05s, border-color 0.05s, transform 0.05s;
}
.hill-btn.hill-gas-btn {
  background: rgba(255,136,0,0.12);
  border-color: #ff8800cc;
  color: #ffaa33;
}
.hill-btn:active {
  background: rgba(255,160,40,0.45);
  border-color: #ffaa33;
  transform: scale(0.97);
}
#hill-countdown {
  position: absolute; top: 0; left: 0; right: 0; bottom: 120px;
  display: none;
  align-items: center; justify-content: center;
  font-family: var(--font-header); font-size: 120px;
  color: #ffaa33; text-shadow: 0 0 30px #ff6600cc;
  pointer-events: none;
  z-index: 10;
}
#hill-result {
  position: absolute; top: 0; left: 0; right: 0; bottom: 120px;
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  font-family: var(--font-header);
  background: rgba(6,7,13,0.92);
  z-index: 10;
}

#drag-countdown {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  font-family: var(--font-header); font-size: 120px;
  color: #ff6600; text-shadow: 0 0 30px #ff4400, 0 0 70px #ff2200;
  z-index: 20; pointer-events: none;
  background: rgba(0,0,0,0.45);
}
#drag-result {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  font-family: var(--font-header); font-size: 70px;
  letter-spacing: 4px; text-shadow: 0 0 25px currentColor;
  z-index: 20; pointer-events: none;
  background: rgba(0,0,0,0.55);
}

/* ===== END SCREEN ===== */
#end-screen {
  justify-content:center; align-items:center; gap:20px;
}
.end-title { z-index:10; font-family: var(--font-header); font-size:52px; color:#ff6600; text-align:center; line-height:1.3; letter-spacing:3px; }
.end-msg   { z-index:10; font-family: var(--font-body);   font-size:16px; color:#aabbcc; text-align:center; line-height:1.9; max-width:300px; }
.restart-btn {
  z-index:10; background:#ff6600; color:#000; border:none;
  font-family: var(--font-header); font-size:24px; padding:12px 28px; cursor:pointer;
  letter-spacing:2px;
}
.restart-btn:hover { background:#ff8800; }
</style>
</head>
<body>
<div id="game">

  <!-- ===== STREET BACKGROUND (shared) ===== -->
  <div id="street-bg">
    <div class="stars" id="stars"></div>
    <div class="horizon"></div>
    <div class="road">
      <div class="sidewalk-l"></div>
      <div class="sidewalk-r"></div>
      <div class="road-line"></div>
    </div>
    <div class="streetlight l"></div>
    <div class="streetlight r"></div>
    <canvas id="bg-canvas" width="390" height="844" style="position:absolute;inset:0;pointer-events:none;"></canvas>
  </div>

  <!-- ===== TITLE SCREEN ===== -->
  <div class="screen active" id="title-screen">
    <canvas id="title-city-canvas" width="390" height="422"></canvas>
    <canvas id="title-road-canvas" width="390" height="422"></canvas>
    <div class="title-overlay"></div>
    <div class="title-wrap">
      <div class="game-logo">STREETO</div>
      <div class="subtitle">WESTERN SYDNEY</div>
      <div class="tap-prompt">[ TAP TO START ]</div>
    </div>
  </div>

}

// Macca — Aussie country boy, Penrith. Akubra-style cap, flannel + singlet.
function drawMacca(ctx) {
  const c = ctx;
  const BG='#221a14', SK='#E0A878', SK2='#B8845A', HR='#a87838',
        CP='#5a4828', CP2='#3a2a18',                       // dusty cap
        FL='#3a5a8a', FL2='#2a4070',                        // faded flannel blue
        SG='#f0f0e8', BK='#0a0a0a', TN='#c8845a', RD='#aa2820';

  px(c,0,0,64,64,BG);
  // Dusty Akubra-style cap, pushed back showing hair
  px(c,10,4,44,5,CP);   // crown
  px(c,8,8,48,3,CP);
  px(c,6,10,52,2,CP2);  // brim shadow line
  px(c,4,11,56,3,CP2);  // wide brim
  // Cap stain / fade marks
  px(c,30,5,8,2,'#7a6038');
  // Tufts of sandy hair sticking out below cap
  px(c,10,12,6,3,HR);  px(c,48,12,6,3,HR);
  // Ears (sunburnt tips)
  px(c,7,17,5,8,SK);   px(c,52,17,5,8,SK);
  px(c,7,17,3,2,TN);   px(c,54,17,3,2,TN);
  // Face — sun-tanned
  px(c,11,15,42,28,SK);
  // Tan lines from cap (lighter forehead, darker cheeks)
  px(c,11,15,42,4,'#f0c098');
  // Eyes (squinting from sun)
  px(c,17,24,8,3,BK); px(c,39,24,8,3,BK);
  px(c,19,24,4,2,'#3a6a3a'); px(c,41,24,4,2,'#3a6a3a'); // green eyes
  // Squint crinkles (crows feet)
  px(c,15,22,3,1,SK2); px(c,46,22,3,1,SK2);
  px(c,15,28,3,1,SK2); px(c,46,28,3,1,SK2);
  // Eyebrows (thick blonde)
  px(c,16,21,9,2,HR); px(c,39,21,9,2,HR);
  // Nose (slightly burnt)
  px(c,28,28,8,5,SK2); px(c,30,32,4,2,TN);
  // Stubble (scruffy chin)
  for(let xx=14; xx<50; xx+=2){
    for(let yy=36; yy<42; yy+=2){
      if((xx*7+yy*3)%5<2) px(c,xx,yy,1,1,'#553820');
    }
  }
  // Mouth — small grin
  px(c,24,38,16,2,'#6a3018');
  px(c,26,40,12,2,'#9a4830');
  // Neck (tanned)
  px(c,24,43,16,4,SK2);
  // White singlet visible at the centre
  px(c,28,47,8,17,SG);
  // Flannel shirt — unbuttoned, open at chest
  px(c,0,47,28,17,FL);   // left side
  px(c,36,47,28,17,FL);  // right side
  // Flannel check pattern (crosshatch lines)
  for(let yy=49; yy<64; yy+=4){
    px(c,2,yy,26,1,FL2);
    px(c,36,yy,26,1,FL2);
  }
  for(let xx=4; xx<28; xx+=6){ px(c,xx,49,1,15,FL2); }
  for(let xx=38; xx<62; xx+=6){ px(c,xx,49,1,15,FL2); }
  // Subtle red plaid stripes
  px(c,8,52,1,12,RD); px(c,18,52,1,12,RD);
  px(c,44,52,1,12,RD); px(c,54,52,1,12,RD);
}

        choices:[

          {text:"What does Chamkili mean again?", next:"preet_chamkili_meaning"}
        ]
      },
      {
        id:"preet_respect_back", speakerId:"preet", portrait:"preet_happy",
        text:"BHAI you cooked her! You actually cooked her! Right, thali is ON ME. Sweet Punjab, my booth, ten minutes. Bring Brenno. Next time I'm puttin' bigger blower in her and we go again — and the mainys at the end, FULL volume my friend.",
        next:"preet_credits"
      },
      {
        id:"preet_chamkili_meaning", speakerId:"preet", portrait:"preet_happy",
        text:"Shiny one, in Punjabi! She has been with me since I was tiny in Harris Park. Even when she loses she's gorgeous yaar. Today she just learned a lesson. That is also a beautiful thing.",
        next:"preet_credits"
      },
      {
        id:"preet_credits", speakerId:"narrator", portrait:null,
        text:"Just as you finish the run, the door of the Indian grocer chimes open. Brenno staggers out clutching a paper bag heavy with curry powder, garam masala, and the three extras Mum tacked on. Eyes wide. Samosa wedged in his mouth.",
        next:"preet_credits_brenno_beg"
      },
      {
        id:"preet_credits_brenno_beg", speakerId:"eshay", portrait:"eshay_nervous",
        text:"BRA. BRAAAAA. ESHAYS. Mum's curry is sorted, I delivered, I'm a good son. BUT. The boys back at the Westfield are gonna SMOKE without me bra. I need to get on. Tonight. Now. We HAVE to go to Cabra. Khoa. The Viet bloke. PLEASE bra.",
        choices:[
          {text:"Yeah let's go.", next:"preet_credits_mitcho2"},
          {text:"What's 'get on' mean?", next:"preet_credits_geton_explain"},
          {text:"Curry first, then weed?", next:"preet_credits_priority"}
        ]
      },
      {
        id:"preet_credits_geton_explain", speakerId:"eshay", portrait:"eshay_excited",
        text:"BRA come on adlay. Get on. Hook up. Bag o' green. Smoke. Punia. Whatever ya wanna call it. Khoa's old man's got a shed full of it. Khoa's the gatekeeper. ESHAYS we need him bra.",
        next:"preet_credits_mitcho2"
      },
      {
        id:"preet_credits_priority", speakerId:"eshay", portrait:"eshay_nervous",
        text:"Mum's curry stays in the bag bra, she's not cookin' for another hour. Plenty of time to do Cabra and be home in time for dinner. I've timed this run bra, I've TIMED IT.",
        next:"preet_credits_mitcho2"
      },
      {
        id:"preet_credits_mitcho1", speakerId:"eshay", portrait:"eshay_excited",
        text:"Also adlay — you just SMOKED Rahul. THE Rahul. In a Toirota Camree. The boys in Cabra are not gonna believe this.",
        next:"preet_credits_mitcho2"
      },
      {
        id:"preet_credits_mitcho2", speakerId:"eshay", portrait:"eshay_default",
        text:"Khoa's whole thing is the S14 Silveeya. White pearl, red stripe, SR20DET, deep dish Work Meisters, hydro handbrake the whole shabang. Drift god lad. Apparently he found it in some shed in Auburn full of cobwebs.",
        next:"preet_credits_mitcho3"
      },
      {
        id:"preet_credits_mitcho3", speakerId:"eshay", portrait:"eshay_excited",
        text:"And get this — his ma runs the best phở shop in Cabra. He told me if any of his mates ever beat him in a race they eat for free for life. FOR LIFE adlay. I'm gettin' a feed off this whether you win or lose.",
        next:"preet_credits_mitcho4"
      },
      {
        id:"preet_credits_mitcho4", speakerId:"eshay", portrait:"eshay_default",
        text:"Word from Harris Park has already gone down the M5. Khoa knows we're comin'. He'll be ready. M4 down to Liverpool Rd, then onto Cabramatta Rd. Take the second exit at the markets bra.",
        choices:[
          {text:"Let's roll then.", next:"preet_credits_go"},
          {text:"What's a hydro handbrake?", next:"preet_credits_handbrake"},
          {text:"Tell me about the S14.", next:"preet_credits_s14"}
        ]
      },
      {
        id:"preet_credits_handbrake", speakerId:"eshay", portrait:"eshay_excited",
        text:"Hydro handbrake?! Bra, it's a hydraulic ebrake bolted into the floor next to the gear stick. Yank it mid corner and the back wheels lock up instantly. Sideways the whole way through. Pure cinema lad.",
        next:"preet_credits_go"
      },
      {
        id:"preet_credits_s14", speakerId:"eshay", portrait:"eshay_default",
        text:"S14 Silveeya, '94 to '98, JDM coupe with the SR20DET. Best chassis Nissan ever made. Weighs nothin', handles like a kart, sounds like the universe is endin'. Khoa's one is a kouki — the later facelift one.",
        next:"preet_credits_go"
      },
      {
        id:"preet_credits_go", speakerId:"narrator", portrait:null,
        text:"You roll out of Wigram St with Brenno's playlist already on the speakers. Brenno leans over: 'Oi bra, Khoa can also sort us with a bit of green if you want. The boys talk about his shed gear all the time.' Cabramatta's twenty minutes south.",
        triggerEvent:"unlock_cabramatta"
      }
    ]
  },

  preet_post_lose: {
    id:"preet_post_lose", defaultStartNodeId:"start", sceneBg:"bg_harrispark",
    nodes:[
      {
        id:"start", speakerId:"preet", portrait:"preet_happy",
        text:"AHAHA bhai it's okay! Chamkili dances better, what can I say. Mainys are an artform, you'll get there. Come — thali at Sweet Punjab is still on me. Loser still eats. That's the rule yaar.",
        choices:[

    ]
  },

  khoa_intro: {
    id:"khoa_intro", defaultStartNodeId:"start",
    nodes:[
      {
        id:"start", speakerId:"narrator", portrait:null,
        text:"John St Cabramatta, behind the markets. Red lanterns and fairy lights hang between the rooftops. A young Viet Australian guy in a crisp light-blue shirt is leaning on a pearl white S14 Silveeya, vaping and scrolling his phone. Brenno lets out a low whistle from the passenger seat.",
        next:"khoa_greet"
      },
      {
        id:"khoa_greet", speakerId:"khoa", portrait:"khoa_happy",
        text:"Ayyy! You're the one Brenno's been hyping up? Get over here bro, I was about to head out for phở. You want one? My shout. Cabramatta's got the best in the country, no debate.",
        choices:[
          {text:"That's a clean S14.", next:"khoa_explain"},
          {text:"Tell me about yourself.", next:"khoa_backstory"},
          {text:"Brenno says you can get us on.", next:"khoa_geton_intro"},
          {text:"Cut the chat. Where do we deal?", next:"khoa_respect"},
          {text:"Yeah, phở sounds good.", next:"khoa_food"}
        ]
      },
      {
        id:"khoa_geton_intro", speakerId:"khoa", portrait:"khoa_default",
        text:"Bahaha Brenno told ya. Yeah I can sort ya. Sticky green, $50 a gram, $200 a Q. Pickup happens HERE actually bro, in the Maccas carpark. Mum's shed's too close to home, I'm not bringin' the heat to her.",
        choices:[
          {text:"Grab a Q.", next:"khoa_geton_q"},
          {text:"Just a gram is fine.", next:"khoa_geton_g"},
          {text:"Skip it. Just here for the deal.", next:"khoa_geton_decline"}
        ]
      },
      {
        id:"khoa_geton_q", speakerId:"eshay", portrait:"eshay_excited",
        text:"YEEEEEEEEW! Q the boys up adlay! ESHAYS. That'll do us til Liverpool. Real ones get on at Cabra, NOT the city. Bra you're an icon. ...wait. WAIT. Adlay no. NO.",
        next:"brenno_ongbay_realize"
      },
      {
        id:"khoa_geton_g", speakerId:"khoa", portrait:"khoa_happy",
        text:"All good bro. Pop the boot — bag's in the brown paper from the dosa place. Anyone asks, ya bought a samosa.",
        next:"brenno_ongbay_realize"
      },
      {
        id:"brenno_ongbay_realize", speakerId:"eshay", portrait:"eshay_sad",
        text:"BRA. BRAAAAAAA. ME PIECE. ME GLASS. I LEFT THE ONGBAY IN THE FALCON. The good one. The double perc. I've got all this gear and NOTHIN' to smoke it through. ESHAYS this is a disaster.",
        next:"brenno_ongbay_realize_2"
      },
      {
        id:"brenno_ongbay_realize_2", speakerId:"eshay", portrait:"eshay_nervous",
        text:"Alright alright don't panic. Macca up in Penrith has a spare. Lives next door to his old man's tyre shop. We HAVE to go bra. ESHAYS, he won't just hand it over, you know how Macca is — wants a race for it.",
        next:"khoa_geton_done"
      },
      {
        id:"khoa_geton_decline", speakerId:"khoa", portrait:"khoa_default",
        text:"Fair enough bro. Listen — Brenno NEEDS the ongbay though, you saw him. He's gonna lose it if he doesn't get on. Let me at least sort him out, you don't even have to touch it.",
        next:"brenno_ongbay_realize"
      },
      {
        id:"khoa_geton_done", speakerId:"khoa", portrait:"khoa_serious",
        text:"Right. Stash it under the seat til you're home. Cops out tonight bro — there's a Highway Patrol Commodore doin' laps of the carpark. Look, we'll do this slick. Pull up beside me, three quick things — I show ya the bag, ya sniff it, ya pass the cash. All in the cop's blind spots. Easy.",
        next:"khoa_deal_setup"
      },
      {
        id:"khoa_deal_setup", speakerId:"khoa", portrait:"khoa_default",
        text:"Watch the spotlight bro. When it sweeps away — TAP. When it's on us — WAIT. Three transactions. Don't get nicked. And don't make me wait too long either, I've gotta close up shop yeah.",
        triggerEvent:"start_sesh_cabramatta"
      },
      {
        id:"khoa_backstory", speakerId:"khoa", portrait:"khoa_default",
        text:"Born here bro. Both my parents came from Vietnam in '79, boat people. Started a phở shop two streets down, still runnin' it today. I grew up doin' homework behind the counter while mum's choppin' coriander.",
        next:"khoa_backstory_2"
      },
      {
        id:"khoa_backstory_2", speakerId:"khoa", portrait:"khoa_happy",
        text:"Did my apprenticeship as a panel beater at uncle's shop in Bonnyrigg. Sundays were all about cars yeah, the boys, the music, the late night carparks. Cabra car culture runs deep bro.",
        next:"khoa_family"
      },
      {
        id:"khoa_family", speakerId:"khoa", portrait:"khoa_default",
        text:"Found the S14 sittin' in a shed out in Auburn, 1996 Kouki, original SR20DET still in it. Took me two years to bring her back. Dad reckoned I should've bought a Camree. He didn't get it. He gets it now.",
        choices:[
          {text:"What's it running now?", next:"khoa_explain"},
          {text:"Got it. Let's sort the deal.", next:"khoa_respect"}
        ]
      },
      {
        id:"khoa_food", speakerId:"khoa", portrait:"khoa_happy",
        text:"That's what I'm talkin' about! Tái nạm, big bowl, extra chilli, with the bánh quẩy for dippin'. We'll grab one after I smoke ya, hahaha. Mum's special is the brisket.",
        next:"khoa_food_2"
      },
      {
        id:"khoa_food_2", speakerId:"khoa", portrait:"khoa_default",
        text:"Anyway. Brenno said you're cool, you wanna get on for the boys. Let's do it bro — pull up beside me, slick deal, cop's doin' laps but we'll time it.",
        next:"khoa_geton_intro"
      },
      {
        id:"khoa_explain", speakerId:"khoa", portrait:"khoa_proud",
        text:"SR20DET, big single Garrett, front mount, T56 conversion, hydraulic handbrake for the touges. She makes a smooth 380 to the wheels. And she SLIDES bro, you don't even know.",
        next:"khoa_explain_2"
      },
      {
        id:"khoa_explain_2", speakerId:"khoa", portrait:"khoa_happy",
        text:"Drive her every Sunday up Old Pacific Highway with the crew. Then back to Cabra for phở. Best routine in the country yeah.",
        next:"khoa_geton_intro"
      },
      {
        id:"khoa_respect", speakerId:"khoa", portrait:"khoa_serious",
        text:"Respect bro, no chit chat. I like that. Let's sort Brenno out then — cop's circlin', we'll time it.",
        next:"khoa_geton_intro"
      }
    ]
  },

  khoa_post_win: {
    id:"khoa_post_win", defaultStartNodeId:"start",
    nodes:[
      {
        id:"start", speakerId:"khoa", portrait:"khoa_happy",
        text:"Ahhh bro! That was SLICK. Three transactions in the blind spots, cop didn't even sniff us. You've got fingers like a card dealer yeah.",
        choices:[

      },
      {

  khoa_post_lose: {
    id:"khoa_post_lose", defaultStartNodeId:"start",
    nodes:[
      {
        id:"start", speakerId:"khoa", portrait:"khoa_serious",
        text:"Ohhhh bro. Cop's gone the other way now but the heat's in the air. We can't move tonight, ya gotta come back yeah. Don't worry, the bag's still here when you're ready.",
        choices:[
          {text:"I'll be back, Khoa.", next:"khoa_kind"},

        id:"khoa_kind", speakerId:"khoa", portrait:"khoa_default",

        id:"khoa_retry", speakerId:"narrator", portrait:null,

    ]
  },

  macca_intro: {
    id:"macca_intro", defaultStartNodeId:"start", sceneBg:"bg_penrith",
    nodes:[
      {
        id:"start", speakerId:"narrator", portrait:null,
        text:"Penrith. A normal Westfield carpark with a Bunnings next door, but the bloke leaning on a jacked Wildtrak Ranger in front of you is dressed like he just walked off an outback station — flannie, Akubra, work boots, mud tyres bigger than your bonnet. The Blue Mountains glow pink on the horizon.",
        next:"mitcho_penrith_quip1"
      },
      {
        id:"mitcho_penrith_quip1", speakerId:"eshay", portrait:"eshay_excited",
        text:"Bra. Bra. We're in PENRITH adlay. There's a Coles right there. He's wearin' a HAT lad.",
        next:"macca_greet"
      },
      {
        id:"macca_greet", speakerId:"macca", portrait:"macca_default",
        text:"Gday mate! You must be the bloke from out east. Heard you been pingin' it through west syd. Pull up, grab a beer. The name's Brett — but everyone round here calls me Macca. That there's the Ranjer.",
        choices:[
          {text:"Macca like the McDonald's?", next:"macca_name_joke"},
          {text:"Who told you we were comin', Brett?", next:"macca_news"},
          {text:"Nice rig, Brett.", next:"macca_truck"},
          {text:"Penrith isn't really the bush though.", next:"macca_country"}
        ]
      },
      {
        id:"macca_name_joke", speakerId:"macca", portrait:"macca_happy",
        text:"HA! You're not the first mate. Yeah look — name's Brett, mum named me, can't help it. But me and the boys live at the Maccas Drive-Thru on Castlereagh Road, so the nickname stuck about fifteen years ago and it's never gettin' off me yeah.",
        next:"macca_truck"
      },
      {
        id:"macca_country", speakerId:"macca", portrait:"macca_happy",
        text:"Aw mate, Penrith's the gateway to the bush. You can SEE the Blue Mountains from here. Half me mates are out in Lithgow, Bathurst, Dubbo. Spiritually I'm a bushie. Geographically I'm next to a JB Hi-Fi. Splits the difference yeah.",
        next:"macca_truck"
      },
      {
        id:"macca_news", speakerId:"macca", portrait:"macca_default",
        text:"Khoa from Cabra rang me, said you'd be rollin' through. Said Brenno left his glass in the Beemer and now he's chasin' me spare double perc. Look mate — I've had that bong since me eighteenth. You've gotta earn it.",
        next:"macca_truck"
      },
      {
        id:"macca_truck", speakerId:"macca", portrait:"macca_proud",
        text:"She's a 2018 Wildtrak Ranger. 3.2 litre turbo diesel, 3 inch lift, 35 inch muddies, snorkel, dual battery, light bar, ARB winch. Tows me boat, tows me caravan, tows me mate's broken-down Hilux every other weekend.",
        choices:[
          {text:"That thing's not built for speed though.", next:"macca_doubt"},
          {text:"So what's the actual deal?", next:"macca_deal_setup"},
          {text:"How are we settling this then, Brett?", next:"macca_deal_setup"}
        ]
      },
      {
        id:"macca_doubt", speakerId:"macca", portrait:"macca_excited",
        text:"Hahaha that's exactly what city blokes always reckon mate. She doesn't NEED top speed. Out the back of Penrith it's all dips, dirt, paddock fences and dry creek beds. The Ranjer eats that for breakfast. You'll see.",
        next:"macca_deal_setup"
      },
      {
        id:"macca_deal_setup", speakerId:"macca", portrait:"macca_default",
        text:"Here's how it goes mate. We hop in our rigs right now and we tear down Castlereagh Road, straight shot off the back of the carpark, past the paddocks, over the quarry track, finish line is the McDonald's drive-thru on the corner of Andrews Rd. Maccas to Maccas. Beautiful.",
        next:"macca_deal_stakes"
      },
      {
        id:"macca_deal_stakes", speakerId:"macca", portrait:"macca_proud",
        text:"You roll in there upright first, I hand Brenno the spare double perc, no questions. You don't make it — bog the rig, roll it, give up — you owe me a slab of VB AND you shout the McChickens. Sound fair?",
        choices:[
          {text:"Castlereagh's not made for that. Doesn't matter — deal.", next:"macca_player_confident"},
          {text:"Maccas to Maccas, I love it. Deal.", next:"macca_player_loose"},
          {text:"Brett — there'll be obstacles, won't there.", next:"macca_player_warned"}
        ]
      },
      {
        id:"macca_player_warned", speakerId:"macca", portrait:"macca_excited",
        text:"Course there will mate! Logs the council never cleared, hay bales me uncle dropped, a fridge that someone dumped outside the panel-beater, couple of sheep that wander on at dusk. Standard Castlereagh stuff. Watch the rocks past the quarry, they'll send ya proper sideways.",
        next:"macca_lets_go"
      },
      {
        id:"macca_player_confident", speakerId:"macca", portrait:"macca_happy",
        text:"Beauty mate! Confidence I like. Just remember — out there it's not about top speed, it's about not endin' up on ya roof in a paddock. Hop in, gas pedal on the right, brake on the left, don't flip.",
        next:"macca_lets_go"
      },
      {
        id:"macca_player_loose", speakerId:"macca", portrait:"macca_happy",
        text:"Hahaha now we're talkin'! Maccas to Maccas down Castlereagh. The boys at the Drive-Thru are gonna lose it. Sharon's workin' the window tonight, she'll have a chocolate sundae waitin' for the winner. Hop in mate.",
        next:"macca_lets_go"
      },
      {
        id:"macca_lets_go", speakerId:"macca", portrait:"macca_default",
        text:"One thing though — and I'm serious about this one mate — if you flip the rig, just hit retry and have another crack. The Ranjer's tough, you'll be right. See ya at the Drive-Thru.",
        next:"mitcho_penrith_quip_final"
      },
      {
        id:"mitcho_penrith_quip_final", speakerId:"eshay", portrait:"eshay_excited",
        text:"YEEEEW. Maccas to MACCAS. Aux cord's mine. Engine on. Let's go bra.",
        triggerEvent:"start_race_penrith"
      }
    ]
  },

  macca_post_win: {
    id:"macca_post_win", defaultStartNodeId:"start", sceneBg:"bg_penrith",
    nodes:[
      {
        id:"start", speakerId:"macca", portrait:"macca_happy",
        text:"Well shit me mate, ya got the rig to the Drive-Thru upright! Fair dinkum impressive drivin' that, especially past the quarry rocks. Sharon's already got the McChickens goin', she saw the headlights round the bend.",
        choices:[
          {text:"GG, Brett.", next:"macca_respect"},
          {text:"That Ranger's got way more flex than I expected.", next:"macca_upgrade"},

      {

        text:"Real respect mate. You're a proper driver, no two ways about it. Drive safe gettin' home — and the double perc's yours, Brenno can stop whingein' about it.",
        next:"macca_handover"
      },
      {
        id:"macca_upgrade", speakerId:"macca", portrait:"macca_excited",

      {

        text:"Right, here she is. Genuine 2-piece double perc, eighteenth birthday present off me old man. Looked after her like a daughter. Look after her like one yeah?",
        next:"macca_credits"
      },
      {
        id:"macca_credits", speakerId:"eshay", portrait:"eshay_excited",
        text:"BRA. ESHAYS. Got the ongbay. Got the gear. Now the coil pack. Moey runs the kebab strip in Liverpool, knows every Beemer wrecker in NSW. We're so close to gettin' me Beemer runnin' adlay.",
        next:"macca_credits_2"
      },
      {
        id:"macca_credits_2", speakerId:"narrator", portrait:null,

        triggerEvent:"unlock_liverpool"
      }
    ]
  },

  macca_post_lose: {
    id:"macca_post_lose", defaultStartNodeId:"start", sceneBg:"bg_penrith",
    nodes:[
      {
        id:"start", speakerId:"macca", portrait:"macca_happy",
        text:"Aw mate, on ya roof are ya. Don't feel bad, half the boys end up there their first crack at Castlereagh. The Ranjer's tough, you'll be right. Pull up, get a beer in ya. Have another go whenever you're ready yeah.",
        choices:[
          {text:"That was on me. Run it back, Brett.", next:"macca_rematch"},
          {text:"Need a minute. I'll be back.", next:"macca_humble"}
        ]
      },

function initStars() {
  const stars = document.getElementById('stars');
  for (let i=0; i<80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${Math.random()*2+1}px;
      height:${s.style.width};
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
      opacity:${0.3+Math.random()*0.7};
    `;
    stars.appendChild(s);
  }
}

function drawBgScene() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,390,844);

  // PixelLab bg strip at horizon if loaded (behind buildings)
  const bgImg = SPRITES['bg_parramatta'];
  if(bgImg) {
    const stripH = 220, stripY = 280;
    ctx.drawImage(bgImg, 0, stripY, 390, stripH);
    // Darken to blend with night tone
    ctx.fillStyle = 'rgba(5,5,15,0.55)';
    ctx.fillRect(0, stripY, 390, stripH);
    // Fade top edge into sky
    const fg = ctx.createLinearGradient(0,stripY,0,stripY+60);
    fg.addColorStop(0,'rgba(5,6,15,1)'); fg.addColorStop(1,'rgba(5,6,15,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,stripY,390,60);
  }

  // Buildings left (painted over bg)
  drawBuilding(ctx, 0,  200, 85, 280, '#111118');
  drawBuilding(ctx, 0,  150, 60, 330, '#0f0f16');
  drawBuilding(ctx, 20, 170, 50, 310, '#13131e');

  // Buildings right
  drawBuilding(ctx, 310, 180, 80, 290, '#111118');
  drawBuilding(ctx, 330, 140, 60, 350, '#0f0f16');
  drawBuilding(ctx, 305, 200, 65, 270, '#13131e');

  // Windows (lit)
  drawWindows(ctx, 5,  170, 75, 200);
  drawWindows(ctx, 315, 160, 65, 210);

  // No parked car on the shared bg-canvas — keeps the suburb select clean
}

function drawBuilding(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(x, y, w, 3); // roof line
}

function drawWindows(ctx, bx, by, bw, bh) {
  const cols=3, rows=5;
  const wx=(bw-10)/(cols), wy=(bh-10)/(rows);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const lit = Math.random() > 0.4;
    ctx.fillStyle = lit ? `rgba(255,${180+Math.random()*75},${50+Math.random()*50},${0.5+Math.random()*0.5})` : '#050508';
    ctx.fillRect(bx+5+c*wx, by+10+r*wy, wx-4, wy-4);
  }
}

function drawAGM(ctx, x, y) {
  // AGM silhouette (top-down view, facing left)
  ctx.fillStyle = '#111120';
  ctx.fillRect(x, y, 120, 54);
  ctx.fillStyle = '#1a1a30';
  ctx.fillRect(x+6, y+4, 108, 46);
  // Windscreen
  ctx.fillStyle = '#1e2a44';
  ctx.fillRect(x+10, y+10, 35, 30);
  // Roof
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(x+48, y+8, 40, 32);
  // Brake lights (orange glow)
  ctx.fillStyle = '#ff4400';
  ctx.fillRect(x+108, y+8, 8, 12);
  ctx.fillRect(x+108, y+32, 8, 12);
  ctx.fillStyle = 'rgba(255,80,0,0.3)';
  ctx.fillRect(x+90, y, 30, 54);
  // Headlights
  ctx.fillStyle = '#ffcc66';
  ctx.fillRect(x+2, y+8, 8, 10);
  ctx.fillRect(x+2, y+32, 8, 10);
}

function drawDialogueScene() {
  const canvas = document.getElementById('scene-canvas');
  const ctx = canvas.getContext('2d');
  const W=390, H=844;
  const HZ = H*0.44; // horizon line

  // If a sceneImage overlay is active, paint a solid dark backdrop
  // behind it (the overlay <img> handles the animation itself via the
  // DOM, which is necessary for the GIF to actually play).
  if(currentNode && currentNode.sceneImage) {
    ctx.fillStyle = '#04050e';
    ctx.fillRect(0, 0, W, H);
    return;
  }

  // ---- SKY ----
  const sky = ctx.createLinearGradient(0,0,0,HZ);
  sky.addColorStop(0,'#04050e');
  sky.addColorStop(0.65,'#08101e');
  sky.addColorStop(1,'#0d1428');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,HZ);

  // Stars (procedural, always)
  for(let i=0;i<55;i++){
    ctx.fillStyle=`rgba(255,255,255,${0.25+Math.random()*0.55})`;
    ctx.fillRect(Math.random()*W|0, Math.random()*(HZ*0.85)|0, 2, 2);
  }

  // ---- SKYLINE (PixelLab bg strip if loaded, else procedural buildings) ----
  // Prefer dialogue-specific scene backdrop (e.g. kebab shop for Habibi) over suburb default
  const bgKey = currentDialogueBg || currentSuburbBg;
  const bgImg = SPRITES[bgKey];
  if(bgImg) {
    // Draw the 400x150 strip scaled to fill the lower sky / building zone
    const stripH = H*0.28;
    const stripY = HZ - stripH;
    ctx.drawImage(bgImg, 0, stripY, W, stripH);
    // Slight tint to feel like 3am
    ctx.fillStyle='rgba(0,5,15,0.32)';
    ctx.fillRect(0, stripY, W, stripH);
    // Fade top of strip into sky
    const fadeTop = ctx.createLinearGradient(0, stripY, 0, stripY+stripH*0.25);
    fadeTop.addColorStop(0,'rgba(4,5,14,1)');
    fadeTop.addColorStop(1,'rgba(4,5,14,0)');
    ctx.fillStyle=fadeTop; ctx.fillRect(0, stripY, W, stripH*0.25);
  } else {
    // Procedural buildings fallback
    [
      [0,80,H*0.12,H*0.32,'#0d0d15'],
      [0,45,H*0.05,H*0.39,'#0a0a12'],
      [310,80,H*0.14,H*0.30,'#0d0d15'],
      [330,60,H*0.10,H*0.34,'#0a0a12'],
    ].forEach(([bx,bw,by,bh,col])=>{
      ctx.fillStyle=col; ctx.fillRect(bx,by,bw,bh);
      for(let r=0;r<4;r++) for(let c=0;c<3;c++){
        if(Math.random()>0.5){
          ctx.fillStyle=`rgba(255,${160+Math.random()*70},${30+Math.random()*40},${0.4+Math.random()*0.4})`;
          ctx.fillRect(bx+5+c*((bw-10)/3), by+8+r*((bh-8)/4), (bw-10)/3-3, (bh-8)/4-4);
        }
      }
    });
  }

  // Horizon glow line
  ctx.fillStyle='rgba(255,100,0,0.18)';
  ctx.fillRect(0, HZ-4, W, 10);

  // ---- STREET / ROAD ----
  const road = ctx.createLinearGradient(0,HZ,0,H*0.65);
  road.addColorStop(0,'#1a1a22');
  road.addColorStop(1,'#252528');
  ctx.fillStyle = road;
  ctx.fillRect(80, HZ, 230, H*0.22);

  // Sidewalks
  ctx.fillStyle='#1e1e28'; ctx.fillRect(0,HZ,80,H*0.22);
  ctx.fillStyle='#1e1e28'; ctx.fillRect(310,HZ,80,H*0.22);

  // Centre line
  ctx.fillStyle='rgba(255,100,0,0.55)';
  for(let y=HZ+4;y<H*0.64;y+=20) ctx.fillRect(191,y,8,12);

  // Streetlights glow
  ctx.fillStyle='rgba(255,180,0,0.10)';
  ctx.beginPath(); ctx.ellipse(40,HZ,70,55,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(350,HZ,70,55,0,0,Math.PI*2); ctx.fill();

  // ---- PARKED CAR (suburb-specific, SIDE-ON profile view) ----
  // Dialogue scenes use side-on profile sprites — classic 2D platformer
  // car art. The top-down sheets are kept for the actual racing.
  //
  // Per-suburb car:
  //   Blacktown  -> Brenno's broken E36 Beemer (smoke plume)
  //   Parramatta -> Preet's Camree "Chamkili"
  //   Cabramatta -> Khoa's S14 Silveeya
  //   Penrith    -> Macca's jacked ForrdRanjer
  //   Liverpool  -> Habibi's AGM
  const carBySuburb = {
    BLACKTOWN:  'car_e36_side',
    PARRAMATTA: 'car_camry_side',
    CABRAMATTA: 'car_silvia_side',
    PENRITH:    'car_ranger_side',
    LIVERPOOL:  'car_amg_side',
  };
  const carKey = carBySuburb[currentSuburb] || 'car_amg_side';
  const carImg = SPRITES[carKey];

  // Cars are sized proportionally to the character (charH = 130 ≈ 1.75m
  // person reference). Real-world car height-vs-person ratios applied:
  //   sedans/coupes ~ 0.75-0.85 of person height (lower than them)
  //   hatchbacks    ~ 0.80
  //   jacked utes   ~ 1.10 (taller than person)
  // Length ≈ 2.3x height for sedans, ≈ 1.8x height for taller utes.
  // Wheels (bottom of sprite) align with the character's feet line so they
  // share the ground level. The Blacktown E36 Beemer is the focal point of
  // Brenno's intro so it gets BIG dimensions + raised carY (previous spec).
  const CAR_PROPS = {
    car_amg_side:        { w: 240, h: 104 },  // sedan
    car_camry_side:      { w: 245, h: 108 },  // sedan, slightly taller
    car_silvia_side:     { w: 230, h: 95  },  // low coupe
    car_wrx_side:        { w: 225, h: 105 },  // rally hatch
    car_ranger_side:     { w: 260, h: 145 },  // jacked-up ute (taller than person)
    car_e36_side:  { w: 270, h: 110 },  // sedan
  };

  const isBig   = (currentSuburb === 'BLACKTOWN'); // big focal Beemer
  const props   = CAR_PROPS[carKey] || { w: 220, h: 100 };
  const carW    = isBig ? 320 : props.w;
  const carH    = isBig ? 145 : props.h;
  const FEET_Y  = Math.round(H * 0.57); // character feet line ≈ 481
  // Right-aligned with 10px screen margin
  const carX    = W - carW - 10;
  // Wheels on the character feet line (so the two share the ground).
  // Blacktown's big Beemer stays raised per the focal-point request.
  const carY    = isBig ? H*0.36 : (FEET_Y - carH);

  // ---- PER-NODE STAGE FLAGS ---------------------------------------------
  // Lets a dialogue node hide/show the default car/character or draw a
  // small "in-the-car" mini sprite. Used for the Harris Park empty-street
  // → Rahul rips in → Rahul leans out the window staging.
  //   stage.hideCar   — skip the per-suburb car
  //   stage.hideChar  — skip the main character sprite
  //   stage.charMini  — draw a small char sprite at the driver's window
  const stage = (currentNode && currentNode.stage) || {};
  const showCar  = !stage.hideCar;
  const showChar = !stage.hideChar;

  if(showCar) {
    if(carImg) {
      // Side-on profile — draw at native size
      ctx.drawImage(carImg, carX, carY, carW, carH);
    } else {
      // Procedural fallback (side-view rectangle car)
      ctx.fillStyle = '#0d0d1e';
      ctx.fillRect(carX, carY + carH*0.35, carW, carH*0.55);     // body
      ctx.fillStyle = (carKey === 'car_ranger_side') ? '#5a4f30' : '#1a1a30';
      ctx.fillRect(carX+10, carY + carH*0.15, carW-20, carH*0.3); // roof / cabin
      // Windows
      ctx.fillStyle = '#0a1a30';
      ctx.fillRect(carX+14, carY + carH*0.20, carW-28, carH*0.18);
      // Wheels
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(carX + carW*0.22, carY + carH*0.9, carH*0.16, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(carX + carW*0.78, carY + carH*0.9, carH*0.16, 0, Math.PI*2); ctx.fill();
    }
    // If Blacktown -> add smoke plume to imply broken-down Beemer
    if(currentSuburb === 'BLACKTOWN') {
      const smokeT = Date.now() * 0.001;
      for(let s=0; s<5; s++) {
        const sy = carY - 10 - s*14 - (smokeT*8 % 14);
        const sx = carX + carW*0.5 + Math.sin(smokeT + s) * 12;
        const sr = 14 + s*4;
        ctx.fillStyle = `rgba(180,180,180,${0.35 - s*0.06})`;
        ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();
      }
    }
    // Subtle ground shadow under car
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(carX-4, carY+carH-6, carW+8, 8);
  }

  // ---- CHARACTER SPRITE (standing in the middle of the scene) ----
  // Positioned centred-left of the scene so they don't sit BEHIND the
  // portrait box at the bottom-left of the dialogue panel. The parked
  // car sits to their right above.
  // At Blacktown the Beemer takes up more room, so shift Brenno LEFT
  // a bit so he doesn't end up half behind the bonnet.
  const charKey = 'char_' + currentCharacter;
  const charImg = SPRITES[charKey];
  const charBaseY = H*0.57;        // feet at ~57% down
  const charH     = 130;
  const charW     = 100;
  const charX     = (currentSuburb === 'BLACKTOWN') ? 12 : 125;
  if(showChar && charImg) {
    // Frame 2 = south (facing viewer), each frame = sheet.width/4 wide
    const fw = charImg.width / 4;
    ctx.drawImage(charImg, fw*2, 0, fw, charImg.height, charX, charBaseY - charH, charW, charH);
    // Subtle foot-shadow beneath character
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(charX + charW/2, charBaseY, charW*0.38, 7, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ---- MINI CHARACTER IN CAR (leaning out driver window) ----
  // Used when the car has arrived but the character hasn't fully emerged
  // yet — Rahul leans out the window with a samosa, Khoa hands a bag, etc.
  // Draws frame 2 (south-facing) of the same char_<id> sheet at ~40% size,
  // positioned over the driver's-side window of the parked car.
  if(stage.charMini && carImg && charImg) {
    const fw = charImg.width / 4;
    const miniW = 52;
    const miniH = 68;
    // Driver window sits roughly 12% from front of car along x-axis,
    // around 15% down from top of car along y-axis (sticks out the window)
    const miniX = carX + carW*0.18;
    const miniY = carY - miniH*0.18;
    ctx.drawImage(charImg, fw*2, 0, fw, charImg.height, miniX, miniY, miniW, miniH);
    // Tiny shadow on the bonnet from the leaning torso
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.beginPath();
    ctx.ellipse(miniX + miniW/2, miniY + miniH*0.95, miniW*0.34, 4, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ---- DIALOGUE OVERLAY (darken bottom for panel readability) ----
  const overlay = ctx.createLinearGradient(0,H*0.53,0,H*0.67);
  overlay.addColorStop(0,'rgba(5,8,15,0)');
  overlay.addColorStop(1,'rgba(5,8,15,0.98)');
  ctx.fillStyle=overlay;
  ctx.fillRect(0,H*0.53,W,H*0.14);
  ctx.fillStyle='rgba(5,8,15,0.98)';
  ctx.fillRect(0,H*0.67,W,H*0.33);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id;
}

function gotoTitle() {
  // Reset progress for a fresh playthrough.
  // Blacktown is the starting suburb (always unlocked); everything else locked.
  gameProgress.blacktownBeaten    = false;
  gameProgress.parramattaUnlocked = false; gameProgress.parramattaBeaten = false;
  gameProgress.cabramattaUnlocked = false; gameProgress.cabramattaBeaten = false;
  gameProgress.penrithUnlocked    = false; gameProgress.penrithBeaten    = false;
  gameProgress.liverpoolUnlocked  = false; gameProgress.liverpoolBeaten  = false;
  gameProgress.easterncreekUnlocked = false; gameProgress.easterncreekBeaten = false;
  currentSuburb    = 'BLACKTOWN';
  currentSuburbBg  = 'bg_blacktown';
  currentCharacter = 'bazza';
  showScreen('title-screen');
  drawBgScene();
  if(typeof startTitleRoadAnim === 'function') startTitleRoadAnim();
  if(typeof startTitleCityAnim === 'function') startTitleCityAnim();
}

function gotoSuburbSelect() {
  populateSuburbs();
  showScreen('char-select');
}

function gotoDialogue(dialogueId) {
  currentGraph = DIALOGUES[dialogueId];
  // Pick the scene backdrop: dialogue-specific override, else suburb default
  currentDialogueBg = (currentGraph && currentGraph.sceneBg) || null;
  // Reset the per-dialogue used-choices set so re-entering a dialogue
  // (e.g. retry after losing a mini-game) starts with all options open.
  if(currentGraph) currentGraph._usedChoices = new Set();
  drawDialogueScene();
  showScreen('dialogue-screen');
  if(!currentGraph) return;
  startNode(currentGraph.defaultStartNodeId);
}

function gotoEnd(title, msg) {
  document.getElementById('end-title').innerText = title;
  document.getElementById('end-msg').innerText   = msg;
  showScreen('end-screen');
  drawBgScene();
}

function populateSuburbs() {
  const list = document.getElementById('suburb-list');
  list.innerHTML = '';
  getEncounters().forEach((enc) => {
    const card = document.createElement('div');
    card.className = 'suburb-card' + (enc.locked?' locked':'');
    card.innerHTML = `
      <div class="suburb-name">${enc.suburb}</div>
      <div class="suburb-desc">${enc.desc}</div>
      <div class="suburb-rep">${enc.rep}</div>
    `;
    if(!enc.locked) card.onclick = () => {
      currentSuburb    = enc.suburb;
      currentSuburbBg  = enc.suburb === 'BLACKTOWN'     ? 'bg_blacktown'
                       : enc.suburb === 'CABRAMATTA'    ? 'bg_cabramatta'
                       : enc.suburb === 'PENRITH'       ? 'bg_penrith'
                       : enc.suburb === 'LIVERPOOL'     ? 'bg_liverpool'
                       : enc.suburb === 'EASTERN CREEK' ? 'bg_easterncreek'
                       : 'bg_parramatta';
      currentCharacter = enc.character || 'bazza';
      gotoTransition(enc.suburb, () => gotoDialogue(enc.dialogueId));
    };
    list.appendChild(card);
  });
}

// =============================================
//  DIALOGUE ENGINE
// =============================================
function startNode(nodeId) {
  const node = currentGraph.nodes.find(n=>n.id===nodeId);
  if(!node){ endDialogue(); return; }
  currentNode = node;
  renderNode(node);
}

function renderNode(node) {
  const isNarrator = (node.speakerId === 'narrator');

  // Re-render the scene canvas so per-node stage flags (hideCar/hideChar/charMini)
  // take effect when advancing nodes (e.g. Harris Park: Rahul's car appears,
  // then Rahul leans out the window on the next click).
  drawDialogueScene();

  // Toggle the animated scene-overlay image (e.g. engine bay diagnostic GIF)
  const overlayImg = document.getElementById('scene-overlay-img');
  if(overlayImg) {
    if(node.sceneImage && SCENE_IMAGE_SRCS[node.sceneImage]) {
      overlayImg.src = SCENE_IMAGE_SRCS[node.sceneImage];
      overlayImg.style.display = 'block';
    } else {
      overlayImg.style.display = 'none';
    }
  }

  // Speaker name
  document.getElementById('speaker-name').innerText = isNarrator
    ? '...' : (NAMES[node.speakerId] || node.speakerId.toUpperCase());

  // Portrait
  if(isNarrator) {
    // Narrator: open storyteller's book sprite (PixelLab). If the sprite
    // hasn't loaded yet, fall back to the legacy procedural cityscape so
    // the screen never goes blank during sprite loading.
    const canvas = document.getElementById('portrait-canvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0,0,64,64);
    const bookImg = SPRITES['portrait_narrator_default'];
    if(bookImg) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(bookImg, 0, 0, 64, 64);
    } else {
      // Procedural fallback (dim cityscape with lit windows) — same as before
      ctx.fillStyle = '#06080f'; ctx.fillRect(0,0,64,64);
      [[4,16,10,48],[16,20,8,44],[28,12,12,52],[44,18,10,46],[56,22,8,42]].forEach(([x,y,w,h])=>{
        ctx.fillStyle='#111828'; ctx.fillRect(x,y,w,h);
      });
      [[6,22,3,3,'#ff9944'],[8,30,3,3,'#ffcc66'],[18,24,3,3,'#aaddff'],[30,16,3,3,'#ff6600'],
       [32,26,3,3,'#ffcc66'],[46,22,3,3,'#aaddff'],[58,26,3,3,'#ff9944']].forEach(([x,y,w,h,c])=>{
        ctx.fillStyle=c+'99'; ctx.fillRect(x,y,w,h);
      });
      ctx.fillStyle='rgba(255,80,0,0.18)'; ctx.fillRect(0,48,64,4);
    }
  } else {
    renderPortrait(node.portrait || node.speakerId+'_default');
  }

  // Clear choices
  const choicesEl = document.getElementById('choices-area');
  choicesEl.innerHTML = '';
  document.getElementById('tap-hint').style.display = 'none';

  // Clear pending state from previous node
  _pendingEvent = null;
  _pendingNext  = null;

  // Typewriter text
  typeText(node.text, () => {
    if(node.end) {
      // 'end' nodes still need a tap to actually leave
      document.getElementById('tap-hint').style.display = 'block';
      _pendingNext = '__END__';
    } else if(node.triggerEvent) {
      document.getElementById('tap-hint').style.display = 'block';
      _pendingEvent = node.triggerEvent;
    } else if(node.choices && node.choices.length > 0) {
      renderChoices(node.choices);
    } else if(node.next || node.autoNext) {
      // Both 'next' and legacy 'autoNext' now require a tap to advance
      document.getElementById('tap-hint').style.display = 'block';
      _pendingNext = node.next || node.autoNext;
    } else {
      document.getElementById('tap-hint').style.display = 'block';
    }
  });
}

function typeText(text, onDone) {
  const el = document.getElementById('dialogue-text');
  el.textContent = '';
  if(typeTimer) cancelAnimationFrame(typeTimer);
  typing = true;
  let i=0, built='', lastTs=null, pending=0;
  const MS_PER_CHAR = 30;

  function frame(ts) {
    if(lastTs === null) lastTs = ts;
    pending += ts - lastTs;
    lastTs = ts;

    // Consume as many chars as time allows
    while(pending >= MS_PER_CHAR && i < text.length) {
      built += text[i++];
      pending -= MS_PER_CHAR;
    }
    el.textContent = built;

    if(i >= text.length) {
      typing = false;
      onDone && onDone();
      return;
    }
    typeTimer = requestAnimationFrame(frame);
  }
  typeTimer = requestAnimationFrame(frame);
}

function skipTyping() {
  if(!typing||!currentNode) return;
  cancelAnimationFrame(typeTimer);
  typing=false;
  document.getElementById('dialogue-text').textContent = currentNode.text;
  if(currentNode.end) {
    document.getElementById('tap-hint').style.display='block';
    _pendingNext = '__END__';
  } else if(currentNode.triggerEvent) {
    document.getElementById('tap-hint').style.display='block';
    _pendingEvent = currentNode.triggerEvent;
  } else if(currentNode.choices && currentNode.choices.length>0) {
    renderChoices(currentNode.choices);
  } else if(currentNode.next || currentNode.autoNext) {
    document.getElementById('tap-hint').style.display='block';
    _pendingNext = currentNode.next || currentNode.autoNext;
  } else {
    document.getElementById('tap-hint').style.display='block';
  }
}

function renderChoices(choices) {
  const el = document.getElementById('choices-area');
  el.innerHTML='';
  const curNodeId = currentNode && currentNode.id;
  // Used-choices set lives on the current dialogue graph so it resets
  // automatically when entering a new dialogue via gotoDialogue.
  if(currentGraph && !currentGraph._usedChoices) currentGraph._usedChoices = new Set();
  const used = currentGraph ? currentGraph._usedChoices : new Set();
  // Edge case: if EVERY choice has already been used (e.g. player looped
  // back to the same node), unlock them so they can't get soft-locked.
  const allUsed = choices.every(ch => used.has(curNodeId + '|' + ch.text));
  choices.forEach((ch,i)=>{
    const key = curNodeId + '|' + ch.text;
    const isUsed = used.has(key) && !allUsed;
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (isUsed ? ' used' : '');
    btn.innerText = ch.text;
    if(isUsed) {
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        used.add(key);
        el.innerHTML='';
        startNode(ch.next);
      };
    }
    el.appendChild(btn);
  });
}

function onDialogueTap() {
  if(typing){ skipTyping(); return; }
  // Tap fires the pending event (e.g. start race) if any
  if(_pendingEvent) {
    const ev = _pendingEvent;
    _pendingEvent = null;
    document.getElementById('tap-hint').style.display = 'none';
    handleEvent(ev);
    return;
  }
  // Tap advances to the next node if one is pending
  if(_pendingNext) {
    const nextId = _pendingNext;
    _pendingNext = null;
    document.getElementById('tap-hint').style.display = 'none';
    if(nextId === '__END__') {
      gotoEnd(currentNode.endTitle || '...', currentNode.endMsg || '');
    } else {
      startNode(nextId);
    }
    return;
  }
  // Choices and dead-ends do nothing on tap
}

function handleEvent(eventName) {
  // ---- Race start events: pick rival car for the race ----
  if(eventName === 'start_race_blacktown') {
    gotoRace('wrx');          // Merrylands crew's WRX
  } else if(eventName === 'start_race_parramatta') {
    gotoRace('camry');        // Preet's sleeper Camree
  } else if(eventName === 'start_sesh_cabramatta') {
    gotoSesh();               // Khoa's Cabra carpark stealth deal
  } else if(eventName === 'start_race_penrith') {
    gotoHill();           // Macca's side-scroll 4x4 hill climb
  } else if(eventName === 'start_race_liverpool') {
    gotoRace('amg');          // Habibi's AGM (the final boss)

  // ---- Unlock chain: Blacktown -> Parramatta -> Cabramatta -> Penrith -> Liverpool ----
  } else if(eventName === 'unlock_parramatta_brenno') {
    // Brenno scene completes without a race — engine inspect + lift offer.
    // Mark Blacktown beaten so the next visit shows post-state, and open Parramatta.
    gameProgress.blacktownBeaten    = true;
    gameProgress.parramattaUnlocked = true;
    setTimeout(gotoSuburbSelect, 1200);
  } else if(eventName === 'unlock_parramatta') {
    gameProgress.parramattaUnlocked = true;
    setTimeout(gotoSuburbSelect, 1200);
  } else if(eventName === 'unlock_cabramatta') {
    gameProgress.cabramattaUnlocked = true;
    setTimeout(gotoSuburbSelect, 1200);
  } else if(eventName === 'unlock_penrith') {
    gameProgress.penrithUnlocked = true;
    setTimeout(gotoSuburbSelect, 1200);
  } else if(eventName === 'unlock_liverpool') {
    gameProgress.liverpoolUnlocked = true;
    setTimeout(gotoSuburbSelect, 1200);
  } else if(eventName === 'unlock_easterncreek') {
    gameProgress.easterncreekUnlocked = true;
    setTimeout(gotoSuburbSelect, 1200);
  } else if(eventName === 'start_drag_easterncreek') {
    gotoDrag();   // see the new drag-race engine below

  } else if(eventName === 'return_to_map') {
    setTimeout(gotoSuburbSelect, 1000);
  }
}

function endDialogue() {
  gotoEnd('TO BE CONTINUED...','More of Streeto coming soon.');
}

// =============================================
//  PORTRAIT RENDERING
// =============================================
// Map character name -> default PixelLab portrait key we have a PNG for.
// Any emotion variant for a character falls back to its default PNG.
const CHAR_DEFAULT_PORTRAIT = {
  habibi: 'portrait_habibi_smug',
  pigcop: 'portrait_pigcop_default',
  eshay:  'portrait_bazza_default',
  preet:  'portrait_preet_default',
  khoa:   'portrait_khoa_default',
  macca:  'portrait_macca_default',
  bazza:  'portrait_bazza_default',
  player: 'portrait_player_default',
};

function renderPortrait(key) {
  const canvas = document.getElementById('portrait-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,64,64);

  // Try exact emotion match first (e.g. portrait_habibi_proud)
  const exactKey = 'portrait_' + key;
  if(SPRITES[exactKey]) {
    ctx.drawImage(SPRITES[exactKey], 0, 0, 64, 64);
    return;
  }

  // Fall back to the character's default PNG (e.g. habibi_proud -> portrait_habibi_smug)
  const character = key.split('_')[0];           // 'habibi_proud' -> 'habibi'
  const fallbackKey = CHAR_DEFAULT_PORTRAIT[character];
  if(fallbackKey && SPRITES[fallbackKey]) {
    ctx.drawImage(SPRITES[fallbackKey], 0, 0, 64, 64);
    return;
  }

  // Final fallback: procedural pixel art (legacy)
  ctx.fillStyle='#0d1224'; ctx.fillRect(0,0,64,64);
  const fn = PORTRAITS[key];
  if(fn) fn(ctx);
}

const SPRITES = {};

// Separate registry for ANIMATED scene images (GIFs) that need to be live
// <img> elements appended to the document so the browser animates them.
// Used for full-scene takeover backdrops like the dodgy M52 engine bay.
const SCENE_IMAGE_SRCS = {
  engine_bay: 'sprites/engine_bay.gif',
};
const SCENE_IMAGES = {};
function loadSceneImages() {
  for(const key in SCENE_IMAGE_SRCS) {
    const img = new Image();
    img.src = SCENE_IMAGE_SRCS[key];
    SCENE_IMAGES[key] = img;
  }
}
loadSceneImages();

function loadAllSprites(onDone) {
  const keys = Object.keys(SPRITE_SRCS);
  let done = 0;
  keys.forEach(k => {
    const img = new Image();
    const finish = () => { done++; if(done === keys.length) onDone(); };
    img.onload  = () => { SPRITES[k] = img; finish(); };
    img.onerror = finish; // missing file — graceful skip, fallback drawing used
    img.src = SPRITE_SRCS[k];
  });
}

// Helper: draw from a horizontal sprite sheet (4 frames: east/west/south/north)
// frameIdx: 0=east 1=west 2=south 3=north
function drawSheet(ctx, key, frameIdx, x, y, w, h) {
  const img = SPRITES[key];
  if(!img) return false;
  const fw = img.width / 4;
  ctx.drawImage(img, frameIdx * fw, 0, fw, img.height, x, y, w, h);
  return true;
}

// =============================================
//  TOP-DOWN VERTICAL-SCROLL RACE ENGINE
//  Cars face NORTH (up). World scrolls DOWN towards player.
//  Player car fixed near bottom. Rival visible above (ahead).
// =============================================

// --- Canvas constants (drawing resolution) ---
const RC_W  = 390;
const RC_H  = 724;
const RC_CX = RC_W / 2;

// --- Road geometry ---
const RC_ROAD_W    = 260;          // road width in pixels
const RC_ROAD_X    = (RC_W - RC_ROAD_W) / 2; // left edge of road
const RC_ROAD_RIGHT = RC_ROAD_X + RC_ROAD_W;
const RC_SIDE_W    = RC_ROAD_X;    // side strip width (each side)
const RC_LANE_COUNT = 4;
const RC_LANE_W    = RC_ROAD_W / RC_LANE_COUNT; // 65px per lane

// --- Hand-drawn pixel art road tile (built once at startup) ---
// 260 wide x 240 tall, vertically tileable. Drawn pixel-perfect:
// asphalt base + asphalt grit + solid white edge stripes + dashed white
// lane dividers between 0-1 and 2-3 + dashed yellow centre line between
// lanes 1-2. Period = 60px so 240px = exactly 4 dash periods (no seam).
let HANDDRAWN_ROAD = null;
function buildRoadTile() {
  const w = RC_ROAD_W;      // 260
  const h = 240;             // 4 dash periods of 60px each
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- Asphalt base ----
  ctx.fillStyle = '#26262c';
  ctx.fillRect(0, 0, w, h);

  // ---- Asphalt grit / specks (deterministic pseudo-random) ----
  // Use a seeded sin-based RNG so the tile is identical every refresh
  const rand = (n) => { const x = Math.sin(n * 12.9898) * 43758.5453; return x - Math.floor(x); };
  for(let i = 0; i < 420; i++) {
    const x = Math.floor(rand(i * 2) * w);
    const y = Math.floor(rand(i * 2 + 1) * h);
    const v = rand(i * 3 + 7);
    if(v < 0.25)      ctx.fillStyle = '#33333a';
    else if(v < 0.55) ctx.fillStyle = '#2e2e34';
    else              ctx.fillStyle = '#222228';
    ctx.fillRect(x, y, 1, 1);
  }
  // A few brighter specks (small reflective rocks)
  for(let i = 0; i < 40; i++) {
    const x = Math.floor(rand(i * 11 + 50) * w);
    const y = Math.floor(rand(i * 11 + 51) * h);
    ctx.fillStyle = '#3a3a44';
    ctx.fillRect(x, y, 1, 1);
  }

  // ---- Solid white edge stripes ----
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(3,        0, 3, h);     // left edge stripe
  ctx.fillRect(w - 6,    0, 3, h);     // right edge stripe

  // ---- Dashed white lane dividers (between 0-1 and 2-3) ----
  const dashPeriod = 60, dashLen = 30;
  ctx.fillStyle = '#c8c8c8';
  for(let yy = 0; yy < h; yy += dashPeriod) {
    // Lane 0-1 boundary at x = 65
    ctx.fillRect(RC_LANE_W - 1,        yy, 2, dashLen);
    // Lane 2-3 boundary at x = 195
    ctx.fillRect(RC_LANE_W * 3 - 1,    yy, 2, dashLen);
  }

  // ---- Centre line: dashed YELLOW (between lane 1-2) ----
  // Slight offset on phase so it visually leads the eye to the centre
  ctx.fillStyle = '#f0c020';
  for(let yy = 0; yy < h; yy += dashPeriod) {
    ctx.fillRect(RC_LANE_W * 2 - 2, yy + 6, 3, dashLen);
  }
  // Yellow line drop-shadow for arcade glow feel
  ctx.fillStyle = 'rgba(255,180,0,0.18)';
  for(let yy = 0; yy < h; yy += dashPeriod) {
    ctx.fillRect(RC_LANE_W * 2 - 4, yy + 6, 7, dashLen);
  }

  HANDDRAWN_ROAD = c;
}

// --- Race state ---
let raceActive    = false;
let raceFinished  = false;
let raceRAF       = null;
let currentRival  = 'habibi';
let rivalSpeed    = 210;     // world-units/s
let raceCountdown = null;
let _lastRaceTs   = null;
let raceSpeedMult = 1.0;     // per-race speed multiplier (Liverpool = 1.45)

// Player (uses lateral position pX in pixels relative to road centre)
let pX      = 0;             // -RC_ROAD_W/2 .. +RC_ROAD_W/2
let pSteer  = 0;             // -1 / 0 / +1
let pSpeed  = 0;             // world-units/s
let scrollY = 0;             // total distance driven (positive)

// Rival (also lateral pX in road pixels)
let rivalLeadDist = 320;     // metres ahead of player (vertical separation)
let rivalX        = 0;       // lateral position on road
let rivalDriftT   = 0;

// Traffic
let trafficList   = [];      // each: {laneX, distAhead, spriteKey, w, h}
let spawnCooldown = 0;

// Effects + damage
let hitFlash = 0;
let playerHP = 100;            // 0 = blown engine, race over
let damageFlash = 0;           // counts down a brief red flash on every hit

// --- Player car drawing ---
// Pull frame 3 (north / facing up) from car_player sheet.
const PLAYER_CAR_W = 60, PLAYER_CAR_H = 90;
function drawPlayerCar(ctx, cx, by) {
  const x = cx - PLAYER_CAR_W/2, y = by - PLAYER_CAR_H;
  if(SPRITES.car_player) {
    const fw = SPRITES.car_player.width / 4;
    ctx.drawImage(SPRITES.car_player, fw*3, 0, fw, SPRITES.car_player.height,
                  x, y, PLAYER_CAR_W, PLAYER_CAR_H);
  } else {
    // procedural fallback
    ctx.fillStyle = '#1a4488'; ctx.fillRect(x, y, PLAYER_CAR_W, PLAYER_CAR_H);
    ctx.fillStyle = '#2266cc'; ctx.fillRect(x+3, y+3, PLAYER_CAR_W-6, PLAYER_CAR_H-6);
    ctx.fillStyle = '#222';    ctx.fillRect(x+10, y+15, PLAYER_CAR_W-20, 25);
    ctx.fillStyle = '#ff2222'; ctx.fillRect(x+5, y+PLAYER_CAR_H-10, 8, 6);
    ctx.fillRect(x+PLAYER_CAR_W-13, y+PLAYER_CAR_H-10, 8, 6);
  }
}

// --- Rival car drawing ---
// Map rival key → sprite + size + fallback colours + a north-frame index
// + an optional rotation (radians) applied when drawing. PixelLab is
// inconsistent: sometimes it generates a vertical "facing north" sprite,
// sometimes it generates only horizontal/side-view frames. For horizontal
// sprites we apply -90° (anti-clockwise) so the headlights point up and
// the rear points down toward the player.
//   northFrame — which of the 4 frames is the cleanest "rear-facing"
//   rotate     — radians of CCW rotation around the car centre at draw time
const RIVAL_INFO = {
  amg:         { sheet:'car_amg',         w:70, h:100, body:'#0a0a14', accent:'#1a1a30', light:'#ff8800', northFrame:1, rotate:0 },
  // Camry frames all came out horizontal — rotate -90° so it faces north
  camry:       { sheet:'car_camry',       w:50, h:90,  body:'#3a3a40', accent:'#54545c', light:'#ff8800', northFrame:0, rotate:-Math.PI/2 },
  silvia:      { sheet:'car_silvia',      w:65, h:100, body:'#f0f0f4', accent:'#e0e0e8', light:'#ff8800', northFrame:1, rotate:0 },
  wrx:         { sheet:'car_wrx',         w:65, h:95,  body:'#1d4aa8', accent:'#2860c0', light:'#ff8800', northFrame:1, rotate:0 },
  ranger:      { sheet:'car_ranger',      w:80, h:115, body:'#5a4f30', accent:'#7a6840', light:'#ffaa44', northFrame:0, rotate:0 },
};

function drawRivalCar(ctx, cx, by) {
  const info = RIVAL_INFO[currentRival] || RIVAL_INFO.amg;
  const { sheet, w, h, body, accent, light, northFrame, rotate } = info;
  const img = SPRITES[sheet];
  if(img) {
    const fw = img.width / 4;
    const fi = (typeof northFrame === 'number') ? northFrame : 3;
    const cy = by - h/2;  // car centre y
    if(rotate) {
      // Rotate around the car centre. The source frame is sampled at its
      // native aspect (fw × img.height) and drawn into a square of size
      // max(w, h) so a 90° rotation lands the long axis correctly.
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotate);
      // After CCW rotation, dest is drawn as (h × w) aligned to original
      ctx.drawImage(img, fw*fi, 0, fw, img.height, -h/2, -w/2, h, w);
      ctx.restore();
    } else {
      ctx.drawImage(img, fw*fi, 0, fw, img.height, cx - w/2, by - h, w, h);
    }
  } else {
    const x = cx - w/2, y = by - h;
    ctx.fillStyle = body;   ctx.fillRect(x, y, w, h);
    ctx.fillStyle = accent; ctx.fillRect(x+3, y+3, w-6, h-6);
    ctx.fillStyle = light;
    ctx.fillRect(x+3, y+h-8, 6, 5); ctx.fillRect(x+w-9, y+h-8, 6, 5);
  }
}

// --- Traffic car drawing ---
// If a PixelLab traffic sprite came back oriented wrong (facing south
// instead of north), TRAFFIC_FLIP_Y forces a 180° flip at draw time.
const TRAFFIC_FLIP_Y = {
  traffic_van_td: true,   // PixelLab kept generating the van facing south
};

function drawTrafficCar(ctx, car, cx, by) {
  const img = SPRITES[car.spriteKey];
  const w = car.w, h = car.h;
  const x = cx - w/2, y = by - h;
  if(img) {
    if(TRAFFIC_FLIP_Y[car.spriteKey]) {
      ctx.save();
      ctx.translate(cx, by - h/2);
      ctx.scale(1, -1);
      ctx.drawImage(img, -w/2, -h/2, w, h);
      ctx.restore();
    } else {
      ctx.drawImage(img, x, y, w, h);
    }
  } else {
    ctx.fillStyle = '#777788'; ctx.fillRect(x, y, w, h);
    ctx.fillStyle = '#aaaaaa'; ctx.fillRect(x+3, y+3, w-6, h-6);
    ctx.fillStyle = '#ff2222'; ctx.fillRect(x+3, y+h-7, 6, 5);
    ctx.fillRect(x+w-9, y+h-7, 6, 5);
  }
}

// --- Core race drawing ---
function drawRaceScene() {
  const canvas = document.getElementById('race-canvas');
  if(!canvas) return;
  const ctx  = canvas.getContext('2d');

  // ---- BACKDROP (off-road grass / pavement) ----
  ctx.fillStyle = '#0a0d12';
  ctx.fillRect(0, 0, RC_W, RC_H);

  // ---- SIDE STRIPS (tileable PixelLab building strips, vertical scroll) ----
  const sideKey = currentSuburb === 'BLACKTOWN'  ? 'side_blacktown'
                : currentSuburb === 'CABRAMATTA' ? 'side_cabramatta'
                : currentSuburb === 'PENRITH'    ? 'side_penrith'
                : currentSuburb === 'LIVERPOOL'  ? 'side_liverpool'
                : 'side_parra';
  const sideImg = SPRITES[sideKey];
  if(sideImg) {
    // Slower scroll for parallax depth (sides go past slower than road).
    // Player moves north (up the screen) so world should scroll DOWN — use
    // +sideOff so the rooftops flow toward the viewer (down on screen).
    const sideScroll = scrollY * 0.7;
