<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STREETO</title>
<!-- PWA — installable from phone home screen -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#ff6600">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Streeto">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --font-header: 'VT323', monospace;
  --font-body:   'Pixelify Sans', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: var(--font-body);
}

#game {
  width: 390px;
  height: 844px;
  position: relative;
  overflow: hidden;
  background: #05080f;
  image-rendering: pixelated;
}

/* ===== SCREENS ===== */
.screen { position:absolute; inset:0; display:none; flex-direction:column; }
.screen.active { display:flex; }

/* ===== STREET BG ===== */
#street-bg {
  position:absolute; inset:0; overflow:hidden;
  background: linear-gradient(180deg, #05060f 0%, #0a0d1e 40%, #111828 60%, #1a1a28 80%, #252525 100%);
}

.stars { position:absolute; top:0; left:0; right:0; height:45%; }
.star { position:absolute; background:#fff; border-radius:50%; animation: twinkle 14s infinite ease-in-out; }
@keyframes twinkle { 0%,100%{opacity:0.78} 50%{opacity:1} }

.horizon {
  position:absolute; top:44%; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, #ff6600 20%, #ff9900 50%, #ff6600 80%, transparent);
  box-shadow: 0 0 20px #ff6600, 0 0 40px #ff4400;
}

.road {
  position:absolute; bottom:0; left:0; right:0; height:56%;
  background: #1a1a20;
}
.road-line {
  position:absolute; left:50%; top:0; width:6px; height:100%;
  transform:translateX(-50%);
  background: repeating-linear-gradient(180deg, #ff6600 0px, #ff6600 40px, transparent 40px, transparent 80px);
  opacity:0.6;
  animation: roadScroll 0.6s linear infinite;
}
@keyframes roadScroll { from{background-position:0 0} to{background-position:0 80px} }

.sidewalk-l, .sidewalk-r {
  position:absolute; top:0; width:80px; height:100%;
  background: #222230;
}
.sidewalk-l { left:0; border-right:3px solid #333340; }
.sidewalk-r { right:0; border-left:3px solid #333340; }

.streetlight {
  position:absolute; bottom:50%; width:6px;
  background: #555;
  border-radius:3px;
}
.streetlight::before {
  content:''; position:absolute; top:-4px; left:-12px;
  width:30px; height:8px;
  background: #666; border-radius:4px 4px 0 0;
}
.streetlight::after {
  content:''; position:absolute; top:-50px; left:-40px;
  width:90px; height:60px;
  background: radial-gradient(ellipse at 50% 100%, rgba(255,180,0,0.35) 0%, transparent 70%);
  pointer-events:none;
}
.streetlight.l { left:55px; height:120px; }
.streetlight.r { right:55px; height:120px; }

/* ===== BUILDINGS ===== */
.building { position:absolute; bottom:44%; image-rendering:pixelated; }

/* ===== CARS ===== */
.car-lane {
  position:absolute; width:100%; height:50px;
  animation: carMove linear infinite;
}
@keyframes carMove {
  from { transform: translateX(-120px); }
  to   { transform: translateX(510px); }
}
.car-block {
  position:absolute; top:8px; height:34px; border-radius:4px;
  image-rendering: pixelated;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  justify-content: center; align-items: center;
  background: #05060e; /* covers shared #street-bg so GIFs sit on clean black */
}

/* Hand-drawn city + sky canvas on top half, hand-drawn perspective road
   canvas on bottom half. Same coordinate system so they blend at the
   centre horizon line. */
#title-city-canvas {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 50%;
  image-rendering: pixelated;
  pointer-events: none;
  z-index: 1;
  display: block;
}
#title-road-canvas {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 50%;
  image-rendering: pixelated;
  pointer-events: none;
  z-index: 1;
  display: block;
}

/* Subtle gradient overlay so the logo stays readable on top of the GIFs */
.title-overlay {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0) 0%, rgba(0,0,0,0.55) 75%);
  pointer-events: none;
  z-index: 2;
}

.title-wrap {
  z-index:10; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:16px;
  position: relative; /* needed for z-index above GIFs */
}

.game-logo {
  font-family: var(--font-header);
  font-size: 90px; letter-spacing: 6px;
  color: #ff6600;
  text-shadow: 0 0 10px #ff6600, 0 0 30px #ff4400, 0 0 60px #ff2200,
               4px 4px 0 #7a2200, 8px 8px 0 #3d1100;
  animation: logoPulse 3s ease-in-out infinite;
  line-height:1;
}
@keyframes logoPulse {
  0%,100% { text-shadow: 0 0 10px #ff6600, 0 0 30px #ff4400, 4px 4px 0 #7a2200, 8px 8px 0 #3d1100; }
  50%      { text-shadow: 0 0 20px #ff8800, 0 0 60px #ff6600, 0 0 90px #ff4400, 4px 4px 0 #7a2200, 8px 8px 0 #3d1100; }
}

.subtitle { font-family: var(--font-header); font-size:26px; color:#aaa; letter-spacing:6px; margin-top:2px; }
.tagline  { font-family: var(--font-body);   font-size:16px; color:#ff9944; margin-top:10px; line-height:1.9; text-align:center; }

.tap-prompt {
  font-family: var(--font-header);
  font-size:24px; color:#ff6600; letter-spacing:2px;
  margin-top:40px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ===== CHARACTER SELECT ===== */
#char-select {
  justify-content: flex-start; align-items: stretch;
}

.select-header {
  z-index:10; padding:24px 20px 12px;
  font-family: var(--font-header);
  font-size:28px; color:#ff6600; letter-spacing:3px;
  border-bottom:2px solid #ff660033;
}

.suburb-list {
  z-index:10; flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:8px;
}

.suburb-card {
  background:#0d1224; border:2px solid #1e2a44;
  padding:14px 16px; cursor:pointer;
  transition: border-color 0.1s, background 0.1s;
  display:flex; flex-direction:column; gap:4px;
  image-rendering:pixelated;
}
.suburb-card:hover, .suburb-card:active { border-color:#ff6600; background:#12192e; }
.suburb-card.locked { opacity:0.4; cursor:not-allowed; }

.suburb-name { font-family: var(--font-header); font-size:26px; color:#ff9944; letter-spacing:2px; }
.suburb-desc { font-family: var(--font-body);   font-size:13px; color:#8899aa; line-height:1.6; }
.suburb-rep  { font-family: var(--font-body);   font-size:13px; color:#ff6600; margin-top:2px; }

/* Trophy Room button — close on the modal, play-again at end */
.trophy-btn {
  z-index:10; margin:8px 16px 16px; padding:12px 14px;
  background: rgba(255,170,40,0.08); border:2px solid #ffaa3399;
  color:#ffcc66; font-family:var(--font-header); font-size:18px;
  letter-spacing:3px; cursor:pointer; text-align:center;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}
.trophy-btn:hover, .trophy-btn:active {
  background: rgba(255,170,40,0.20); border-color:#ffaa33; color:#ffe19a;
}
/* ===== REWARD UNLOCK CELEBRATION OVERLAY =====
   All glows / sparkles use hard-edged stops + offsets instead of blur
   so the look stays chunky pixel art (no smooth vector haze). */
#reward-unlock-screen {
  flex-direction:column; align-items:center; justify-content:center;
  /* Stepped radial = banded rings instead of smooth gradient */
  background: radial-gradient(ellipse at 50% 45%,
    rgba(255,160,40,0.18) 0%,   rgba(255,160,40,0.18) 18%,
    rgba(255,120,30,0.12) 18%,  rgba(255,120,30,0.12) 36%,
    rgba(60,30,10,0.85) 36%,    rgba(60,30,10,0.85) 60%,
    rgba(6,7,13,0.97) 60%);
  overflow:hidden;
}
.reward-unlock-card {
  display:flex; flex-direction:column; align-items:center;
  padding:30px 26px 22px; gap:12px;
  border:3px solid #ffaa33;
  background:linear-gradient(180deg, #16100a 0%, #08060d 100%);
  /* Nested solid outlines instead of blurred glow */
  box-shadow:
    0 0 0 3px #08060d,
    0 0 0 6px #ff8800,
    0 0 0 9px rgba(255,170,40,0.30),
    0 0 0 12px rgba(255,80,0,0.18);
  animation: rewardCardEntry 0.5s cubic-bezier(0.18, 1.6, 0.45, 1.0) both;
}
@keyframes rewardCardEntry {
  0%   { transform: scale(0.6) rotate(-3deg); opacity:0; }
  60%  { transform: scale(1.05) rotate(1deg); opacity:1; }
  100% { transform: scale(1) rotate(0); opacity:1; }
}
.reward-unlock-label {
  font-family:var(--font-header); color:#ffe19a; font-size:22px;
  letter-spacing:6px;
  /* Hard pixel outline — no blur */
  text-shadow:
    2px 0 0 #ff8800, -2px 0 0 #ff8800,
    0 2px 0 #ff8800, 0 -2px 0 #ff8800;
  animation: rewardLabelPulse 1.4s steps(2,end) infinite;
}
@keyframes rewardLabelPulse {
  0%, 100% {
    transform:scale(1);
    text-shadow:
      2px 0 0 #ff8800, -2px 0 0 #ff8800,
      0 2px 0 #ff8800, 0 -2px 0 #ff8800;
  }
  50% {
    transform:scale(1.06);
    text-shadow:
      3px 0 0 #ffaa33, -3px 0 0 #ffaa33,
      0 3px 0 #ffaa33, 0 -3px 0 #ffaa33,
      3px 3px 0 #ff6600, -3px -3px 0 #ff6600,
      3px -3px 0 #ff6600, -3px 3px 0 #ff6600;
  }
}
.reward-unlock-icon-wrap {
  position:relative;
  width:200px; height:200px;
  display:flex; align-items:center; justify-content:center;
  margin:6px 0 10px;
}
.reward-unlock-halo {
  position:absolute; inset:0;
  /* Concentric hard rings — looks like a chunky pixel halo */
  background: radial-gradient(circle at center,
    rgba(255,220,120,0.60) 0%,   rgba(255,220,120,0.60) 18%,
    rgba(255,160,50,0.45) 18%,   rgba(255,160,50,0.45) 36%,
    rgba(255,110,30,0.28) 36%,   rgba(255,110,30,0.28) 54%,
    rgba(255,80,0,0.12) 54%,     rgba(255,80,0,0.12) 72%,
    rgba(255,80,0,0) 72%);
  animation: rewardHaloPulse 1.6s steps(3,end) infinite;
  pointer-events:none;
}
@keyframes rewardHaloPulse {
  0%, 100% { transform: scale(0.88); opacity:0.75; }
  50%      { transform: scale(1.18); opacity:1.0; }
}
.reward-unlock-icon {
  width:140px; height:140px; image-rendering:pixelated;
  position:relative; z-index:2;
  animation: rewardIconEntry 0.85s cubic-bezier(0.18, 1.7, 0.4, 1.0) both,
             rewardIconBob 2.4s ease-in-out infinite 0.85s;
  /* Hard pixel drop-shadow — chunky 3px offset, no blur */
  filter:
    drop-shadow(3px 3px 0 rgba(255,80,0,0.65))
    drop-shadow(-3px -3px 0 rgba(255,170,40,0.40));
}
@keyframes rewardIconEntry {
  0%   { transform: scale(0); opacity:0; }
  55%  { transform: scale(1.35); opacity:1; }
  75%  { transform: scale(0.92); }
  100% { transform: scale(1); }
}
@keyframes rewardIconBob {
  0%, 100% { transform: translateY(0) scale(1); }
  50%      { transform: translateY(-6px) scale(1.04); }
}
/* Chunky pixel "plus" sparkle: 4px white core, 4px white arms, 8px-out
   warm-yellow tips. Built from box-shadow stacks — no blur, no smooth
   gradient, pure pixel rectangles. */
.reward-unlock-spark {
  position:absolute; width:4px; height:4px;
  background:#ffffff;
  box-shadow:
    -4px 0 0 #ffffff,  4px 0 0 #ffffff,
    0 -4px 0 #ffffff,  0 4px 0 #ffffff,
    -8px 0 0 #ffeb88,  8px 0 0 #ffeb88,
    0 -8px 0 #ffeb88,  0 8px 0 #ffeb88;
  pointer-events:none;
  animation: rewardSparkOrbit 2.0s linear infinite;
  --o: 0deg;
  --r: 90px;
  transform: rotate(var(--o)) translateX(var(--r)) rotate(calc(-1 * var(--o)));
}
.reward-unlock-spark.s1 { --o:   0deg; animation-delay: 0s;   }
.reward-unlock-spark.s2 { --o:  60deg; animation-delay: 0.18s; }
.reward-unlock-spark.s3 { --o: 120deg; animation-delay: 0.36s; }
.reward-unlock-spark.s4 { --o: 180deg; animation-delay: 0.54s; }
.reward-unlock-spark.s5 { --o: 240deg; animation-delay: 0.72s; }
.reward-unlock-spark.s6 { --o: 300deg; animation-delay: 0.90s; }
/* steps() makes the orbit jump position-to-position like an old game */
@keyframes rewardSparkOrbit {
  0%   { transform: rotate(var(--o)) translateX(var(--r)) rotate(calc(-1 * var(--o))) scale(0); opacity:0; }
  15%  { opacity:1; }
  100% { transform: rotate(calc(var(--o) + 360deg)) translateX(var(--r)) rotate(calc(-1 * (var(--o) + 360deg))) scale(1.2); opacity:0; }
}
.reward-unlock-name {
  font-family:var(--font-header); color:#ffcc66; font-size:32px;
  letter-spacing:4px; text-align:center;
  /* Hard pixel outline + diagonal pixel shadow */
  text-shadow:
    2px 0 0 #ff6600, -2px 0 0 #ff6600,
    0 2px 0 #ff6600, 0 -2px 0 #ff6600,
    3px 3px 0 #5a2200;
}
.reward-unlock-from {
  font-family:var(--font-body); color:#88aacc; font-size:12px;
  letter-spacing:2px; text-align:center; margin-bottom:14px;
}
#reward-unlock-btn { margin-top:6px; }

/* Tiny floating trophies icon on the dialogue screen so the player can
   peek their inventory mid-run without breaking the linear flow */
#trophy-peek-btn {
  position:absolute; top:8px; right:8px; z-index:50;
  width:36px; height:36px;
  background: rgba(10,12,20,0.75);
  border:2px solid #ffaa3388;
  color:#ffcc66;
  font-family:var(--font-header); font-size:18px;
  cursor:pointer; padding:0;
  display:flex; align-items:center; justify-content:center;
  text-shadow: 0 0 6px #ff880088;
}
#trophy-peek-btn:hover, #trophy-peek-btn:active {
  background: rgba(255,170,40,0.30); border-color:#ffaa33;
}
#trophy-screen { flex-direction:column; background:#06070d; }
#trophy-x-btn {
  position:absolute; top:10px; right:10px; z-index:60;
  width:40px; height:40px; padding:0;
  background: rgba(20,15,8,0.85);
  border:2px solid #ffaa3399;
  color:#ffcc66;
  font-family:var(--font-header); font-size:22px; line-height:1;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#trophy-x-btn:hover, #trophy-x-btn:active {
  background: rgba(255,170,40,0.30); border-color:#ffaa33; color:#ffe19a;
}
.trophy-grid {
  z-index:10; flex:1; overflow-y:auto; padding:18px;
  display:grid; grid-template-columns: 1fr 1fr; gap:14px;
  align-content:start;
}
.trophy-slot {
  background:#0d1020; border:2px solid #1f2840;
  padding:10px; display:flex; flex-direction:column;
  align-items:center; gap:6px;
}
.trophy-slot.earned { border-color:#ffaa33; background:#1a1108; box-shadow:0 0 18px rgba(255,170,40,0.18) inset; }
.trophy-slot img {
  width:96px; height:96px; image-rendering:pixelated;
  background:rgba(0,0,0,0.35); border-radius:2px;
}
.trophy-slot.locked img { filter: brightness(0.10) saturate(0); opacity:0.7; }
.trophy-slot-name {
  font-family:var(--font-header); font-size:14px;
  color:#ffcc66; letter-spacing:2px; text-align:center;
}
.trophy-slot.locked .trophy-slot-name { color:#3a4555; }
.trophy-slot-from {
  font-family:var(--font-body); font-size:10px;
  color:#88aacc; letter-spacing:1px; text-align:center;
}
.trophy-slot.locked .trophy-slot-from { color:#2a3548; }

/* ===== DIALOGUE SCREEN ===== */
#dialogue-screen {
  justify-content: flex-end;
}

.scene-canvas {
  position:absolute; inset:0;
}
/* Per-suburb scene GIF. Fills the area above the dialogue panel — sized
   to roughly reach the panel's top edge (65% of the 844-tall screen
   ≈ 549px). object-fit:cover scales the 400x400 source up by ~1.37x
   so the height fills 549px; the central content stays visible while
   ~80px crops off each side. Characters + cars are centred in the
   source so they survive the side crop. */
#scene-bg-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 65%;
  object-fit: cover;
  object-position: center;
  image-rendering: pixelated;
  z-index: 1;
  pointer-events: none;
}
/* Animated scene takeover image (e.g. Brenno's engine bay diagnostic GIF).
   Sits above the canvas backdrop, below the dialogue panel.
   Centered horizontally in the top section. */
#scene-overlay-img {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 370px;
  height: 370px;
  image-rendering: pixelated;
  z-index: 5;
  border: 2px solid #ff660088;
  background: #04050e;
  pointer-events: none;
}

.dialogue-panel {
  z-index:20; position:relative;
  background: rgba(5, 10, 20, 0.95);
  border-top: 3px solid #ff6600;
  box-shadow: 0 -10px 40px rgba(255,100,0,0.2);
  padding: 0 0 20px;
  min-height: 320px;
}

.portrait-row {
  display:flex; align-items:flex-end;
  padding: 0 16px;
  gap: 14px;
  margin-top: -70px;
}

.portrait-wrap {
  flex-shrink:0; position:relative;
  width:100px; height:100px;
  border:3px solid #ff6600;
  background:#0a1020;
  box-shadow: 0 0 20px rgba(255,100,0,0.5);
  image-rendering: pixelated;
}

.portrait-wrap canvas {
  width:100%; height:100%;
  image-rendering:pixelated;
  display:block;
}

.speaker-block { flex:1; padding-top:70px; }
.speaker-name {
  font-family: var(--font-header);
  font-size:28px; color:#ff6600; letter-spacing:2px; margin-bottom:4px;
}

.dialogue-body { padding:12px 20px 8px; }
.dialogue-text {
  font-family: var(--font-body);
  font-size:16px; color:#e8ddb5; line-height:1.7;
  min-height:70px;
  white-space: pre-wrap;
}

.choices-area { padding:10px 16px 0; display:flex; flex-direction:column; gap:7px; }
.choice-btn {
  background:#0a1020; border:2px solid #1e2a44;
  color:#aabbcc;
  font-family: var(--font-body);
  font-size:14px;
  padding:10px 14px; text-align:left; cursor:pointer;
  line-height:1.5;
  transition: border-color 0.1s, color 0.1s, background 0.1s;
}
.choice-btn:hover, .choice-btn:active {
  border-color:#ff6600; color:#ff9944; background:#12192e;
}
.choice-btn::before { content:'> '; color:#ff6600; }
.choice-btn.used {
  background:#070a14;
  border-color:#1a1f30;
  color:#3a4555;
  cursor:default;
  text-decoration:line-through;
  opacity:0.55;
}
.choice-btn.used:hover {
  background:#070a14;
  border-color:#1a1f30;
  color:#3a4555;
}
.choice-btn.used::before { content:'x '; color:#3a4555; }

.tap-continue {
  font-family: var(--font-header);
  font-size:18px; color:#ff660088; text-align:right;
  padding:6px 20px 0; letter-spacing:1px;
  animation: blink 1.2s step-end infinite;
}

/* ===== RACE SCREEN ===== */
#race-screen {
  flex-direction: column;
  background: #050508;
}

#race-canvas {
  display: block;
  width: 390px;
  flex: 1;        /* fills space between top and controls */
  min-height: 0;
  image-rendering: pixelated;
}

#race-controls {
  flex-shrink: 0;
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: #0a0a14;
  border-top: 2px solid #ff660055;
  gap: 16px;
}

.race-btn {
  flex: 1;
  height: 88px;
  background: rgba(255,100,0,0.08);
  border: 2px solid #ff660088;
  color: #ff6600;
  font-family: var(--font-header);
  font-size: 50px;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  transition: background 0.06s, border-color 0.06s;
}
.race-btn:active { background: rgba(255,100,0,0.35); border-color: #ff6600; }

#countdown-display {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);
  font-size: 140px;
  color: #ff6600;
  text-shadow: 0 0 30px #ff4400, 0 0 70px #ff2200;
  z-index: 20;
  pointer-events: none;
  background: rgba(0,0,0,0.35);
}

#race-result {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  font-family: var(--font-header);

/* Cinematic travel GIF — 400x400 native (square). Displayed centered

#transition-travel-gif {
  position: absolute;
  top: 28%;
  left: 0;
  width: 100%;
  height: 46%;
  object-fit: cover;
  object-position: center center;
  image-rendering: pixelated;

<script>
// =============================================
//  PIXEL ART PORTRAIT DRAWING
// =============================================
const PORTRAITS = {
  habibi_smug:       drawHabibi,
  habibi_proud:      drawHabibi,
  habibi_happy:      drawHabibi,
  habibi_angry:      drawHabibi,
  habibi_suspicious: drawHabibi,
  habibi_sunglasses: drawHabibi,
  pigcop_default:    drawPigCop,
  pigcop_squinting:  drawPigCop,
  pigcop_angry:      drawPigCop,
  pigcop_smug:       drawPigCop,
  eshay_default:     drawEshay,
  eshay_excited:     drawEshay,
  eshay_nervous:     drawEshay,
  eshay_sad:         drawEshay,
  eshay_thinking:    drawEshay,
  khoa_default:      drawKhoa,
  khoa_happy:        drawKhoa,
  khoa_serious:      drawKhoa,
  khoa_proud:        drawKhoa,
  macca_default:     drawMacca,
  macca_happy:       drawMacca,
  macca_serious:     drawMacca,
  macca_excited:     drawMacca,
  preet_calm:        drawPreet,
  preet_happy:       drawPreet,
  preet_serious:     drawPreet,
};

function px(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawHabibi(ctx) {
  const c = ctx;
  const BG='#0d1b3e', SK='#C47A3A', SK2='#96561A', HR='#0a0a0a',
        SG='#1a2a4a', SH='#4466aa', WH='#f4f4f4', WS='#cccccc',
        GO='#FFD000', DK='#050a14', ST='#4a2510', PK='#C09060';

  px(c,0,0,64,64,BG);
  // Hair
  px(c,18,2,28,4,HR); px(c,14,5,36,4,HR); px(c,12,8,40,3,HR);
  // Ears
  px(c,8,14,6,10,SK); px(c,50,14,6,10,SK);
  px(c,8,20,4,3,GO); // earring
  // Face
  px(c,14,10,36,26,SK);
  // Sunglasses
  px(c,14,18,16,8,SG); px(c,34,18,16,8,SG); px(c,30,20,4,5,SG);
  px(c,16,19,5,4,SH); px(c,36,19,5,4,SH);
  // Nose
  px(c,28,30,8,5,SK2);
  // Mouth (smirk)
  px(c,22,37,14,2,ST); px(c,34,35,6,2,ST);
  // Stubble
  px(c,14,35,4,3,ST); px(c,46,35,4,3,ST);
  px(c,18,38,4,2,ST); px(c,42,38,4,2,ST);
  px(c,22,40,6,2,ST);
  // Neck
  px(c,24,38,16,6,SK);
  // Shirt (white with shadow)
  px(c,0,44,64,20,WH); px(c,0,44,20,20,WS);
  // V-neck gap
  px(c,24,44,16,12,DK);
  // Gold chain
  px(c,14,50,36,3,GO); px(c,20,53,24,2,GO); px(c,26,55,12,2,GO);
  // Chain pendant (AMG badge shape)
  px(c,28,57,8,4,GO); px(c,30,56,4,2,GO);
}

function drawPigCop(ctx) {
  const c = ctx;
  const BG='#0d1224', PK='#FFB5BA', PK2='#E8929A', BL='#1B3A7A',
        BL2='#0f2550', GD='#FFD700', WH='#f0f0f0', BK='#111',
        NT='#FFD0D4', BD='#F4C2C6';

  px(c,0,0,64,64,BG);
  // Police hat
  px(c,8,2,48,6,BL2); px(c,6,7,52,4,BL); px(c,4,10,56,3,BL2);
  // Hat badge
  px(c,26,4,12,5,GD);
  // Hat brim
  px(c,2,13,60,3,BL2);
  // Ears (pig)
  px(c,6,18,8,10,PK); px(c,50,18,8,10,PK);
  px(c,7,20,6,6,PK2);
  // Face (round pig)
  px(c,10,16,44,30,PK);
  // Eyes (beady)
  px(c,20,22,8,6,BK); px(c,36,22,8,6,BK);
  px(c,22,23,3,3,'#333'); px(c,38,23,3,3,'#333');
  // Pig snout (big)
  px(c,20,34,24,12,PK2);
  px(c,24,37,6,5,BD); px(c,34,37,6,5,BD); // nostrils
  // Mouth (smug line)
  px(c,22,44,10,2,PK2); px(c,32,42,8,2,PK2);
  // Moustache
  px(c,18,32,10,3,'#8B4513'); px(c,36,32,10,3,'#8B4513');
  // Neck
  px(c,24,46,16,4,PK);
  // Uniform
  px(c,0,50,64,14,BL); px(c,0,50,12,14,BL2); px(c,52,50,12,14,BL2);
  // Badge
  px(c,26,52,12,8,GD); px(c,29,54,6,4,'#B8960C');
  // Collar
  px(c,22,50,8,6,WH); px(c,34,50,8,6,WH);
}

function drawEshay(ctx) {
  // Brenno — Sydney eshay lad: Nike TN cap, rat's tail, ciggie, popped collar
  const c = ctx;
  const BG='#111820', SK='#E8B888', SK2='#C49066', HR='#1a1a1a',

function drawMacca(ctx) {

  px(c,7,17,3,2,TN);   px(c,54,17,3,2,TN);

  px(c,28,28,8,5,SK2); px(c,30,32,4,2,TN);

  px(c,36,47,28,17,FL);  // right side

  for(let yy=49; yy<64; yy+=4){
    px(c,2,yy,26,1,FL2);
    px(c,36,yy,26,1,FL2);
  }
  for(let xx=4; xx<28; xx+=6){ px(c,xx,49,1,15,FL2); }
  for(let xx=38; xx<62; xx+=6){ px(c,xx,49,1,15,FL2); }
  // Subtle red plaid stripes
  px(c,8,52,1,12,RD); px(c,18,52,1,12,RD);
  px(c,44,52,1,12,RD); px(c,54,52,1,12,RD);
}

  khoa_intro: {
    id:"khoa_intro", defaultStartNodeId:"start",
    nodes:[
      {
        id:"start", speakerId:"narrator", portrait:null,
        sceneImage:"beat_cabra_john_st_arrival",
        text:"John St Cabramatta, behind the markets. Red lanterns and fairy lights hang between the rooftops. A young Viet Australian guy in a crisp light-blue shirt is leaning on a pearl white S14 Silvio, vaping and scrolling his phone. Brenno lets out a low whistle from the passenger seat.",

        text:"Ayyy! You're the one Brenno's been hyping up? Get over here bro, I was about to head out for phở. You want one? My shout. Cabramatta's got the best in the country, no debate.",
        choices:[

      },

        text:"All good bro. Pop the boot — bag's in the brown paper from the dosa place. Anyone asks, ya bought a samosa.",
        next:"khoa_geton_done"

        id:"khoa_geton_decline", speakerId:"khoa", portrait:"khoa_default",

      {
        id:"khoa_geton_done", speakerId:"khoa", portrait:"khoa_serious",
        text:"Right. Stash it under the seat til you're home. Cops out tonight bro — there's a Highway Patrol Commadore doin' laps of the carpark. Look, we'll do this slick. Pull up beside me, six quick things — pop the boot, I show ya the bag, ya sniff it, weigh it, count cash, hand off. All in the cop's blind spots. Easy.",

      {

        sceneImage:"beat_khoa_spotlight_brief",
        text:"Watch the spotlight bro. When it sweeps away — TAP. When it's on us — WAIT. Six beats to the swap: boot pop, eye it, sniff it, weigh it, count cash, hand-off. And from about halfway in there's a foot patrol that wanders the lot — his torch counts too. Don't get nicked. And don't make me wait too long either, I've gotta close up shop yeah.",
        triggerEvent:"start_sesh_cabramatta"

      {
        id:"khoa_backstory", speakerId:"khoa", portrait:"khoa_default",
        text:"Born here bro. Both my parents came from Vietnam in '79, boat people. Started a phở shop two streets down, still runnin' it today. I grew up doin' homework behind the counter while mum's choppin' coriander.",
        next:"khoa_backstory_2"
      },
      {
        id:"khoa_backstory_2", speakerId:"khoa", portrait:"khoa_happy",
        text:"Did my apprenticeship as a panel beater at uncle's shop in Bonnyrigg. Sundays were all about cars yeah, the boys, the music, the late night carparks. Cabra car culture runs deep bro.",

        id:"khoa_family", speakerId:"khoa", portrait:"khoa_default",
        text:"Found the S14 sittin' in a shed out in Auburn, 1996 Kouki, original SR20DET still in it. Took me two years to bring her back. Dad reckoned I should've bought a Camree. He didn't get it. He gets it now.",

        sceneImage:"beat_khoa_pho_mum_special",
        text:"That's what I'm talkin' about! Tái nạm, big bowl, extra chilli, with the bánh quẩy for dippin'. We'll grab one after I smoke ya, hahaha. Mum's special is the brisket.",
        next:"khoa_food_2"
      },
      {
        id:"khoa_food_2", speakerId:"khoa", portrait:"khoa_default",

      },
      {
        id:"khoa_explain", speakerId:"khoa", portrait:"khoa_proud",
        sceneImage:"beat_khoa_s14_engine_bay",
        text:"SR20DET, big single Garrett, front mount, T56 conversion, hydraulic handbrake for the touges. She makes a smooth 380 to the wheels. And she SLIDES bro, you don't even know.",
        next:"khoa_explain_2"
      },
      {
        id:"khoa_explain_2", speakerId:"khoa", portrait:"khoa_happy",
        sceneImage:"beat_khoa_old_pacific",
        text:"Drive her every Sunday up Old Pacific Highway with the crew. Then back to Cabra for phở. Best routine in the country yeah.",
        next:"khoa_geton_intro"
      },
      {
        id:"khoa_respect", speakerId:"khoa", portrait:"khoa_serious",
        text:"Respect bro, no chit chat. I like that. Let's sort Brenno out then — cop's circlin', we'll time it.",
        next:"khoa_geton_intro"
      }
    ]

  macca_intro: {

        id:"start", speakerId:"narrator", portrait:null,
        sceneImage:"beat_brett_penrith_vibe",
        text:"Penrith. A normal Westfield carpark with a Bunnings next door, but the bloke leaning on a jacked Toyolo Hulix in front of you is dressed like he just walked off an outback station — flannie, Akubra, work boots, mud tyres bigger than your bonnet. The Blue Mountains glow pink on the horizon.",

function initStars() {
  const stars = document.getElementById('stars');
  for (let i=0; i<80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${Math.random()*2+1}px;
      height:${s.style.width};
      animation-delay:${Math.random()*14}s;
      animation-duration:${10+Math.random()*8}s;
      opacity:${0.3+Math.random()*0.7};
    `;
    stars.appendChild(s);
  }
}

function drawBgScene() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,390,844);

  // PixelLab bg strip at horizon if loaded (behind buildings)
  const bgImg = SPRITES['bg_parramatta'];
  if(bgImg) {
    const stripH = 220, stripY = 280;
    ctx.drawImage(bgImg, 0, stripY, 390, stripH);
    // Darken to blend with night tone
    ctx.fillStyle = 'rgba(5,5,15,0.55)';
    ctx.fillRect(0, stripY, 390, stripH);
    // Fade top edge into sky
    const fg = ctx.createLinearGradient(0,stripY,0,stripY+60);
    fg.addColorStop(0,'rgba(5,6,15,1)'); fg.addColorStop(1,'rgba(5,6,15,0)');
    ctx.fillStyle=fg; ctx.fillRect(0,stripY,390,60);
  }

  // Buildings left (painted over bg)
  drawBuilding(ctx, 0,  200, 85, 280, '#111118');
  drawBuilding(ctx, 0,  150, 60, 330, '#0f0f16');
  drawBuilding(ctx, 20, 170, 50, 310, '#13131e');

  // Buildings right
  drawBuilding(ctx, 310, 180, 80, 290, '#111118');
  drawBuilding(ctx, 330, 140, 60, 350, '#0f0f16');
  drawBuilding(ctx, 305, 200, 65, 270, '#13131e');

  // Windows (lit)
  drawWindows(ctx, 5,  170, 75, 200);
  drawWindows(ctx, 315, 160, 65, 210);

  // No parked car on the shared bg-canvas — keeps the suburb select clean
}

function drawBuilding(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = '#1a1a28';
  ctx.fillRect(x, y, w, 3); // roof line
}

function drawWindows(ctx, bx, by, bw, bh) {
  const cols=3, rows=5;
  const wx=(bw-10)/(cols), wy=(bh-10)/(rows);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    const lit = Math.random() > 0.4;
    ctx.fillStyle = lit ? `rgba(255,${180+Math.random()*75},${50+Math.random()*50},${0.5+Math.random()*0.5})` : '#050508';
    ctx.fillRect(bx+5+c*wx, by+10+r*wy, wx-4, wy-4);
  }
}

function drawAMG(ctx, x, y) {
  // AMG silhouette (top-down view, facing left)
  ctx.fillStyle = '#111120';
  ctx.fillRect(x, y, 120, 54);
  ctx.fillStyle = '#1a1a30';
  ctx.fillRect(x+6, y+4, 108, 46);
  // Windscreen
  ctx.fillStyle = '#1e2a44';
  ctx.fillRect(x+10, y+10, 35, 30);
  // Roof
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(x+48, y+8, 40, 32);
  // Brake lights (orange glow)
  ctx.fillStyle = '#ff4400';
  ctx.fillRect(x+108, y+8, 8, 12);
  ctx.fillRect(x+108, y+32, 8, 12);
  ctx.fillStyle = 'rgba(255,80,0,0.3)';
  ctx.fillRect(x+90, y, 30, 54);
  // Headlights
  ctx.fillStyle = '#ffcc66';
  ctx.fillRect(x+2, y+8, 8, 10);
  ctx.fillRect(x+2, y+32, 8, 10);
}

// =============================================
//  SCENE CANVAS (dialogue bg)
// =============================================
function drawDialogueScene() {
  const canvas = document.getElementById('scene-canvas');
  const ctx = canvas.getContext('2d');
  const W=390, H=844;
  const HZ = H*0.44; // horizon line

  // If a sceneImage overlay is active, paint a solid dark backdrop
  // behind it (the overlay <img> handles the animation itself via the
  // DOM, which is necessary for the GIF to actually play).
  if(currentNode && currentNode.sceneImage) {
    ctx.fillStyle = '#04050e';
    ctx.fillRect(0, 0, W, H);
    return;
  }

  // ---- SKY ----
  const sky = ctx.createLinearGradient(0,0,0,HZ);
  sky.addColorStop(0,'#04050e');
  sky.addColorStop(0.65,'#08101e');
  sky.addColorStop(1,'#0d1428');
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,HZ);

  // Stars — positions cached once so they don't teleport every redraw.
  // (Without the cache, the Blacktown smoke-plume RAF loop re-randomises
  // 55 stars at 60fps, which reads as "stars zipping around the sky".)
  // Twinkle is phase-based off Date.now() so each star pulses at a slow
  // crawl rate, ~0.07-0.12 cycles/sec (one full pulse every ~10-14s).
  if(!_bgStarCache || _bgStarCache.w !== W || _bgStarCache.h !== HZ){
    const arr = [];
    for(let i=0;i<55;i++){
      arr.push({
        x: Math.random()*W|0,
        y: Math.random()*(HZ*0.85)|0,
        base: 0.30 + Math.random()*0.40,    // baseline brightness
        amp:  0.06 + Math.random()*0.10,    // twinkle swing (very small)
        freq: 0.07 + Math.random()*0.05,    // cycles per second
        phase: Math.random()*Math.PI*2
      });
    }
    _bgStarCache = { w:W, h:HZ, stars:arr };
  }
  const _bgStarT = Date.now() * 0.001;
  for(const s of _bgStarCache.stars){
    const a = s.base + Math.sin(_bgStarT * s.freq * Math.PI*2 + s.phase) * s.amp;
    ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
    ctx.fillRect(s.x, s.y, 2, 2);
  }

  // ---- SKYLINE (PixelLab bg strip if loaded, else procedural buildings) ----
  // Prefer dialogue-specific scene backdrop (e.g. kebab shop for Habibi) over suburb default
  const bgKey = currentDialogueBg || currentSuburbBg;
  const bgImg = SPRITES[bgKey];
  if(bgImg) {
    // Draw the 400x150 strip scaled to fill the lower sky / building zone
    const stripH = H*0.28;
    const stripY = HZ - stripH;
    ctx.drawImage(bgImg, 0, stripY, W, stripH);
    // Slight tint to feel like 3am
    ctx.fillStyle='rgba(0,5,15,0.32)';
    ctx.fillRect(0, stripY, W, stripH);
    // Fade top of strip into sky
    const fadeTop = ctx.createLinearGradient(0, stripY, 0, stripY+stripH*0.25);
    fadeTop.addColorStop(0,'rgba(4,5,14,1)');
    fadeTop.addColorStop(1,'rgba(4,5,14,0)');
    ctx.fillStyle=fadeTop; ctx.fillRect(0, stripY, W, stripH*0.25);
  } else {
    // Procedural buildings fallback
    [
      [0,80,H*0.12,H*0.32,'#0d0d15'],
      [0,45,H*0.05,H*0.39,'#0a0a12'],
      [310,80,H*0.14,H*0.30,'#0d0d15'],
      [330,60,H*0.10,H*0.34,'#0a0a12'],
    ].forEach(([bx,bw,by,bh,col])=>{
      ctx.fillStyle=col; ctx.fillRect(bx,by,bw,bh);
      for(let r=0;r<4;r++) for(let c=0;c<3;c++){
        if(Math.random()>0.5){
          ctx.fillStyle=`rgba(255,${160+Math.random()*70},${30+Math.random()*40},${0.4+Math.random()*0.4})`;
          ctx.fillRect(bx+5+c*((bw-10)/3), by+8+r*((bh-8)/4), (bw-10)/3-3, (bh-8)/4-4);
        }
      }
    });
  }

  // Horizon glow line
  ctx.fillStyle='rgba(255,100,0,0.18)';
  ctx.fillRect(0, HZ-4, W, 10);

  // ---- STREET / ROAD ----
  const road = ctx.createLinearGradient(0,HZ,0,H*0.65);
  road.addColorStop(0,'#1a1a22');
  road.addColorStop(1,'#252528');
  ctx.fillStyle = road;
  ctx.fillRect(80, HZ, 230, H*0.22);

  // Sidewalks
  ctx.fillStyle='#1e1e28'; ctx.fillRect(0,HZ,80,H*0.22);
  ctx.fillStyle='#1e1e28'; ctx.fillRect(310,HZ,80,H*0.22);

  // Centre line
  ctx.fillStyle='rgba(255,100,0,0.55)';
  for(let y=HZ+4;y<H*0.64;y+=20) ctx.fillRect(191,y,8,12);

  // Streetlights glow
  ctx.fillStyle='rgba(255,180,0,0.10)';
  ctx.beginPath(); ctx.ellipse(40,HZ,70,55,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(350,HZ,70,55,0,0,Math.PI*2); ctx.fill();

  // ---- PARKED CAR (suburb-specific, SIDE-ON profile view) ----
  // Dialogue scenes use side-on profile sprites — classic 2D platformer
  // car art. The top-down sheets are kept for the actual racing.
  //
  // Per-suburb car:
  //   Blacktown  -> Brenno's broken E36 Beemer (smoke plume)
  //   Parramatta -> Preet's Camree "Chamkili"
  //   Cabramatta -> Khoa's S14 Silvio
  //   Penrith    -> Macca's jacked ForrdRanger
  //   Liverpool  -> Habibi's AMG
  const carBySuburb = {
    BLACKTOWN:  'car_e36_side',
    PARRAMATTA: 'car_camry_side',
    CABRAMATTA: 'car_silvia_side',
    PENRITH:    'car_ranger_side',
    LIVERPOOL:  'car_amg_side',
  };
  const carKey = carBySuburb[currentSuburb] || 'car_amg_side';
  const carImg = SPRITES[carKey];

  // Cars are sized proportionally to the character (charH = 130 ≈ 1.75m
  // person reference). Real-world car height-vs-person ratios applied:
  //   sedans/coupes ~ 0.75-0.85 of person height (lower than them)
  //   hatchbacks    ~ 0.80
  //   jacked utes   ~ 1.10 (taller than person)
  // Length ≈ 2.3x height for sedans, ≈ 1.8x height for taller utes.
  // Wheels (bottom of sprite) align with the character's feet line so they
  // share the ground level. The Blacktown E36 Beemer is the focal point of
  // Brenno's intro so it gets BIG dimensions + raised carY (previous spec).
  const CAR_PROPS = {
    car_amg_side:        { w: 240, h: 104 },  // sedan
    car_camry_side:      { w: 310, h: 150 },  // sedan — bigger focal car at Parramatta
    car_silvia_side:     { w: 295, h: 120 },  // low coupe — focal car at Cabra
    car_wrx_side:        { w: 225, h: 105 },  // rally hatch
    car_ranger_side:     { w: 260, h: 145 },  // jacked-up ute (taller than person)
    car_e36_side:  { w: 270, h: 110 },  // sedan
  };

  const isBig   = (currentSuburb === 'BLACKTOWN'); // big focal Beemer
  const props   = CAR_PROPS[carKey] || { w: 220, h: 100 };
  const carW    = isBig ? 320 : props.w;
  const carH    = isBig ? 145 : props.h;
  const FEET_Y  = Math.round(H * 0.57); // character feet line ≈ 481
  // Right-aligned with 10px screen margin
  const carX    = W - carW - 10;
  // Wheels on the character feet line (so the two share the ground).
  // Blacktown's big Beemer stays raised per the focal-point request.
  const carY    = isBig ? H*0.36 : (FEET_Y - carH);

  // ---- PER-NODE STAGE FLAGS ---------------------------------------------
  // Lets a dialogue node hide/show the default car/character or draw a
  // small "in-the-car" mini sprite. Used for the Harris Park empty-street
  // → Rahul rips in → Rahul hops out staging.
  //   stage.hideCar   — skip the per-suburb car
  //   stage.hideChar  — skip the main character sprite
  //   stage.charMini  — draw a small char sprite stepping out of the car
  const stage = (currentNode && currentNode.stage) || {};
  const showCar  = !stage.hideCar;
  const showChar = !stage.hideChar;

  // ---- MINI CHARACTER (drawn BEHIND the car) ----
  // Rahul has hopped out of the Camree's driver door, which on an RHD car
  // is the OFF side — i.e. the far side from the camera. So we render him
  // BEFORE the car so the car's body visually obscures his lower half,
  // leaving only his head and shoulders peeking over the roofline.
  const charKeyMini = 'char_' + currentCharacter;
  const charImgMini = SPRITES[charKeyMini];
  if(stage.charMini && carImg && charImgMini) {
    const fw = charImgMini.width / 4;
    const miniW = 60;
    const miniH = 78;
    // Position over the front-cabin area (where the driver sits on RHD)
    const miniX = carX + carW*0.30;
    // Place so head + shoulders poke ~35% above the car roof line.
    const miniY = carY - miniH*0.40;
    ctx.drawImage(charImgMini, fw*2, 0, fw, charImgMini.height, miniX, miniY, miniW, miniH);
  }

  if(showCar) {
    if(carImg) {
      // Side-on profile — draw at native size
      ctx.drawImage(carImg, carX, carY, carW, carH);
    } else {
      // Procedural fallback (side-view rectangle car)
      ctx.fillStyle = '#0d0d1e';
      ctx.fillRect(carX, carY + carH*0.35, carW, carH*0.55);     // body
      ctx.fillStyle = (carKey === 'car_ranger_side') ? '#5a4f30' : '#1a1a30';
      ctx.fillRect(carX+10, carY + carH*0.15, carW-20, carH*0.3); // roof / cabin
      // Windows
      ctx.fillStyle = '#0a1a30';
      ctx.fillRect(carX+14, carY + carH*0.20, carW-28, carH*0.18);
      // Wheels
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(carX + carW*0.22, carY + carH*0.9, carH*0.16, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(carX + carW*0.78, carY + carH*0.9, carH*0.16, 0, Math.PI*2); ctx.fill();
    }
    // If Blacktown -> animated smoke / steam plume rising from the propped-
    // open bonnet. Three layered streams of soft wisps at different speeds
    // and drift offsets so it never looks repetitive. The dialogue-scene
    // animation loop (sceneAnimRAF) drives the per-frame redraw.
    if(currentSuburb === 'BLACKTOWN') {
      const smokeT = Date.now() * 0.001;
      // Bonnet centre — anchored over the FRONT of the E36 (right side of
      // the sprite since the car faces right). Tune the multiplier here
      // if the plume drifts off the actual bonnet on different aspect
      // ratios.
      const bonnetX = carX + carW * 0.72;
      const bonnetY = carY + carH * 0.30;
      // Three offset streams with different speeds + base x positions
      const streams = [
        { ox: -10, speed: 22, period: 22, hue: 0.40 },   // grey-white smoke
        { ox:  4,  speed: 17, period: 26, hue: 0.55 },   // hot steam wisp
        { ox: 18,  speed: 26, period: 18, hue: 0.32 },   // dark exhaust puff
      ];
      for(const st of streams) {
        for(let s = 0; s < 7; s++) {
          // Wrap each puff through its rise cycle
          const phase = (smokeT * st.speed - s * 8 + st.period * 9) % st.period;
          const lifeT = phase / st.period;          // 0 = born, 1 = faded
          if(lifeT < 0 || lifeT > 1) continue;
          // Rise vertically + lateral drift (sine wave)
          const sy = bonnetY - lifeT * 110;
          const sx = bonnetX + st.ox + Math.sin(smokeT * 2 + s * 0.9 + st.ox) * (8 + lifeT * 16);
          const sr = 6 + lifeT * 18;
          const alpha = (1 - lifeT) * st.hue;
          // Wisp colour: mostly grey-white with subtle warm tinge near base
          const warmth = Math.max(0, 1 - lifeT * 2);   // strongest at birth
          const r = 200 + warmth * 30;
          const g = 200 + warmth * 10;
          const b = 200 - warmth * 20;
          ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha})`;
          ctx.beginPath();
          ctx.arc(sx, sy, sr, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // Hot orange glow at the very base (visible heat from the engine bay)
      const glowGrad = ctx.createRadialGradient(bonnetX, bonnetY, 2, bonnetX, bonnetY, 30);
      glowGrad.addColorStop(0, 'rgba(255,140,40,0.30)');
      glowGrad.addColorStop(1, 'rgba(255,140,40,0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(bonnetX, bonnetY, 30, 0, Math.PI * 2);
      ctx.fill();
    }
    // Subtle ground shadow under car
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(carX-4, carY+carH-6, carW+8, 8);
  }

  // ---- CHARACTER SPRITE (standing in the middle of the scene) ----
  // Positioned centred-left of the scene so they don't sit BEHIND the
  // portrait box at the bottom-left of the dialogue panel. The parked
  // car sits to their right above.
  // At Blacktown the Beemer takes up more room, so shift Brenno LEFT
  // a bit so he doesn't end up half behind the bonnet.
  const charKey = 'char_' + currentCharacter;
  const charImg = SPRITES[charKey];
  const charBaseY = H*0.57;        // feet at ~57% down
  const charH     = 130;
  const charW     = 100;
  const charX     = (currentSuburb === 'BLACKTOWN') ? 12 : 125;
  if(showChar && charImg) {
    // Frame 2 = south (facing viewer), each frame = sheet.width/4 wide
    const fw = charImg.width / 4;
    ctx.drawImage(charImg, fw*2, 0, fw, charImg.height, charX, charBaseY - charH, charW, charH);
    // Subtle foot-shadow beneath character
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(charX + charW/2, charBaseY, charW*0.38, 7, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // ---- DIALOGUE OVERLAY (darken bottom for panel readability) ----
  const overlay = ctx.createLinearGradient(0,H*0.53,0,H*0.67);
  overlay.addColorStop(0,'rgba(5,8,15,0)');
  overlay.addColorStop(1,'rgba(5,8,15,0.98)');
  ctx.fillStyle=overlay;
  ctx.fillRect(0,H*0.53,W,H*0.14);
  ctx.fillStyle='rgba(5,8,15,0.98)';
  ctx.fillRect(0,H*0.67,W,H*0.33);
}

// =============================================
//  SCREEN TRANSITIONS
// =============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id;
  // Per-frame animation loop for the dialogue scene — needed so visual
  // effects like Blacktown's smoke plume actually animate frame-by-frame
  // instead of freezing on the still drawn at node-render time.
  if(id === 'dialogue-screen') startDialogueAnim();
  else                         stopDialogueAnim();
}

// Dialogue-scene animation loop. Cheap: only re-runs drawDialogueScene
// when there's something animated to show (currently just the Blacktown
// engine smoke). Other suburbs skip the redraw to save battery.
let _dialogueAnimRAF = null;
function startDialogueAnim() {
  if(_dialogueAnimRAF != null) return;
  const tick = () => {
    if(currentScreen !== 'dialogue-screen') { _dialogueAnimRAF = null; return; }
    // Only redraw if the scene actually has motion right now AND no full-
    // scene image overlay is taking over (engine_bay GIF etc.)
    const hasOverlay = currentNode && currentNode.sceneImage;
    const animatedScene = (currentSuburb === 'BLACKTOWN');
    if(animatedScene && !hasOverlay) drawDialogueScene();
    _dialogueAnimRAF = requestAnimationFrame(tick);
  };
  _dialogueAnimRAF = requestAnimationFrame(tick);
}
function stopDialogueAnim() {
  if(_dialogueAnimRAF != null) {
    cancelAnimationFrame(_dialogueAnimRAF);
    _dialogueAnimRAF = null;
  }
}

function gotoTitle() {
  // Reset progress for a fresh playthrough.
  // Blacktown is the starting suburb (always unlocked); everything else locked.
  gameProgress.blacktownBeaten    = false;
  gameProgress.parramattaUnlocked = false; gameProgress.parramattaBeaten = false;
  gameProgress.cabramattaUnlocked = false; gameProgress.cabramattaBeaten = false;
  gameProgress.penrithUnlocked    = false; gameProgress.penrithBeaten    = false;
  gameProgress.liverpoolUnlocked  = false; gameProgress.liverpoolBeaten  = false;
  gameProgress.easterncreekUnlocked = false; gameProgress.easterncreekBeaten = false;
  // Clear the rewards inventory too
  for(const k of Object.keys(gameProgress.rewards)) gameProgress.rewards[k] = false;
  currentSuburb    = 'BLACKTOWN';
  currentSuburbBg  = 'bg_blacktown';
  currentCharacter = 'bazza';
  showScreen('title-screen');
  drawBgScene();
  if(typeof startTitleRoadAnim === 'function') startTitleRoadAnim();
  if(typeof startTitleCityAnim === 'function') startTitleCityAnim();
}

function gotoSuburbSelect() {
  // Legacy entry point — story is now linear, this is kept only as a
  // safety net. If anything still calls it, route to the current
  // suburb's correct dialogue based on progression.
  gotoSuburb(currentSuburb || 'BLACKTOWN');
}

// =============================================
//  LINEAR STORY FLOW
// =============================================
// Each suburb's encounter data — background, main character, dialogue ids
const STORY_SUBURB_DATA = {
  BLACKTOWN:       { bg:'bg_blacktown',    character:'bazza',  intro:'eshay_intro',   post_win:'bazza_post_win',   post_lose:'bazza_post_lose',   beatenKey:'blacktownBeaten',   sceneGif:'scene_blacktown' },
  PARRAMATTA:      { bg:'bg_parramatta',   character:'preet',  intro:'preet_intro',   post_win:'preet_post_win',   post_lose:'preet_post_lose',   beatenKey:'parramattaBeaten', sceneGif:'scene_parramatta' },
  CABRAMATTA:      { bg:'bg_cabramatta',   character:'khoa',   intro:'khoa_intro',    post_win:'khoa_post_win',    post_lose:'khoa_post_lose',    beatenKey:'cabramattaBeaten', sceneGif:'scene_cabramatta' },
  PENRITH:         { bg:'bg_penrith',      character:'macca',  intro:'macca_intro',   post_win:'macca_post_win',   post_lose:'macca_post_lose',   beatenKey:'penrithBeaten',    sceneGif:'scene_penrith' },
  LIVERPOOL:       { bg:'bg_liverpool',    character:'habibi', intro:'habibi_intro',  post_win:'habibi_post_win',  post_lose:'habibi_post_lose',  beatenKey:'liverpoolBeaten',  sceneGif:'scene_liverpool' },
  'EASTERN CREEK': { bg:'bg_easterncreek', character:'pigcop', intro:'snout_intro',   post_win:'snout_post_win',   post_lose:'snout_post_lose',   beatenKey:'easterncreekBeaten' },
};

// Linear story order — used after Eastern Creek to know the run is over
const STORY_ORDER = ['BLACKTOWN','PARRAMATTA','CABRAMATTA','PENRITH','LIVERPOOL','EASTERN CREEK'];

// Enter a suburb's encounter — play the transition then drop into the
// correct dialogue (intro if unbeaten, post_win on a retry-visit). Used
// by every unlock_X event in the handler instead of returning to a map.
function gotoSuburb(suburbName, opts) {
  const d = STORY_SUBURB_DATA[suburbName];
  if(!d) return;
  opts = opts || {};
  currentSuburb    = suburbName;
  currentSuburbBg  = d.bg;
  currentCharacter = d.character;
  syncRewards();
  // Pick intro by default; if we're rewinding/retrying a beaten suburb
  // (shouldn't happen in pure linear flow) show post_win.
  let dlgId = (gameProgress[d.beatenKey] && !opts.forceIntro) ? d.post_win : d.intro;
  gotoTransition(suburbName, () => gotoDialogue(dlgId));
}

// First suburb of the run — plays the 3-beat opening monologue first
// (sets the player up as a 23yo west-syd driver going out hunting on a
// Saturday night), then transitions into Blacktown for the Brenno
// encounter. The transition + Brenno load are kicked off by the
// 'open_blacktown' triggerEvent on the last opening node.
function gotoFirstSuburb() {
  currentSuburb    = 'BLACKTOWN';
  currentSuburbBg  = 'bg_blacktown';
  currentCharacter = 'bazza';
  syncRewards();
  gotoDialogue('opening_intro');
}

// Where to go when the player closes the trophy modal:
//   peek mid-run  → back to the dialogue
//   end-of-run    → back to the title screen for a new playthrough
let _trophyReturnScreen = 'dialogue-screen';

// Pop up a celebration overlay for a newly unlocked reward item, then
// invoke the continuation (post-win dialogue, next suburb, etc.) when
// the player taps CONTINUE. Idempotent — if the item is already earned
// (e.g. the player retried a beaten suburb) we skip straight to onDone.
function showRewardUnlock(itemId, onDone) {
  const info = REWARD_INFO.find(r => r.id === itemId);
  if(!info) { if(onDone) onDone(); return; }
  // Mark the reward earned NOW so the trophy room reflects it
  if(gameProgress && gameProgress.rewards) gameProgress.rewards[itemId] = true;
  document.getElementById('reward-unlock-img').src = 'sprites/reward_' + itemId + '.png';
  document.getElementById('reward-unlock-name').textContent = info.name;
  document.getElementById('reward-unlock-from').textContent = info.from;
  showScreen('reward-unlock-screen');
  const btn = document.getElementById('reward-unlock-btn');
  if(btn) {
    btn.onclick = () => {
      // Stop the loop and continue
      if(typeof onDone === 'function') onDone();
    };
  }
}

function gotoTrophyRoom() {
  syncRewards();
  // Detect if this is the post-EC ending — all 6 trophies earned
  const allEarned = REWARD_INFO.every(r => gameProgress.rewards[r.id]);
  const grid = document.getElementById('trophy-grid');
  grid.innerHTML = '';
  for(const info of REWARD_INFO) {
    const earned = !!gameProgress.rewards[info.id];
    const slot = document.createElement('div');
    slot.className = 'trophy-slot ' + (earned ? 'earned' : 'locked');
    const imgPath = 'sprites/reward_' + info.id + '.png';
    slot.innerHTML = `
      <img src="${imgPath}" alt="">
      <div class="trophy-slot-name">${earned ? info.name : '???'}</div>
      <div class="trophy-slot-from">${earned ? info.from : 'LOCKED'}</div>
    `;
    grid.appendChild(slot);
  }
  showScreen('trophy-screen');
  const closeBtn = document.getElementById('trophy-close-btn');
  if(closeBtn) {
    if(allEarned) {
      closeBtn.textContent = '[ PLAY AGAIN ]';
      closeBtn.onclick = gotoTitle;
    } else {
      closeBtn.textContent = '[ BACK TO GAME ]';
      closeBtn.onclick = () => showScreen(_trophyReturnScreen);
    }
  }
  // Top-right X button always returns to game (or title if we're done)
  const xBtn = document.getElementById('trophy-x-btn');
  if(xBtn) {
    xBtn.onclick = () => {
      if(allEarned) gotoTitle();
      else          showScreen(_trophyReturnScreen);
    };
  }
}

// Hook the small floating ★ button on the dialogue screen
function bindTrophyPeek() {
  const btn = document.getElementById('trophy-peek-btn');
  if(!btn) return;
  btn.onclick = (e) => {
    e.stopPropagation();  // don't trigger onDialogueTap
    _trophyReturnScreen = 'dialogue-screen';
    gotoTrophyRoom();
  };
}
bindTrophyPeek();

function gotoDialogue(dialogueId) {
  currentGraph = DIALOGUES[dialogueId];
  // Pick the scene backdrop: dialogue-specific override, else suburb default
  currentDialogueBg = (currentGraph && currentGraph.sceneBg) || null;
  // Reset the per-dialogue used-choices set so re-entering a dialogue
  // (e.g. retry after losing a mini-game) starts with all options open.
  if(currentGraph) currentGraph._usedChoices = new Set();
  drawDialogueScene();
  showScreen('dialogue-screen');
  if(!currentGraph) return;
  startNode(currentGraph.defaultStartNodeId);
}

      gotoTransition(enc.suburb, () => gotoDialogue(enc.dialogueId));

// =============================================
//  DIALOGUE ENGINE
// =============================================
function startNode(nodeId) {
  const node = currentGraph.nodes.find(n=>n.id===nodeId);
  if(!node){ endDialogue(); return; }
  currentNode = node;
  renderNode(node);
}

function renderNode(node) {
  const isNarrator = (node.speakerId === 'narrator');

  // Re-render the scene canvas so per-node stage flags (hideCar/hideChar/charMini)
  // take effect when advancing nodes (e.g. Harris Park: Rahul's car appears,
  // then Rahul hops out of the driver door on the next click).
  drawDialogueScene();

  // Two scene-image layers, each with their own role:
  //   - scene-bg-img: FULL-BLEED behind the dialogue panel. Per-suburb
  //     defaults from STORY_SUBURB_DATA[].sceneGif (e.g. scene_blacktown).
  //   - scene-overlay-img: smaller FRAMED BOX in the upper portion. Per-node
  //     overrides via node.sceneImage (e.g. engine_bay diagnostic, opening
  //     monologue dusk shot). When set, takes precedence — the suburb's
  //     full-bleed bg is hidden for the duration of the override.
  const bgImg = document.getElementById('scene-bg-img');
  const overlayImg = document.getElementById('scene-overlay-img');
  const suburbScene = STORY_SUBURB_DATA[currentSuburb] && STORY_SUBURB_DATA[currentSuburb].sceneGif;
  const hasNodeOverride = !!(node.sceneImage && SCENE_IMAGE_SRCS[node.sceneImage]);
  if(overlayImg) {
    if(hasNodeOverride) {
      overlayImg.src = SCENE_IMAGE_SRCS[node.sceneImage];
      overlayImg.style.display = 'block';
    } else {
      overlayImg.style.display = 'none';
    }
  }
  if(bgImg) {
    if(!hasNodeOverride && suburbScene && SCENE_IMAGE_SRCS[suburbScene]) {
      bgImg.src = SCENE_IMAGE_SRCS[suburbScene];
      bgImg.style.display = 'block';
    } else {
      bgImg.style.display = 'none';
    }
  }

  // Speaker name
  document.getElementById('speaker-name').innerText = isNarrator
    ? '...' : (NAMES[node.speakerId] || node.speakerId.toUpperCase());

  // Portrait
  if(isNarrator) {
    // Narrator: open storyteller's book sprite (PixelLab). If the sprite
    // hasn't loaded yet, fall back to the legacy procedural cityscape so
    // the screen never goes blank during sprite loading.
    const canvas = document.getElementById('portrait-canvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0,0,64,64);
    const bookImg = SPRITES['portrait_narrator_default'];
    if(bookImg) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(bookImg, 0, 0, 64, 64);
    } else {
      // Procedural fallback (dim cityscape with lit windows) — same as before
      ctx.fillStyle = '#06080f'; ctx.fillRect(0,0,64,64);
      [[4,16,10,48],[16,20,8,44],[28,12,12,52],[44,18,10,46],[56,22,8,42]].forEach(([x,y,w,h])=>{
        ctx.fillStyle='#111828'; ctx.fillRect(x,y,w,h);
      });
      [[6,22,3,3,'#ff9944'],[8,30,3,3,'#ffcc66'],[18,24,3,3,'#aaddff'],[30,16,3,3,'#ff6600'],
       [32,26,3,3,'#ffcc66'],[46,22,3,3,'#aaddff'],[58,26,3,3,'#ff9944']].forEach(([x,y,w,h,c])=>{
        ctx.fillStyle=c+'99'; ctx.fillRect(x,y,w,h);
      });
      ctx.fillStyle='rgba(255,80,0,0.18)'; ctx.fillRect(0,48,64,4);
    }
  } else {
    renderPortrait(node.portrait || node.speakerId+'_default');
  }

  // Clear choices
  const choicesEl = document.getElementById('choices-area');
  choicesEl.innerHTML = '';
  document.getElementById('tap-hint').style.display = 'none';

  // Clear pending state from previous node
  _pendingEvent = null;
  _pendingNext  = null;

  // Hub loop-back detection: if this node has choices AND any of them have
  // already been used (player came back here after exploring a flavor
  // branch), skip the typewriter and re-show the text instantly with the
  // remaining choices. The used-choice grey-out lives in renderChoices.
  const isHubReturn = node.choices && node.choices.length > 0 &&
    currentGraph && currentGraph._usedChoices &&
    node.choices.some(ch =>
      currentGraph._usedChoices.has(node.id + '|' + ch.text));
  if(isHubReturn) {
    document.getElementById('dialogue-text').textContent = node.text;
    typing = false;
    renderChoices(node.choices);
    return;
  }

  // Typewriter text
  typeText(node.text, () => {
    if(node.end) {
      // 'end' nodes still need a tap to actually leave
      document.getElementById('tap-hint').style.display = 'block';
      _pendingNext = '__END__';
    } else if(node.triggerEvent) {
      document.getElementById('tap-hint').style.display = 'block';
      _pendingEvent = node.triggerEvent;
    } else if(node.choices && node.choices.length > 0) {
      renderChoices(node.choices);
    } else if(node.next || node.autoNext) {
      // Both 'next' and legacy 'autoNext' now require a tap to advance
      document.getElementById('tap-hint').style.display = 'block';
      _pendingNext = node.next || node.autoNext;
    } else {
      document.getElementById('tap-hint').style.display = 'block';
    }
  });
}

function typeText(text, onDone) {
  const el = document.getElementById('dialogue-text');
  el.textContent = '';
  if(typeTimer) cancelAnimationFrame(typeTimer);
  typing = true;
  let i=0, built='', lastTs=null, pending=0;
  const MS_PER_CHAR = 30;

  function frame(ts) {
    if(lastTs === null) lastTs = ts;
    pending += ts - lastTs;
    lastTs = ts;

    // Consume as many chars as time allows
    while(pending >= MS_PER_CHAR && i < text.length) {
      built += text[i++];
      pending -= MS_PER_CHAR;
    }
    el.textContent = built;

    if(i >= text.length) {
      typing = false;
      onDone && onDone();
      return;
    }
    typeTimer = requestAnimationFrame(frame);
  }
  typeTimer = requestAnimationFrame(frame);
}

function skipTyping() {
  if(!typing||!currentNode) return;
  cancelAnimationFrame(typeTimer);
  typing=false;
  document.getElementById('dialogue-text').textContent = currentNode.text;
  if(currentNode.end) {
    document.getElementById('tap-hint').style.display='block';
    _pendingNext = '__END__';
  } else if(currentNode.triggerEvent) {
    document.getElementById('tap-hint').style.display='block';
    _pendingEvent = currentNode.triggerEvent;
  } else if(currentNode.choices && currentNode.choices.length>0) {
    renderChoices(currentNode.choices);
  } else if(currentNode.next || currentNode.autoNext) {
    document.getElementById('tap-hint').style.display='block';
    _pendingNext = currentNode.next || currentNode.autoNext;
  } else {
    document.getElementById('tap-hint').style.display='block';
  }
}

function renderChoices(choices) {
  const el = document.getElementById('choices-area');
  el.innerHTML='';
  const curNodeId = currentNode && currentNode.id;
  // Used-choices set lives on the current dialogue graph so it resets
  // automatically when entering a new dialogue via gotoDialogue.
  if(currentGraph && !currentGraph._usedChoices) currentGraph._usedChoices = new Set();
  const used = currentGraph ? currentGraph._usedChoices : new Set();
  // Edge case: if EVERY choice has already been used (e.g. player looped
  // back to the same node), unlock them so they can't get soft-locked.
  const allUsed = choices.every(ch => used.has(curNodeId + '|' + ch.text));
  choices.forEach((ch,i)=>{
    const key = curNodeId + '|' + ch.text;
    const isUsed = used.has(key) && !allUsed;
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (isUsed ? ' used' : '');
    btn.innerText = ch.text;
    if(isUsed) {
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        used.add(key);
        el.innerHTML='';
        startNode(ch.next);
      };
    }
    el.appendChild(btn);
  });
}

function onDialogueTap() {
  if(typing){ skipTyping(); return; }
  // Tap fires the pending event (e.g. start race) if any
  if(_pendingEvent) {
    const ev = _pendingEvent;
    _pendingEvent = null;
    document.getElementById('tap-hint').style.display = 'none';
    handleEvent(ev);
    return;
  }
  // Tap advances to the next node if one is pending
  if(_pendingNext) {
    const nextId = _pendingNext;
    _pendingNext = null;
    document.getElementById('tap-hint').style.display = 'none';
    if(nextId === '__END__') {
      gotoEnd(currentNode.endTitle || '...', currentNode.endMsg || '');
    } else {
      startNode(nextId);
    }
    return;
  }
  // Choices and dead-ends do nothing on tap
}

function handleEvent(eventName) {
  // ---- Race start events: pick rival car for the race ----
  if(eventName === 'start_race_blacktown') {
    gotoRace('wrx');          // Merrylands crew's WRX
  } else if(eventName === 'start_race_parramatta') {
    gotoRace('camry');        // Preet's sleeper Camree
  } else if(eventName === 'start_sesh_cabramatta') {
    gotoSesh();               // Khoa's Cabra carpark stealth deal
  } else if(eventName === 'start_race_penrith') {
    gotoHill();           // Macca's side-scroll 4x4 hill climb
  } else if(eventName === 'start_race_liverpool') {
    gotoRace('amg');          // Habibi's AMG (the final boss)

  // ---- Linear story progression — auto-advance to the next suburb ----
  // Each unlock_X event marks the matching beaten flag, syncs rewards,
  // then fires a transition to the next stop. No suburb-select menu.
  } else if(eventName === 'unlock_parramatta_brenno') {
    // Brenno scene completes without a race — engine inspect + lift offer.
    // No reward celebration here (curry powder is just the errand, not a
    // mini-game prize). syncRewards quietly unlocks it in the trophy room.
    gameProgress.blacktownBeaten    = true;
    gameProgress.parramattaUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('PARRAMATTA'), 1200);
  } else if(eventName === 'unlock_parramatta') {
    gameProgress.parramattaUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('PARRAMATTA'), 1200);
  } else if(eventName === 'unlock_cabramatta') {
    gameProgress.cabramattaUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('CABRAMATTA'), 1200);
  } else if(eventName === 'unlock_penrith') {
    gameProgress.penrithUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('PENRITH'), 1200);
  } else if(eventName === 'unlock_liverpool') {
    gameProgress.liverpoolUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('LIVERPOOL'), 1200);
  } else if(eventName === 'unlock_easterncreek') {
    gameProgress.easterncreekUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('EASTERN CREEK'), 1200);
  } else if(eventName === 'start_drag_easterncreek') {
    gotoDrag();

  // ---- Opening narrator → drive transition into Blacktown ----
  } else if(eventName === 'open_blacktown') {
    // After the 3-beat opening monologue, run the standard suburb
    // transition into Blacktown and drop into Brenno's eshay_intro.
    gotoTransition('BLACKTOWN', () => gotoDialogue('eshay_intro'));

  // ---- Westfield detour: Brenno's quick sesh that becomes a cop chase ----
  } else if(eventName === 'detour_westfield') {
    // Transition into Mt Druitt Westfield, then play the detour dialogue.
    // Re-uses bg_blacktown for the scene (no dedicated Westfield bg yet).
    gotoTransition('WESTFIELD MT DRUITT', () => gotoDialogue('westfield_detour'));
  } else if(eventName === 'start_cop_chase') {
    // STUB. The actual cop-chase mini-game will hook in here. For now
    // skip straight to Eastern Creek so the story keeps moving — same
    // effect as 'unlock_easterncreek' but logically separate so it's
    // easy to replace with the mini-game launcher later.
    gameProgress.easterncreekUnlocked = true;
    syncRewards();
    setTimeout(() => gotoSuburb('EASTERN CREEK'), 1200);

  } else if(eventName === 'return_to_map') {
    // Player lost/failed/quit — retry the current suburb's intro
    syncRewards();
    setTimeout(() => gotoSuburb(currentSuburb || 'BLACKTOWN', {forceIntro:true}), 1000);
  } else if(eventName === 'show_trophy_room') {
    // End-of-game trophy reveal after beating Sgt Snout
    syncRewards();
    setTimeout(gotoTrophyRoom, 1200);
  }
}

function endDialogue() {
  gotoEnd('TO BE CONTINUED...','More of Streeto coming soon.');
}

// =============================================
//  PORTRAIT RENDERING
// =============================================
// Map character name -> default PixelLab portrait key we have a PNG for.
// Any emotion variant for a character falls back to its default PNG.
const CHAR_DEFAULT_PORTRAIT = {
  habibi: 'portrait_habibi_smug',
  pigcop: 'portrait_pigcop_default',
  eshay:  'portrait_bazza_default',
  preet:  'portrait_preet_default',
  khoa:   'portrait_khoa_default',
  macca:  'portrait_macca_default',
  bazza:  'portrait_bazza_default',
  player: 'portrait_player_default',
};

function renderPortrait(key) {
  const canvas = document.getElementById('portrait-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,64,64);

  // Try exact emotion match first (e.g. portrait_habibi_proud)
  const exactKey = 'portrait_' + key;
  if(SPRITES[exactKey]) {
    ctx.drawImage(SPRITES[exactKey], 0, 0, 64, 64);
    return;
  }

  // Fall back to the character's default PNG (e.g. habibi_proud -> portrait_habibi_smug)
  const character = key.split('_')[0];           // 'habibi_proud' -> 'habibi'
  const fallbackKey = CHAR_DEFAULT_PORTRAIT[character];
  if(fallbackKey && SPRITES[fallbackKey]) {
    ctx.drawImage(SPRITES[fallbackKey], 0, 0, 64, 64);
    return;
  }

  // Final fallback: procedural pixel art (legacy)
  ctx.fillStyle='#0d1224'; ctx.fillRect(0,0,64,64);
  const fn = PORTRAITS[key];
  if(fn) fn(ctx);
}

function loadAllSprites(onDone) {
  const keys = Object.keys(SPRITE_SRCS);
  let done = 0;
  keys.forEach(k => {
    const img = new Image();
    const finish = () => { done++; if(done === keys.length) onDone(); };
    img.onload  = () => { SPRITES[k] = img; finish(); };
    img.onerror = finish; // missing file — graceful skip, fallback drawing used
    img.src = SPRITE_SRCS[k];
  });
}

// Helper: draw from a horizontal sprite sheet (4 frames: east/west/south/north)
// frameIdx: 0=east 1=west 2=south 3=north
function drawSheet(ctx, key, frameIdx, x, y, w, h) {
  const img = SPRITES[key];
  if(!img) return false;
  const fw = img.width / 4;
  ctx.drawImage(img, frameIdx * fw, 0, fw, img.height, x, y, w, h);
  return true;
}

// =============================================
//  TOP-DOWN VERTICAL-SCROLL RACE ENGINE
//  Cars face NORTH (up). World scrolls DOWN towards player.
//  Player car fixed near bottom. Rival visible above (ahead).
// =============================================

// --- Canvas constants (drawing resolution) ---
const RC_W  = 390;
const RC_H  = 724;
const RC_CX = RC_W / 2;

// --- Road geometry ---
const RC_ROAD_W    = 260;          // road width in pixels
const RC_ROAD_X    = (RC_W - RC_ROAD_W) / 2; // left edge of road
const RC_ROAD_RIGHT = RC_ROAD_X + RC_ROAD_W;
const RC_SIDE_W    = RC_ROAD_X;    // side strip width (each side)
const RC_LANE_COUNT = 4;
const RC_LANE_W    = RC_ROAD_W / RC_LANE_COUNT; // 65px per lane

// --- Hand-drawn pixel art road tile (built once at startup) ---
// 260 wide x 240 tall, vertically tileable. Drawn pixel-perfect:
// asphalt base + asphalt grit + solid white edge stripes + dashed white
// lane dividers between 0-1 and 2-3 + dashed yellow centre line between
// lanes 1-2. Period = 60px so 240px = exactly 4 dash periods (no seam).
let HANDDRAWN_ROAD = null;
function buildRoadTile() {
  const w = RC_ROAD_W;      // 260
  const h = 240;             // 4 dash periods of 60px each
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- Asphalt base ----
  ctx.fillStyle = '#26262c';
  ctx.fillRect(0, 0, w, h);

  // ---- Asphalt grit / specks (deterministic pseudo-random) ----
  // Use a seeded sin-based RNG so the tile is identical every refresh
  const rand = (n) => { const x = Math.sin(n * 12.9898) * 43758.5453; return x - Math.floor(x); };
  for(let i = 0; i < 420; i++) {
    const x = Math.floor(rand(i * 2) * w);
    const y = Math.floor(rand(i * 2 + 1) * h);
    const v = rand(i * 3 + 7);
    if(v < 0.25)      ctx.fillStyle = '#33333a';
    else if(v < 0.55) ctx.fillStyle = '#2e2e34';
    else              ctx.fillStyle = '#222228';
    ctx.fillRect(x, y, 1, 1);
  }
  // A few brighter specks (small reflective rocks)
  for(let i = 0; i < 40; i++) {
    const x = Math.floor(rand(i * 11 + 50) * w);
    const y = Math.floor(rand(i * 11 + 51) * h);
    ctx.fillStyle = '#3a3a44';
    ctx.fillRect(x, y, 1, 1);
  }

  // ---- Solid white edge stripes ----
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(3,        0, 3, h);     // left edge stripe
  ctx.fillRect(w - 6,    0, 3, h);     // right edge stripe

  // ---- Dashed white lane dividers (between 0-1 and 2-3) ----
  const dashPeriod = 60, dashLen = 30;
  ctx.fillStyle = '#c8c8c8';
  for(let yy = 0; yy < h; yy += dashPeriod) {
    // Lane 0-1 boundary at x = 65
    ctx.fillRect(RC_LANE_W - 1,        yy, 2, dashLen);
    // Lane 2-3 boundary at x = 195
    ctx.fillRect(RC_LANE_W * 3 - 1,    yy, 2, dashLen);
  }

  // ---- Centre line: dashed YELLOW (between lane 1-2) ----
  // Slight offset on phase so it visually leads the eye to the centre
  ctx.fillStyle = '#f0c020';
  for(let yy = 0; yy < h; yy += dashPeriod) {
    ctx.fillRect(RC_LANE_W * 2 - 2, yy + 6, 3, dashLen);
  }
  // Yellow line drop-shadow for arcade glow feel
  ctx.fillStyle = 'rgba(255,180,0,0.18)';
  for(let yy = 0; yy < h; yy += dashPeriod) {
    ctx.fillRect(RC_LANE_W * 2 - 4, yy + 6, 7, dashLen);
  }

  HANDDRAWN_ROAD = c;
}
