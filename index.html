  // smaller and dimmer toward the centre (vanishing point) so the road
  // appears to extend INTO the city.
  // Each entry: [x, w, h, fillColour, windowDensity]
  const buildings = [
    [-2,  28, 22, '#0c1226', 0.55],
    [22,  38, 30, '#0f1530', 0.55],
    [56,  26, 18, '#0a0e22', 0.45],
    [78,  34, 26, '#101633', 0.55],
    [108, 30, 22, '#0c1228', 0.50],
    [134, 28, 18, '#0e152e', 0.45],
    [158, 24, 14, '#0a1024', 0.35],
    [180, 18, 9,  '#080d1c', 0.25],
    [196, 14, 6,  '#070b18', 0.20],   // vanishing point — smallest
    [208, 16, 8,  '#080d1c', 0.20],
    [222, 22, 13, '#0a1024', 0.30],
    [242, 26, 17, '#0e152e', 0.45],
    [266, 30, 21, '#0c1228', 0.50],
    [292, 32, 26, '#101633', 0.55],
    [322, 26, 18, '#0a0e22', 0.45],
    [346, 38, 30, '#0f1530', 0.55],
    [382, 28, 22, '#0c1226', 0.55],
  ];

  // Use a deterministic pseudo-random for window placement (so they don't
  // flicker between frames)
  const seededRand = (s) => { const x = Math.sin(s * 12.9898) * 43758.5453; return x - Math.floor(x); };

  buildings.forEach(([bx, bw, bh, bc, density], idx) => {
    // Building body
    ctx.fillStyle = bc;
    ctx.fillRect(bx, 0, bw, bh);
    // Roof line (slightly darker top edge)
    ctx.fillStyle = '#040712';
    ctx.fillRect(bx, 0, bw, 1);

    // Lit windows — small 2x2 dots scattered through the building
    const seed = idx * 17;
    const cols = Math.max(1, Math.floor(bw / 5));
    const rows = Math.max(1, Math.floor(bh / 4));
    for(let r = 0; r < rows; r++) {
      for(let c = 0; c < cols; c++) {
        const r1 = seededRand(seed + c * 3 + r * 7);
        if(r1 > density) continue;
        const wx = bx + 2 + c * 5;
        const wy = 2 + r * 4;
        if(wx + 2 > bx + bw - 1 || wy + 2 > bh - 1) continue;
        // Warm yellow/orange lit window
        const r2 = seededRand(seed + c * 5 + r * 11);
        const r3 = seededRand(seed + c * 9 + r * 3);
        const yellow = 150 + Math.floor(r2 * 70);
        const orange = 50  + Math.floor(r3 * 50);
        ctx.fillStyle = `rgba(255,${yellow},${orange},0.75)`;
        ctx.fillRect(wx, wy, 2, 2);
      }
    }
  });

  // Soft warm horizon glow under the buildings to blend into the road
  const glow = ctx.createLinearGradient(0, 28, 0, 50);
  glow.addColorStop(0, 'rgba(255,160,80,0.18)');
  glow.addColorStop(1, 'rgba(255,160,80,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 28, TR_W, 22);
}

// Distant flowing car lights along the horizon edge of the road (just above
// the road's vanishing point) — gives the impression of far-away traffic.
function drawDistantTraffic(ctx, scrollZ) {
  // Headlight pairs scroll left-to-right or right-to-left at the horizon
  const horizonY = 4;
  const numDots  = 6;
  const period   = 70;
  ctx.fillStyle = 'rgba(255,220,120,0.85)';
  for(let i = 0; i < numDots; i++) {
    const baseX = (i * period + (scrollZ * 0.05) % period) % TR_W;
    // Only show those over the central distant area (roughly x in 150..240)
    if(baseX < 140 || baseX > 250) continue;
    ctx.fillRect(Math.floor(baseX),     horizonY,     2, 1);
    ctx.fillRect(Math.floor(baseX) + 4, horizonY,     2, 1);
  }
  // A few oncoming red tail-lights on the right side
  ctx.fillStyle = 'rgba(255,80,40,0.75)';
  for(let i = 0; i < 4; i++) {
    const baseX = ((i * 95) - (scrollZ * 0.04) % 95 + TR_W * 2) % TR_W;
    if(baseX < 150 || baseX > 240) continue;
    ctx.fillRect(Math.floor(baseX),     horizonY + 2, 1, 1);
    ctx.fillRect(Math.floor(baseX) + 3, horizonY + 2, 1, 1);
  }
}

// --- Individual roadside sprite drawers (all hand-drawn pixel art) ---
function drawPixelStreetLamp(ctx, x, y, scale, side) {
  // Pole (vertical) + lamp head sticking out toward the road + warm glow
  const poleH = Math.round(56 * scale);
  const poleW = Math.max(1, Math.round(2 * scale));
  const headW = Math.max(2, Math.round(10 * scale));
  const headH = Math.max(2, Math.round(5  * scale));
  const armL  = Math.round(14 * scale) * -side;   // arm reaches toward road
  const px    = Math.round(x);
  const top   = Math.round(y - poleH);

  // Pole shaft (dark grey)
  ctx.fillStyle = '#3a3a44';
  ctx.fillRect(px - Math.floor(poleW/2), top, poleW, poleH);

  // Cross arm
  ctx.fillStyle = '#3a3a44';
  ctx.fillRect(px + Math.min(0, armL), top + Math.round(4 * scale),
               Math.abs(armL), Math.max(1, Math.round(1.5 * scale)));

  // Lamp head
  const headX = px + armL - (side === -1 ? 0 : headW);
  const headY = top + Math.round(4 * scale);
  ctx.fillStyle = '#4a4a52';
  ctx.fillRect(headX, headY, headW, headH);
  // Bright bulb underneath
  ctx.fillStyle = '#ffd680';
  ctx.fillRect(headX + 1, headY + headH, Math.max(1, headW - 2), Math.max(1, Math.round(1.2 * scale)));

  // Warm halo glow cast onto the road (radial gradient circle)
  const glowR = Math.round(28 * scale);
  if(glowR > 4) {
    const glowCx = headX + headW / 2;
    const glowCy = headY + headH + Math.round(2 * scale);
    const grad = ctx.createRadialGradient(glowCx, glowCy, 0, glowCx, glowCy, glowR);
    grad.addColorStop(0,   'rgba(255,180,80,0.45)');
    grad.addColorStop(0.5, 'rgba(255,150,60,0.18)');
    grad.addColorStop(1,   'rgba(255,150,60,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(glowCx - glowR, glowCy - glowR, glowR * 2, glowR * 2);
  }
}

function drawPixelTelephonePole(ctx, x, y, scale, side) {
  // Tall pole, two cross arms, drooping wires
  const poleH  = Math.round(72 * scale);
  const poleW  = Math.max(1, Math.round(2 * scale));
  const armW   = Math.round(18 * scale);
  const px     = Math.round(x);
  const top    = Math.round(y - poleH);

  // Pole (brown-grey)
  ctx.fillStyle = '#4a3828';
  ctx.fillRect(px - Math.floor(poleW/2), top, poleW, poleH);

  // Top cross arm
  ctx.fillStyle = '#3a2a1c';
  const armY = top + Math.round(6 * scale);
  ctx.fillRect(px - Math.floor(armW/2), armY, armW, Math.max(1, Math.round(1.5 * scale)));
  // Lower cross arm
  const arm2Y = top + Math.round(14 * scale);
  ctx.fillRect(px - Math.floor(armW/2), arm2Y, armW, Math.max(1, Math.round(1.5 * scale)));

  // Insulators (dots on cross arm ends)
  ctx.fillStyle = '#888';
  if(scale > 0.3) {
    ctx.fillRect(px - Math.floor(armW/2),       armY - 1, 1, 1);
    ctx.fillRect(px + Math.ceil(armW/2)  - 1,   armY - 1, 1, 1);
    ctx.fillRect(px - Math.floor(armW/2),       arm2Y - 1, 1, 1);
    ctx.fillRect(px + Math.ceil(armW/2)  - 1,   arm2Y - 1, 1, 1);
  }
}

function drawPixelPalmTree(ctx, x, y, scale) {
  // Western Sydney palm: thin curved trunk + fronds spraying out
  const trunkH = Math.round(50 * scale);
  const trunkW = Math.max(1, Math.round(3 * scale));
  const px = Math.round(x);
  const top = Math.round(y - trunkH);

  // Trunk (gradient brown, slight lean)
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(px - Math.floor(trunkW/2), top, trunkW, trunkH);
  // Trunk segments (lighter bands)
  if(scale > 0.4) {
    ctx.fillStyle = '#553820';
    for(let yy = top + 4; yy < top + trunkH; yy += Math.round(6 * scale)) {
      ctx.fillRect(px - Math.floor(trunkW/2), yy, trunkW, 1);
    }
  }
  // Fronds (8 lines radiating out from the top)
  const fL = Math.round(16 * scale);
  ctx.strokeStyle = '#1f5a25';
  ctx.lineWidth = Math.max(1, Math.round(scale * 1.6));
  ctx.beginPath();
  const angles = [-2.3, -1.9, -1.3, -0.5, 0.5, 1.3, 1.9, 2.3];
  for(const a of angles) {
    ctx.moveTo(px, top);
    ctx.lineTo(px + Math.cos(a) * fL, top - Math.abs(Math.sin(a)) * fL * 0.7);
  }
  ctx.stroke();
  ctx.lineWidth = 1;
}

function titleRoadLoop(ts) {
  // Only animate while title screen is visible; stop the loop otherwise
  if(currentScreen !== 'title-screen') {
    _titleRoadRAF = null;
    return;
  }
  drawTitleRoad(ts);
  _titleRoadRAF = requestAnimationFrame(titleRoadLoop);
}

function startTitleRoadAnim() {
  if(_titleRoadRAF != null) return; // already running
  _titleRoadRAF = requestAnimationFrame(titleRoadLoop);
}

// =============================================
//  INIT
// =============================================
initStars();
buildRoadTile();   // hand-drawn pixel art road, ready before any race starts
drawBgScene();
startTitleRoadAnim();  // start the title-screen perspective road animation
startTitleCityAnim();  // start the hand-drawn city + sky animation

// Load sprites silently in background — game works fine without them
// (procedural fallbacks used until sprites are available)
loadAllSprites(() => {
  // Redraw whichever scene is currently visible once assets are in
  if(currentScreen === 'title-screen')    drawBgScene();
  if(currentScreen === 'dialogue-screen') drawDialogueScene();
});

// Register the PWA service worker so the demo is installable on the
// phone home screen and works offline once cached. No-op when served
// from file:// or non-secure contexts.
if('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
