    const tileH = sideImg.height;
    const sideOff = (sideScroll % tileH + tileH) % tileH;
    // Draw left strip
    for(let y = sideOff - tileH; y < RC_H; y += tileH) {
      ctx.drawImage(sideImg, 0, y, RC_SIDE_W, tileH);
    }
    // Draw right strip (mirrored horizontally so buildings face the road)
    ctx.save();
    ctx.translate(RC_W, 0);
    ctx.scale(-1, 1);
    for(let y = sideOff - tileH; y < RC_H; y += tileH) {
      ctx.drawImage(sideImg, 0, y, RC_SIDE_W, tileH);
    }
    ctx.restore();
  } else {
    // Procedural fallback: dark column with dots
    ctx.fillStyle = '#101820';
    ctx.fillRect(0, 0, RC_SIDE_W, RC_H);
    ctx.fillRect(RC_ROAD_RIGHT, 0, RC_SIDE_W, RC_H);
  }

  // ---- ROAD TILE (hand-drawn pixel art, scrolls full speed) ----
  // HANDDRAWN_ROAD is built once at startup by buildRoadTile().
  // 240px tall, perfectly tileable, dashed yellow centre + white dividers.
  if(HANDDRAWN_ROAD) {
    const tileH = HANDDRAWN_ROAD.height;
    // World scrolls toward the viewer (down on screen) as player moves north
    const roadOff = (scrollY % tileH + tileH) % tileH;
    // Tile vertically. Disable smoothing for crisp pixel art.
    ctx.imageSmoothingEnabled = false;
    for(let y = roadOff - tileH; y < RC_H; y += tileH) {
      ctx.drawImage(HANDDRAWN_ROAD, RC_ROAD_X, y);
    }
    ctx.imageSmoothingEnabled = true;
  } else {
    // Procedural emergency fallback (should never happen — built at init)
    ctx.fillStyle = '#26262c';
    ctx.fillRect(RC_ROAD_X, 0, RC_ROAD_W, RC_H);
  }

  // ---- TRAFFIC CARS (back-to-front by distAhead descending; far first) ----
  // distAhead > 0 = ahead of player (above on screen). 0 = at player's Y.
  // Player Y is fixed at RC_H - 50.
  const PLAYER_Y = RC_H - 50;
  const sortedTraffic = [...trafficList].sort((a,b) => b.distAhead - a.distAhead);
  sortedTraffic.forEach(car => {
    const onScreenY = PLAYER_Y - car.distAhead;
    if(onScreenY < -car.h || onScreenY > RC_H + car.h) return;
    drawTrafficCar(ctx, car, RC_CX + car.laneX, onScreenY);
  });

  // ---- RIVAL CAR (always drawn at top portion of screen based on lead) ----
  // Lead distance is clamped to a visible range so the rival is always shown
  // on screen — we draw them at a Y derived from lead distance.
  if(rivalLeadDist > 0) {
    // Visible lead: 0 -> just ahead of player, max -> near top of screen
    const clampedLead = Math.min(rivalLeadDist, 600);
    const rivalY = PLAYER_Y - 100 - (clampedLead / 600) * (PLAYER_Y - 180);
    drawRivalCar(ctx, RC_CX + rivalX, rivalY);
  }

  // ---- PLAYER CAR (fixed near bottom-centre, horizontal steering) ----
  drawPlayerCar(ctx, RC_CX + pX, PLAYER_Y);

  // ---- HIT FLASH ----
  if(hitFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${hitFlash/22*0.45})`;
    ctx.fillRect(0, 0, RC_W, RC_H);
    hitFlash--;
  }

  // ---- HUD ----
  const speedKMH = Math.min(Math.round(pSpeed * 0.85), 280);  // faster cap reflects new top speed
  const gapM     = Math.max(0, Math.round(rivalLeadDist));

  // Speed box (top-left)
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, 148, 42);
  ctx.fillStyle = '#ff9944';
  ctx.font = '28px "VT323", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`${speedKMH} KM/H`, 10, 30);

  // ---- DAMAGE / HP BAR (top-left, beneath speed) ----
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 42, 148, 18);
  ctx.fillStyle = '#222';
  ctx.fillRect(10, 47, 130, 8);
  // Bar fill — green when healthy, yellow at half, red when low
  const hpPct = Math.max(0, playerHP) / 100;
  const baseHpColor = hpPct > 0.6 ? '#44ee66' : hpPct > 0.3 ? '#ffcc22' : '#ee2222';
  // Flash bar bright white briefly when taking damage
  ctx.fillStyle = damageFlash > 12 ? '#ffffff' : baseHpColor;
  ctx.fillRect(10, 47, 130 * hpPct, 8);
  ctx.fillStyle = '#ddd';
  ctx.font = '14px "VT323", monospace';
  ctx.fillText(`HP ${Math.round(playerHP)}`, 12, 55);
  // Low-HP warning text
  if(hpPct < 0.3 && Math.floor(Date.now()/300)%2===0) {
    ctx.fillStyle = '#ff4444';
    ctx.font = '16px "VT323", monospace';
    ctx.textAlign = 'left';
    ctx.fillText('!! BLOWN GASKETS !!', 10, 78);
  }

  // Suburb label (top-centre)
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(RC_CX - 70, 0, 140, 22);
  ctx.fillStyle = '#ff660099';
  ctx.font = '18px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(currentSuburb || 'RACE', RC_CX, 17);

  // Gap box (top-right)
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(RC_W - 158, 0, 158, 42);
  ctx.fillStyle = gapM < 180 ? '#44ff88' : '#ff9944';
  ctx.font = '28px "VT323", monospace';
  ctx.textAlign = 'right';
  ctx.fillText(`GAP  ${gapM}M`, RC_W - 10, 30);
  ctx.textAlign = 'left';

  // Catching-up flash
  if(gapM < 200 && gapM > 0 && Math.floor(Date.now()/400)%2===0) {
    ctx.fillStyle = '#ffff44';
    ctx.font = '30px "VT323", monospace';
    ctx.textAlign = 'center';
    // Rival-aware catch flash
    const catchMsgByRival = {
      amg:         'CATCHING MOEY!',
      camry:       'CATCHING RAHUL!',
      silvia:      'CATCHING KHOA!',
      wrx:         'CATCHING THE WRX!',
      ranger: 'CATCHING MACCA!',
    };
    const catchMsg = catchMsgByRival[currentRival] || 'CATCHING UP!';
    ctx.fillText(catchMsg, RC_CX, 65);
    ctx.textAlign = 'left';
  }
}

// --- Race update ---
function updateRace(dt) {
  if(!raceActive || raceFinished) return;
  const dtS = dt / 1000;

  // ---- Player movement: faster paced ----
  // Max speed scales down a bit when damaged: at 0 HP capped at ~120
  // Per-race speedMult scales both the top and the accel so e.g. Moey's
  // Liverpool sprint feels genuinely faster (not just a tighter race).
  const damageCap = (200 + (playerHP / 100) * 140) * raceSpeedMult;  // 200..340 (or 290..493 in Liverpool)
  const targetSpeed = Math.min(340 * raceSpeedMult, damageCap);
  pSpeed = Math.min(pSpeed + (130 * raceSpeedMult) * dtS, targetSpeed);

  // Smooth lateral steering (tightened to feel snappier)
  const steerRate = 340; // px/s (was 260)
  pX = Math.max(-RC_ROAD_W/2 + PLAYER_CAR_W/2,
        Math.min(RC_ROAD_W/2 - PLAYER_CAR_W/2,
          pX + pSteer * steerRate * dtS));

  // Scroll world
  scrollY += pSpeed * dtS;

  // ---- RIVAL: dodges traffic instead of just drifting in a sine wave ----
  rivalDriftT += dtS;
  // Find any traffic ahead of (above) the rival within ~140 world units
  // and steer the rival away from blocking lanes.
  const rivalDistAhead = rivalLeadDist + 60; // rival's world distance ahead of player
  let dangerLaneX = null;
  for(const t of trafficList) {
    const gap = t.distAhead - rivalDistAhead;
    if(gap < 220 && gap > -40) {              // traffic just ahead of rival
      // Lane block: if the rival's current lane overlaps the traffic lane
      if(Math.abs(rivalX - t.laneX) < (t.w + 50) / 2) {
        dangerLaneX = t.laneX;
        break;
      }
    }
  }
  if(dangerLaneX != null) {
    // Steer AWAY from the danger: move rivalX toward whichever side has more room
    const targetX = dangerLaneX > 0 ? -RC_ROAD_W/3 : RC_ROAD_W/3;
    rivalX += (targetX - rivalX) * Math.min(1, dtS * 4.5);
  } else {
    // Soft idle drift centered on the road
    const idle = Math.sin(rivalDriftT * 0.5) * (RC_ROAD_W/6);
    rivalX += (idle - rivalX) * Math.min(1, dtS * 1.5);
  }
  // Clamp to road
  rivalX = Math.max(-RC_ROAD_W/2 + 35, Math.min(RC_ROAD_W/2 - 35, rivalX));

  // Close the gap when player is faster than rival
  const closeRate = Math.max(0, pSpeed - rivalSpeed) * dtS * 1.1;
  rivalLeadDist = Math.max(0, rivalLeadDist - closeRate);

  // ---- TRAFFIC SPAWNING (more dense for faster-paced racing) ----
  spawnCooldown -= dt;
  if(spawnCooldown <= 0) {
    const types = [
      {key:'traffic_camry_td', w:54, h:80},   // slightly tighter than draw size
      {key:'traffic_van_td',   w:60, h:96},
      {key:'traffic_ute_td',   w:54, h:80},
    ];
    const pick = types[Math.floor(Math.random()*types.length)];
    const laneIdx = Math.floor(Math.random() * RC_LANE_COUNT);
    const laneCentre = -RC_ROAD_W/2 + (laneIdx + 0.5) * RC_LANE_W;
    trafficList.push({
      laneX: laneCentre,
      distAhead: 650 + Math.random() * 200,
      spriteKey: pick.key,
      w: pick.w, h: pick.h,
      speed: 90 + Math.random() * 70,
    });
    // tighter spawn cadence at higher player speeds
    spawnCooldown = Math.max(400, 700 - pSpeed * 0.6) + Math.random() * 700;
  }

  // ---- Update traffic + collisions (TIGHTER hitboxes) ----
  const PLAYER_Y = RC_H - 50;
  // Shrink the collision hitbox by 12px each side for the player and
  // 8px for traffic — gives the player room to thread between cars.
  const COLL_MARGIN_PLAYER = 12;
  const COLL_MARGIN_TRAFFIC = 8;
  const playerLeft  = pX - PLAYER_CAR_W/2 + COLL_MARGIN_PLAYER;
  const playerRight = pX + PLAYER_CAR_W/2 - COLL_MARGIN_PLAYER;

  for(let i = trafficList.length - 1; i >= 0; i--) {
    const car = trafficList[i];
    car.distAhead -= (pSpeed - car.speed) * dtS;

    // Vertical proximity check tighter too (shrink the y collision window)
    const yWindow = (car.h + PLAYER_CAR_H) / 2 - 32;
    if(Math.abs(car.distAhead) < yWindow) {
      const cLeft  = car.laneX - car.w/2 + COLL_MARGIN_TRAFFIC;
      const cRight = car.laneX + car.w/2 - COLL_MARGIN_TRAFFIC;
      if(cLeft < playerRight && cRight > playerLeft) {
        // Hit! Apply damage + speed penalty proportional to impact severity
        const impactSpeed = Math.max(40, pSpeed - car.speed);
        const damage = Math.round(8 + impactSpeed * 0.06);
        playerHP    = Math.max(0, playerHP - damage);
        pSpeed      = Math.max(80, pSpeed - 90);
        hitFlash    = 22;
        damageFlash = 22;
        car.distAhead = -999; // remove
      }
    }
    if(car.distAhead < -200) trafficList.splice(i, 1);
  }

  // Damage tick visual decay
  if(damageFlash > 0) damageFlash--;

  // Win condition
  if(rivalLeadDist <= 0) { finishRace(true); return; }

  // Lose condition: out of HP (engine blown)
  if(playerHP <= 0) { finishRace(false); return; }

  // Time-limit fallback lose (90 seconds in race-time)
  if(scrollY > 90 * 320 && rivalLeadDist > 0) { finishRace(false); }
}

// --- Race loop ---
function raceLoop(ts) {
  if(!raceActive) return;
  const dt = _lastRaceTs ? Math.min(ts - _lastRaceTs, 40) : 16;
  _lastRaceTs = ts;
  updateRace(dt);
  drawRaceScene();
  raceRAF = requestAnimationFrame(raceLoop);
}

// --- Finish ---
function finishRace(playerWon) {
  if(raceFinished) return;
  raceActive   = false;
  raceFinished = true;
  cancelAnimationFrame(raceRAF);
  _lastRaceTs = null;

  const res = document.getElementById('race-result');
  res.style.display = 'flex';
  const loseMsgByRival = {
    amg:         'MOEY WINS!',
    camry:       'RAHUL WINS!',
    silvia:      'KHOA WINS!',
    wrx:         'WRX WINS!',
    ranger: 'MACCA WINS!',
  };
  res.textContent = playerWon ? 'YOU WIN!' : (loseMsgByRival[currentRival] || 'YOU LOSE');
  res.style.color   = playerWon ? '#44ff88' : '#ff4444';

  // Mark progress on win — the new order: Blacktown -> Parramatta -> Cabramatta -> Penrith -> Liverpool
  if(playerWon) {
    if(currentSuburb === 'BLACKTOWN')  gameProgress.blacktownBeaten  = true;
    if(currentSuburb === 'PARRAMATTA') gameProgress.parramattaBeaten = true;
    if(currentSuburb === 'CABRAMATTA') gameProgress.cabramattaBeaten = true;
    if(currentSuburb === 'PENRITH')    gameProgress.penrithBeaten    = true;
    if(currentSuburb === 'LIVERPOOL')  gameProgress.liverpoolBeaten  = true;
  }

  // Route post-race dialogue by SUBURB
  const postRaceMap = {
    BLACKTOWN:  { win:'bazza_post_win',  lose:'bazza_post_lose'  },  // Brenno
    PARRAMATTA: { win:'preet_post_win',  lose:'preet_post_lose'  },  // Preet @ Harris Park
    CABRAMATTA: { win:'khoa_post_win',   lose:'khoa_post_lose'   },  // Khoa @ Cabra
    PENRITH:    { win:'macca_post_win',  lose:'macca_post_lose'  },  // Macca
    LIVERPOOL:  { win:'habibi_post_win', lose:'habibi_post_lose' },  // Habibi (final)
  };
  const route   = postRaceMap[currentSuburb] || postRaceMap.BLACKTOWN;
  const dialogue = playerWon ? route.win : route.lose;
  setTimeout(() => gotoDialogue(dialogue), 2200);
}

// --- Entry point ---
function gotoRace(rival) {
  showScreen('race-screen');
  currentRival = rival;

  // Per-rival difficulty: starting gap, rival speed, and a speedMult that
  // scales BOTH player top speed AND rival speed (so the race actually feels
  // faster overall, not just harder). Liverpool's Moey is the final-boss
  // sprint at thick-Lebo-accent speed — 1.45x everything.
  const cfg = {
    wrx:    { gap: 520, speed: 280, speedMult: 1.0  }, // Blacktown — first race, medium
    camry:  { gap: 460, speed: 295, speedMult: 1.05 }, // Parramatta — Preet's sleeper, harder
    silvia: { gap: 420, speed: 305, speedMult: 1.10 }, // Cabramatta — drift S14
    ranger: { gap: 360, speed: 290, speedMult: 1.05 }, // Penrith — slow but wide
    amg:    { gap: 300, speed: 460, speedMult: 1.45 }, // Liverpool — Moey AGM, REALLY fast
  }[rival] || { gap: 520, speed: 280, speedMult: 1.0 };
  raceSpeedMult = cfg.speedMult || 1.0;

  pX = 0; pSteer = 0; pSpeed = 0; scrollY = 0;
  rivalLeadDist = cfg.gap;
  rivalX        = 0;
  rivalDriftT   = 0;
  rivalSpeed    = cfg.speed;
  trafficList   = []; spawnCooldown = 700;
  hitFlash      = 0;
  playerHP      = 100;       // full health at race start
  damageFlash   = 0;
  raceActive = false; raceFinished = false;
  _lastRaceTs = null;

  document.getElementById('countdown-display').style.display = 'flex';
  document.getElementById('race-result').style.display = 'none';
  drawRaceScene();

  // Touch controls
  const off = () => { pSteer = 0; };
  const btnL = document.getElementById('race-btn-l');
  const btnR = document.getElementById('race-btn-r');
  btnL.onpointerdown = () => pSteer = -1;
  btnL.onpointerup = btnL.onpointerleave = btnL.onpointercancel = off;
  btnR.onpointerdown = () => pSteer = 1;
  btnR.onpointerup = btnR.onpointerleave = btnR.onpointercancel = off;

  // Countdown 3-2-1-GO
  let count = 3;
  const cdEl = document.getElementById('countdown-display');
  cdEl.textContent = count;
  raceCountdown = setInterval(() => {
    count--;
    if(count > 0)       cdEl.textContent = count;
    else if(count === 0) cdEl.textContent = 'GO!';
    else {
      clearInterval(raceCountdown);
      cdEl.style.display = 'none';
      raceActive = true;
      raceRAF = requestAnimationFrame(raceLoop);
    }
  }, 900);
}


// =============================================
//  EASTERN CREEK DRAG RACE ENGINE
//  Side-by-side quarter-mile sprint. Tap-the-throttle mechanic.
//  Christmas tree countdown. Don't redlight. First to the line wins.
// =============================================
const DRAG_W = 390;
const DRAG_H = 724;
const DRAG_QM = 400;        // "quarter mile" in world units
const DRAG_LANE_LEFT  = 100;  // player lane x-centre
const DRAG_LANE_RIGHT = 280;  // cop lane x-centre

let dragActive = false, dragFinished = false, dragRAF = null;
let dragPhase = 'idle';     // 'tree' | 'racing' | 'done'
let dragTreeStep = 0;       // 0=off, 1=amber1, 2=amber2, 3=amber3, 4=GREEN
let dragTreeT = 0;          // seconds in current tree step
let dragPower = 0;          // player power 0..100 (decays without taps)
let dragSpeed = 0;          // player speed in m/s (current)
let dragDist  = 0;          // player distance travelled (m)
let dragCopSpeed = 0;       // cop speed
let dragCopDist  = 0;       // cop distance
let dragRedlight = false;
let dragLastTs = null;

function drawDrag(time) {
  const c = document.getElementById('drag-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- BACKDROP — Eastern Creek bg strip at top, then dragstrip below ----
  const bg = SPRITES.bg_easterncreek;
  if(bg) {
    // strip across the top 25%
    ctx.drawImage(bg, 0, 0, DRAG_W, Math.round(DRAG_H * 0.25));
  } else {
    ctx.fillStyle = '#0a0d18';
    ctx.fillRect(0, 0, DRAG_W, Math.round(DRAG_H * 0.25));
  }

  // ---- STRIP — vertical asphalt with two lanes ----
  // Strip from y=H*0.25 down to viewer
  const stripTop = Math.round(DRAG_H * 0.25);
  ctx.fillStyle = '#15151c';
  ctx.fillRect(0, stripTop, DRAG_W, DRAG_H - stripTop);

  // Two lanes — left lane (player) and right lane (cop)
  const laneW = 110;
  const stripCx = DRAG_W / 2;
  // Lane boundaries
  ctx.fillStyle = '#1c1c24';
  ctx.fillRect(DRAG_LANE_LEFT  - laneW/2, stripTop, laneW, DRAG_H - stripTop);
  ctx.fillRect(DRAG_LANE_RIGHT - laneW/2, stripTop, laneW, DRAG_H - stripTop);

  // Lane edge stripes (solid white)
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(DRAG_LANE_LEFT - laneW/2,      stripTop, 3, DRAG_H - stripTop);
  ctx.fillRect(DRAG_LANE_LEFT + laneW/2 - 3,  stripTop, 3, DRAG_H - stripTop);
  ctx.fillRect(DRAG_LANE_RIGHT - laneW/2,     stripTop, 3, DRAG_H - stripTop);
  ctx.fillRect(DRAG_LANE_RIGHT + laneW/2 - 3, stripTop, 3, DRAG_H - stripTop);

  // ---- SCROLLING LANE STRIPES (give the road real motion like the title) ----
  // Dashed yellow lines down the middle of each lane that scroll DOWNWARD
  // (toward viewer) as the cars accelerate. Speed proportional to scrollSpeed
  // so they accelerate naturally with the player's tap rhythm.
  const dashPeriod = 60, dashLen = 30;
  const scrollSpeed = (dragSpeed + dragCopSpeed) / 2 * 1.4;  // px/s averaged
  const stripeOff = ((time * 0.001 * scrollSpeed) % dashPeriod + dashPeriod) % dashPeriod;
  ctx.fillStyle = '#f0c020';
  for(let lx of [DRAG_LANE_LEFT, DRAG_LANE_RIGHT]) {
    for(let y = stripTop + stripeOff - dashPeriod; y < DRAG_H; y += dashPeriod) {
      ctx.fillRect(lx - 2, y, 4, dashLen);
    }
  }
  // Subtle warm glow halo behind the yellow dashes
  ctx.fillStyle = 'rgba(255,180,0,0.15)';
  for(let lx of [DRAG_LANE_LEFT, DRAG_LANE_RIGHT]) {
    for(let y = stripTop + stripeOff - dashPeriod; y < DRAG_H; y += dashPeriod) {
      ctx.fillRect(lx - 5, y, 10, dashLen);
    }
  }

  // ---- SIDE SCENERY — scrolling tyre marks / skidmark stains on the strip
  //      that race past as you accelerate ---------------------------------
  ctx.fillStyle = '#0c0c12';
  const skidPeriod = 110;
  const skidOff = ((time * 0.001 * scrollSpeed) % skidPeriod + skidPeriod) % skidPeriod;
  for(let y = stripTop + skidOff - skidPeriod; y < DRAG_H; y += skidPeriod) {
    // Pair of skid stripes at the lane edges
    ctx.fillRect(DRAG_LANE_LEFT - laneW/2 + 10, y, 4, 40);
    ctx.fillRect(DRAG_LANE_RIGHT + laneW/2 - 14, y, 4, 40);
  }

  // Lane numbers (drawn AFTER stripes so they sit on top)
  ctx.fillStyle = '#ffcc44';
  ctx.font = '40px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('1', DRAG_LANE_LEFT, stripTop + 50);
  ctx.fillText('2', DRAG_LANE_RIGHT, stripTop + 50);

  // ---- CHRISTMAS TREE STARTING LIGHTS (centre, just below the bg strip) ----
  const treeCx = DRAG_W / 2;
  const treeCy = stripTop + 110;
  ctx.fillStyle = '#0a0a10';
  ctx.fillRect(treeCx - 35, treeCy - 60, 70, 160);
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 2;
  ctx.strokeRect(treeCx - 35, treeCy - 60, 70, 160);
  // Amber bulbs (3) + green (1)
  const bulbs = [
    { y: treeCy - 40, on: dragTreeStep >= 1, color: '#ffaa00' },
    { y: treeCy,      on: dragTreeStep >= 2, color: '#ffaa00' },
    { y: treeCy + 40, on: dragTreeStep >= 3, color: '#ffaa00' },
    { y: treeCy + 80, on: dragTreeStep >= 4, color: '#22ee44' },
  ];
  bulbs.forEach(b => {
    ctx.fillStyle = b.on ? b.color : '#1a1a20';
    ctx.beginPath(); ctx.arc(treeCx, b.y, 12, 0, Math.PI*2); ctx.fill();
    if(b.on) {
      ctx.fillStyle = b.color + '55';
      ctx.beginPath(); ctx.arc(treeCx, b.y, 22, 0, Math.PI*2); ctx.fill();
    }
  });

  // ---- DISTANCE MARKERS ----
  const finishY = stripTop + 240;  // finish line near the top
  const startY  = DRAG_H - 90;     // start line near the bottom
  // Finish line — black-and-white chequer
  for(let x = 0; x < DRAG_W; x += 20) {
    ctx.fillStyle = (Math.floor(x/20) % 2 === 0) ? '#fff' : '#000';
    ctx.fillRect(x, finishY, 20, 6);
    ctx.fillStyle = (Math.floor(x/20) % 2 === 0) ? '#000' : '#fff';
    ctx.fillRect(x, finishY + 6, 20, 6);
  }
  // Start line
  ctx.fillStyle = '#ffcc44';
  ctx.fillRect(0, startY, DRAG_W, 4);

  // ---- CARS ----
  // Player car (left lane) — uses car_player top-down sprite frame 3 (north)
  const carPxY = startY - 30 - (dragDist / DRAG_QM) * (startY - finishY - 30);
  const carCxY = startY - 30 - (dragCopDist / DRAG_QM) * (startY - finishY - 30);
  // Player
  if(SPRITES.car_player) {
    const fw = SPRITES.car_player.width / 4;
    ctx.drawImage(SPRITES.car_player, fw*3, 0, fw, SPRITES.car_player.height,
                  DRAG_LANE_LEFT - 30, carPxY, 60, 90);
  } else {
    ctx.fillStyle = '#3377dd'; ctx.fillRect(DRAG_LANE_LEFT - 30, carPxY, 60, 90);
  }
  // Cop (right lane) — uses car_police top-down sprite frame 3 (north)
  if(SPRITES.car_police) {
    const fw = SPRITES.car_police.width / 4;
    ctx.drawImage(SPRITES.car_police, fw*3, 0, fw, SPRITES.car_police.height,
                  DRAG_LANE_RIGHT - 30, carCxY, 60, 90);
  } else {
    ctx.fillStyle = '#dddddd'; ctx.fillRect(DRAG_LANE_RIGHT - 30, carCxY, 60, 90);
    ctx.fillStyle = '#22aaee'; ctx.fillRect(DRAG_LANE_RIGHT - 30, carCxY, 60, 12);
  }

  // ---- HUD ----
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, DRAG_W, 36);
  ctx.fillStyle = '#ff9944';
  ctx.font = '20px "VT323", monospace';
  ctx.textAlign = 'left';
  const speedKMH = Math.round(dragSpeed * 3.6);
  ctx.fillText(`SPEED ${speedKMH} KM/H`, 8, 24);
  ctx.textAlign = 'right';
  ctx.fillText(`${Math.round(dragDist)}/${DRAG_QM}M`, DRAG_W - 8, 24);

  // Power bar (centre top)
  ctx.fillStyle = '#222';
  ctx.fillRect(treeCx - 60, 8, 120, 14);
  const pwrCol = dragPower > 70 ? '#ff4444' : dragPower > 40 ? '#ffcc22' : '#44ee66';
  ctx.fillStyle = pwrCol;
  ctx.fillRect(treeCx - 60, 8, 120 * (dragPower/100), 14);
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  ctx.strokeRect(treeCx - 60, 8, 120, 14);
  ctx.fillStyle = '#fff';
  ctx.font = '14px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('REVS', treeCx, 21);

  // Redlight warning
  if(dragRedlight) {
    ctx.fillStyle = '#ff0000aa';
    ctx.fillRect(0, 0, DRAG_W, DRAG_H);
    ctx.fillStyle = '#fff';
    ctx.font = '50px "VT323", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('REDLIGHT!', DRAG_W/2, DRAG_H/2);
  }
}

function updateDrag(dt) {
  if(!dragActive || dragFinished) return;
  const dtS = dt / 1000;

  // --- TREE phase ---
  if(dragPhase === 'tree') {
    dragTreeT += dtS;
    if(dragTreeT >= 0.55) {
      dragTreeT = 0;
      dragTreeStep++;
      if(dragTreeStep > 4) {
        dragPhase = 'racing';
      }
    }
  }

  // --- POWER decays unless tapped (handled by button) ---
  dragPower = Math.max(0, dragPower - 35 * dtS);

  // --- RACING phase: speed responds to power, distance accumulates ---
  if(dragPhase === 'racing') {
    // Speed target proportional to power. Top end ~80 m/s.
    const targetSpeed = dragPower * 0.85;
    dragSpeed += (targetSpeed - dragSpeed) * Math.min(1, dtS * 3);
    dragDist += dragSpeed * dtS;

    // Cop AI: target consistent ~65 m/s top with smooth ramp
    const copTarget = 65;
    dragCopSpeed += (copTarget - dragCopSpeed) * Math.min(1, dtS * 2);
    dragCopDist  += dragCopSpeed * dtS;

    // Finish check
    if(dragDist >= DRAG_QM) {
      finishDrag(true);
    } else if(dragCopDist >= DRAG_QM) {
      finishDrag(false);
    }
  }
}

function dragLoop(ts) {
  if(!dragActive) return;
  const dt = dragLastTs ? Math.min(ts - dragLastTs, 40) : 16;
  dragLastTs = ts;
  updateDrag(dt);
  drawDrag(ts);
  dragRAF = requestAnimationFrame(dragLoop);
}

function onDragThrottle() {
  if(!dragActive || dragFinished) return;
  // Tapping before GREEN = redlight
  if(dragPhase === 'tree' && dragTreeStep < 4) {
    dragRedlight = true;
    setTimeout(() => finishDrag(false), 1200);
    dragActive = false;
    return;
  }
  // Tap adds power (faster taps = more power)
  dragPower = Math.min(100, dragPower + 12);
}

function finishDrag(playerWon) {
  if(dragFinished) return;
  dragActive = false;
  dragFinished = true;
  cancelAnimationFrame(dragRAF);
  dragLastTs = null;

  const res = document.getElementById('drag-result');
  res.style.display = 'flex';
  res.textContent = dragRedlight ? 'REDLIGHT! YOU LOSE' : (playerWon ? 'YOU BEAT THE BLUE!' : 'SNOUT WINS!');
  res.style.color = playerWon && !dragRedlight ? '#44ff88' : '#ff4444';

  if(playerWon && !dragRedlight) {
    gameProgress.easterncreekBeaten = true;
  }

  setTimeout(() => {
    const dialogue = (playerWon && !dragRedlight) ? 'snout_post_win' : 'snout_post_lose';
    gotoDialogue(dialogue);
  }, 2400);
}

function gotoDrag() {
  showScreen('drag-screen');

  // Reset state
  dragActive = false; dragFinished = false;
  dragPhase = 'tree'; dragTreeStep = 0; dragTreeT = 0;
  dragPower = 0; dragSpeed = 0; dragDist = 0;
  dragCopSpeed = 0; dragCopDist = 0;
  dragRedlight = false;
  dragLastTs = null;

  // Hide result, show countdown reminder
  document.getElementById('drag-result').style.display = 'none';
  const cd = document.getElementById('drag-countdown');
  cd.style.display = 'flex';
  cd.textContent = 'STAGE UP';
  setTimeout(() => { cd.style.display = 'none'; }, 1200);

  // Wire throttle button
  const btn = document.getElementById('drag-throttle-btn');
  btn.onpointerdown = onDragThrottle;

  dragActive = true;
  dragRAF = requestAnimationFrame(dragLoop);
}


// =============================================
//  MACCA'S PENRITH HILL CLIMB
//  Side-scrolling 2D physics 4x4. Hold GAS to throttle, tap-and-hold BRAKE
//  to slow. Camera centred on Ranger with slight forward bias. Stay upright
//  over 45s / ~950m of off-road obstacles (logs, rocks, hay bales, fences,
//  sheep) and you win the bong from Macca. Flip past ±120° = fail.
// =============================================
const HILL_W = 390;
const HILL_H = 724;
const HILL_LEN          = 950;           // total course length in metres
const HILL_TOP_SPEED    = 26;            // m/s (~94 km/h)
const HILL_ACCEL        = 14;            // m/s^2 when GAS held (snappier)
const HILL_BRAKE_DECEL  = 22;            // m/s^2 when BRAKE held (firmer)
const HILL_GRAVITY      = 45;            // m/s^2 — heavier gravity = more dramatic air
const HILL_FLIP_ANGLE   = Math.PI * 0.55; // ≈100° from upright = busted (tighter)
const HILL_WHEELBASE    = 3.0;           // metres between front & rear axle
const HILL_RIDE_HEIGHT  = 0.7;           // metres from axle to body centre
const HILL_PIX_PER_M    = 18;            // world->screen scale (bumped — bigger Ranger)
const HILL_CAM_FWD_BIAS = 6;             // metres of look-ahead

// Hill state
let hillActive = false, hillFinished = false, hillRAF = null;
let hillLastTs = null;
let hillResult = null;             // 'win' | 'flip' | null
let hillStartAt = 0;               // ms timestamp when running started

// Vehicle (world space; y increases UPWARD)
let hillCarX = 0;
let hillCarY = 0;
let hillVx   = 0;
let hillVy   = 0;
let hillRot  = 0;                  // body angle (radians)
let hillAv   = 0;                  // angular velocity
let hillOnGround = true;

// Input
let hillGas = 0;                   // 0 or 1 from button hold
let hillBrake = 0;                 // 0 or 1 from button hold

// Procedurally generated obstacles (placed by seed once per run)
let hillObstacles = [];

// Each obstacle's physical profile — width and height of the bump it
// adds to the terrain. Wheels physically climb these instead of taking
// a kick from a fake "you hit it" event.
const HILL_OB_BUMP = {
  log:    { w: 0.65, h: 0.45 },  // round log — rolls over with rotation
  rock:   { w: 1.10, h: 0.85 },  // sharp boulder — needs commitment
  hay:    { w: 1.00, h: 0.55 },  // soft hay bale — squishes a bit
  fridge: { w: 0.70, h: 1.10 },  // tall fridge — easy to flip on
  fence:  { w: 0.30, h: 0.25 },  // small fence post — barely matters
  // sheep, finish — no terrain contribution
};

// Smooth terrain height function — sums of sines + per-segment features
// + obstacle bumps blended into the terrain so the wheels actually crawl
// over them. Cos-shaped bumps make a smooth ramp the wheels can climb.
function hillTerrain(x) {
  if(x < 0) x = 0;
  // Base smooth rolling hills
  let y = 6
        + 3.2 * Math.sin(x * 0.045)
        + 2.0 * Math.sin(x * 0.12 + 1.3)
        + 1.2 * Math.sin(x * 0.27 + 0.7);
  // Segment 1 (0..240): mellow paddock
  // Segment 2 (240..480): bumpier dirt track
  if(x > 240) y += 1.8 * Math.sin((x - 240) * 0.20 + 2.1);
  // Segment 3 (480..720): quarry — sharper bumps + a ramp
  if(x > 480) {
    y += 2.4 * Math.sin((x - 480) * 0.32);
    if(x > 560 && x < 600) y += (x - 560) * 0.18;
    if(x >= 600 && x < 640) y += (640 - x) * 0.10;
  }
  // Segment 4 (720..900): canal — big drop then ramp up to finish
  if(x > 720 && x < 760) y -= (x - 720) * 0.20;
  if(x >= 760 && x < 820) y += (x - 760) * 0.18;
  if(x >= 820 && x < 900) y += 1.5 * Math.sin((x - 820) * 0.10);
  // Obstacle bumps — each obstacle adds a smooth raised section to the
  // terrain so the front + rear wheels physically climb over it one at
  // a time. Hit ones (sheep already scattered, hay flattened) skip.
  if(typeof hillObstacles !== 'undefined' && hillObstacles) {
    for(const ob of hillObstacles) {
      const prof = HILL_OB_BUMP[ob.type];
      if(!prof) continue;
      // Hay bales squish flat once driven over; logs/rocks/fridges
      // stay as terrain (until you've moved past, they're still there)
      if(ob.hit && (ob.type === 'hay' || ob.type === 'fence')) continue;
      const dx = x - ob.x;
      if(Math.abs(dx) >= prof.w) continue;
      // Smooth cosine bump — flat top with rounded sides
      const tt = dx / prof.w;          // -1..+1
      const bump = prof.h * Math.cos(tt * Math.PI/2);
      y += bump;
    }
  }
  return y;
}

// Deterministic obstacle placement
function hillBuildCourse() {
  hillObstacles = [];
  // Segment 1 — paddock (sheep + fence post)
  hillObstacles.push({x:  80, type:'sheep'});
  hillObstacles.push({x: 130, type:'fence'});
  hillObstacles.push({x: 190, type:'sheep'});
  // Segment 2 — dirt track (logs + hay bales)
  hillObstacles.push({x: 270, type:'log'});
  hillObstacles.push({x: 320, type:'hay'});
  hillObstacles.push({x: 370, type:'log'});
  hillObstacles.push({x: 430, type:'hay'});
  // Segment 3 — quarry (rocks + fridge)
  hillObstacles.push({x: 500, type:'rock'});
  hillObstacles.push({x: 540, type:'fridge'});
  hillObstacles.push({x: 620, type:'rock'});
  hillObstacles.push({x: 680, type:'rock'});
  // Segment 4 — canal jump (no obstacles, just the gap)
  hillObstacles.push({x: 900, type:'finish'});
}

function gotoHill() {
  showScreen('hill-screen');
  hillActive = false; hillFinished = false; hillResult = null;
  hillCarX = 2; hillCarY = hillTerrain(2) + HILL_RIDE_HEIGHT;
  hillVx = 0; hillVy = 0;
  hillRot = 0; hillAv = 0;
  hillOnGround = true;
  hillGas = 0; hillBrake = 0;
  hillLastTs = null;
  hillBuildCourse();

  document.getElementById('hill-result').style.display = 'none';
  const cd = document.getElementById('hill-countdown');
  cd.style.display = 'flex';
  cd.textContent = "MACCA'S PENRITH RUN";
  setTimeout(() => { cd.textContent = '3'; }, 800);
  setTimeout(() => { cd.textContent = '2'; }, 1500);
  setTimeout(() => { cd.textContent = '1'; }, 2200);
  setTimeout(() => { cd.textContent = 'GO!'; }, 2900);
  setTimeout(() => {
    cd.style.display = 'none';
    hillActive = true;
    hillStartAt = performance.now();
    hillRAF = requestAnimationFrame(hillLoop);
  }, 3500);

  // Wire buttons (hold to apply)
  const gasBtn = document.getElementById('hill-gas-btn');
  const brakeBtn = document.getElementById('hill-brake-btn');
  const setGas = (v) => { hillGas = v; };
  const setBrake = (v) => { hillBrake = v; };
  gasBtn.onpointerdown = () => setGas(1);
  gasBtn.onpointerup = gasBtn.onpointerleave = gasBtn.onpointercancel = () => setGas(0);
  brakeBtn.onpointerdown = () => setBrake(1);
  brakeBtn.onpointerup = brakeBtn.onpointerleave = brakeBtn.onpointercancel = () => setBrake(0);
}

function hillLoop(ts) {
  if(!hillActive) return;
  if(hillLastTs === null) hillLastTs = ts;
  const dt = Math.min(0.040, (ts - hillLastTs) / 1000);  // cap dt
  hillLastTs = ts;

  if(!hillFinished) hillTick(dt);
  drawHill(ts);

  if(!hillFinished) hillRAF = requestAnimationFrame(hillLoop);
}

function hillTick(dt) {
  // ---- INPUT → driving forces ----
  if(hillGas)   hillVx += HILL_ACCEL * dt;
  if(hillBrake) hillVx -= HILL_BRAKE_DECEL * dt;
  // Idle drag (small)
  hillVx -= 0.4 * hillVx * dt;
  // Clamp
  if(hillVx < -6)  hillVx = -6;
  if(hillVx > HILL_TOP_SPEED) hillVx = HILL_TOP_SPEED;

  // ---- GRAVITY ----
  hillVy -= HILL_GRAVITY * dt;

  // ---- POSITION INTEGRATION ----
  hillCarX += hillVx * dt;
  hillCarY += hillVy * dt;

  // ---- WHEEL POSITIONS (in world coords) ----
  // Front and rear wheels are HILL_WHEELBASE/2 apart, rotated by hillRot.
  const half = HILL_WHEELBASE / 2;
  const cosR = Math.cos(hillRot);
  const sinR = Math.sin(hillRot);
  const frontWX = hillCarX + cosR * half;
  const rearWX  = hillCarX - cosR * half;
  const frontWY = hillCarY + sinR * half - HILL_RIDE_HEIGHT;
  const rearWY  = hillCarY - sinR * half - HILL_RIDE_HEIGHT;

  // Sample terrain at front + rear wheel x positions
  const frontGroundY = hillTerrain(frontWX);
  const rearGroundY  = hillTerrain(rearWX);

  // ---- GROUND COLLISION + ROTATION ALIGNMENT ----
  const frontPen = frontGroundY - frontWY;
  const rearPen  = rearGroundY  - rearWY;
  const onGround = (frontPen > -0.05) || (rearPen > -0.05);
  hillOnGround = onGround;

  if(onGround) {
    // Lift the car body so the lower wheel sits on its terrain. Front +
    // rear wheels each independently sit on their LOCAL terrain height
    // (which includes obstacle bumps), so the chassis tilts naturally
    // as the truck crawls over things — front goes up the rock first,
    // rear is still on the dirt, body pitches up. Then rear climbs and
    // body levels off. Real rock-crawler behaviour.
    const avgPen = (Math.max(0, frontPen) + Math.max(0, rearPen)) / 2;
    hillCarY += avgPen;
    if(hillVy < 0) hillVy = 0;
    // Target rotation: angle of the line between the two wheel contact pts
    const groundSlope = Math.atan2(frontGroundY - rearGroundY, HILL_WHEELBASE);
    // Speed-aware chassis spring — locks tight at crawl, lags at speed
    // (so slow careful driving feels glued to terrain, fast driving
    // launches off bumps with momentum).
    const speedFactor = Math.min(1, Math.abs(hillVx) / 14);
    const blendRate = 9 - speedFactor * 5;   // 9 (crawl) → 4 (fast)
    const blend = Math.min(1, dt * blendRate);
    hillRot = hillRot * (1 - blend) + groundSlope * blend;
    hillAv  = hillAv * (1 - blend * 0.6);
    // Uphill rolling resistance — climbing a steep bump drags you down
    if(groundSlope > 0) hillVx -= groundSlope * 6 * dt;
    // Bump-induced pitch impulse — when one wheel is up a bump and the
    // other isn't, the wheel-height gap kicks angular velocity. Scales
    // with speed (faster = bigger kick) so committing to a rock at full
    // throttle launches the front end up.
    const wheelGap = frontGroundY - rearGroundY;
    if(Math.abs(wheelGap) > 0.5 && Math.abs(hillVx) > 3) {
      hillAv += wheelGap * 0.4 * dt * Math.max(1, Math.abs(hillVx) / 5);
    }
    // Soft obstacles flatten once the wheels have driven over them
    for(const ob of hillObstacles) {
      if(ob.hit) continue;
      if((ob.type === 'hay' || ob.type === 'fence') && Math.abs(hillCarX - ob.x) < 0.5) {
        ob.hit = true;
      }
    }
  } else {
    // Airborne — input torque from gas/brake (wheelie / nose-dive)
    if(hillGas)   hillAv += 3.5 * dt;
    if(hillBrake) hillAv -= 3.5 * dt;
    hillAv *= (1 - 0.15 * dt);
    hillRot += hillAv * dt;
  }

  // ---- OBSTACLE EVENT TRIGGERS ----
  // Solid obstacles (log/rock/fridge) are part of the terrain bump profile —
  // wheels physically climb them. Only sheep (scatter) and finish line
  // (win condition) need explicit event triggers here.
  for(const ob of hillObstacles) {
    if(ob.hit) continue;
    if(ob.type === 'sheep' && Math.abs(hillCarX - ob.x) < 2.5) {
      ob.hit = true;  // bleat + scatter (visual only)
    } else if(ob.type === 'finish' && hillCarX >= ob.x) {
      ob.hit = true;
      hillFinished = true;
      hillResult = 'win';
      showHillResult('win');
    }
  }

  // ---- FLIP CHECK ----
  // Normalise rotation to -PI..PI
  while(hillRot >  Math.PI) hillRot -= Math.PI * 2;
  while(hillRot < -Math.PI) hillRot += Math.PI * 2;
  if(Math.abs(hillRot) > HILL_FLIP_ANGLE) {
    hillFinished = true;
    hillResult = 'flip';
    showHillResult('flip');
  }

  // ---- TIMEOUT (45s soft limit) ----
  const elapsedS = (performance.now() - hillStartAt) / 1000;
  if(!hillFinished && elapsedS > 50 && hillCarX < HILL_LEN * 0.7) {
    hillFinished = true;
    hillResult = 'bogged';
    showHillResult('bogged');
  }
}

function drawHill(time) {
  const c = document.getElementById('hill-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- CAMERA (centred on Ranger with slight forward bias) ----
  const camWorldX = hillCarX + HILL_CAM_FWD_BIAS;
  const camScreenX = HILL_W * 0.45;
  // Vertical camera tracks the car's Y (with a smoothed lag)
  const camWorldY = hillCarY + 4;
  const camScreenY = HILL_H * 0.62;
  const w2sX = (wx) => camScreenX + (wx - camWorldX) * HILL_PIX_PER_M;
  const w2sY = (wy) => camScreenY - (wy - camWorldY) * HILL_PIX_PER_M;

  // ---- SKY (matches the dusk colours of the bg_penrith_hill strip so the
  //          whole canvas blends together — no black gaps) ----
  // Source bg dominant colours: deep purple top (#2b1840), magenta mid
  // (#5a2a4a), pink-orange horizon (#a04860 → #c87850).
  const sky = ctx.createLinearGradient(0, 0, 0, HILL_H);
  sky.addColorStop(0.00, '#2b1840');   // deep night purple (top)
  sky.addColorStop(0.30, '#3b1f4d');   // purple
  sky.addColorStop(0.55, '#5a2a4a');   // dusk magenta
  sky.addColorStop(0.62, '#a04860');   // horizon pink-orange
  sky.addColorStop(0.78, '#3a1c2a');   // tinted underglow
  sky.addColorStop(0.85, '#2a1018');   // dark dusk fade into terrain
  sky.addColorStop(1.00, '#1a0a14');   // matches the terrain top colour band
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, HILL_W, HILL_H);

  // ---- PARALLAX FAR HILLS ----
  // Prefer the PixelLab landscape strip if loaded; otherwise procedural
  // Blue Mountains silhouette + procedural Panthers floodlights.
  const hillBg = SPRITES['bg_penrith_hill'];
  if(hillBg) {
    // Tileable horizontal strip — position it so it BUTTS UP against the
    // horizon glow above and the terrain top below, no black gaps.
    const stripH = HILL_H * 0.55;
    const stripY = HILL_H * 0.10;
    const parallaxOff = ((hillCarX * 8) % 400 + 400) % 400;
    ctx.drawImage(hillBg, -parallaxOff, stripY, 400, stripH);
    ctx.drawImage(hillBg, 400 - parallaxOff, stripY, 400, stripH);
    // Soft fade at the bottom of the strip into the terrain below
    const fade = ctx.createLinearGradient(0, stripY + stripH - 40, 0, stripY + stripH + 20);
    fade.addColorStop(0, 'rgba(26,10,20,0)');
    fade.addColorStop(1, 'rgba(26,10,20,1)');
    ctx.fillStyle = fade;
    ctx.fillRect(0, stripY + stripH - 40, HILL_W, 60);
  } else {
    // Distant Blue Mountains silhouette (procedural fallback)
    const farScroll = (hillCarX * 0.6) % 400;
    ctx.fillStyle = '#1a1a2c';
    ctx.beginPath();
    ctx.moveTo(0, HILL_H * 0.55);
    for(let x = 0; x <= HILL_W; x += 10) {
      const wx = x + farScroll;
      const yMnt = HILL_H * 0.55 - (15 + 18*Math.sin(wx*0.013) + 10*Math.sin(wx*0.04+1.1));
      ctx.lineTo(x, yMnt);
    }
    ctx.lineTo(HILL_W, HILL_H);
    ctx.lineTo(0, HILL_H);
    ctx.closePath();
    ctx.fill();

    // Distant Panthers stadium lights (4 vertical streaks)
    ctx.fillStyle = 'rgba(255,200,80,0.40)';
    for(let i = 0; i < 4; i++) {
      const lx = (i * 80 + 60 - (hillCarX * 0.6) % 80);
      ctx.fillRect(lx, HILL_H * 0.42, 2, 36);
      ctx.fillStyle = 'rgba(255,220,120,0.85)';
      ctx.fillRect(lx-1, HILL_H * 0.42, 4, 4);
      ctx.fillStyle = 'rgba(255,200,80,0.40)';
    }
  }

  // ---- TERRAIN (foreground polyline) ----
  // Sample world x from cam - 14m to cam + 14m at 0.5m increments
  ctx.fillStyle = '#3a2818';  // dirt brown
  ctx.beginPath();
  const xStart = camWorldX - 14;
  const xEnd   = camWorldX + 14;
  ctx.moveTo(w2sX(xStart), HILL_H + 10);
  for(let wx = xStart; wx <= xEnd; wx += 0.3) {
    const wy = hillTerrain(wx);
    ctx.lineTo(w2sX(wx), w2sY(wy));
  }
  ctx.lineTo(w2sX(xEnd), HILL_H + 10);
  ctx.closePath();
  ctx.fill();

  // Grass top stripe
  ctx.strokeStyle = '#4a6018';
  ctx.lineWidth = 4;
  ctx.beginPath();
  for(let wx = xStart; wx <= xEnd; wx += 0.3) {
    const wy = hillTerrain(wx);
    const sx = w2sX(wx), sy = w2sY(wy);
    if(wx === xStart) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.stroke();

  // Distance markers (every 100m)
  ctx.fillStyle = 'rgba(255,200,80,0.55)';
  ctx.font = '12px "VT323", monospace';
  for(let m = 100; m <= 900; m += 100) {
    if(m < xStart || m > xEnd) continue;
    const sx = w2sX(m);
    const sy = w2sY(hillTerrain(m));
    ctx.fillRect(sx - 1, sy - 28, 2, 24);
    ctx.fillText(m + 'm', sx - 12, sy - 32);
  }

  // ---- OBSTACLES ----
  for(const ob of hillObstacles) {
    if(ob.x < xStart - 3 || ob.x > xEnd + 3) continue;
    const sx = w2sX(ob.x);
    const groundY = hillTerrain(ob.x);
    const sy = w2sY(groundY);
    drawHillObstacle(ctx, ob, sx, sy);
  }

  // ---- THE RANGER ----
  const carScreenX = w2sX(hillCarX);
  const carScreenY = w2sY(hillCarY);
  const rangerImg = SPRITES['car_ranger_side'];
  // Display size: bigger Ranger (~2.2x wheelbase). The PixelLab sprite faces
  // LEFT (nose pointing west) but the car drives RIGHT (east) — so flip the
  // x-axis after the rotate so the nose points in direction of travel.
  const carPxW = HILL_WHEELBASE * HILL_PIX_PER_M * 2.2;
  const carPxH = carPxW * 0.55;
  ctx.save();
  ctx.translate(carScreenX, carScreenY);
  ctx.rotate(-hillRot);   // canvas Y is flipped, so invert sign
  ctx.scale(-1, 1);       // flip horizontally so the Ranger's nose faces east
  if(rangerImg) {
    ctx.drawImage(rangerImg, -carPxW/2, -carPxH/2, carPxW, carPxH);
  } else {
    // Procedural Ranger silhouette
    ctx.fillStyle = '#4a3018';
    ctx.fillRect(-carPxW/2, -carPxH/2, carPxW, carPxH * 0.8);
    ctx.fillStyle = '#1a1a1f';
    ctx.beginPath();
    ctx.arc(-carPxW*0.30, carPxH*0.40, carPxH*0.30, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.arc( carPxW*0.30, carPxH*0.40, carPxH*0.30, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // Smoke / dust trail when on ground + moving
  if(hillOnGround && hillVx > 4) {
    for(let i = 0; i < 4; i++) {
      const off = i * 6 + (time * 0.04) % 6;
      ctx.fillStyle = `rgba(170,140,100,${0.30 - i*0.06})`;
      ctx.beginPath();
      ctx.arc(carScreenX - carPxW*0.5 - off, carScreenY + carPxH*0.3, 5 + i*1.2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // ---- HUD ----
  // Progress bar at top
  const pct = Math.max(0, Math.min(1, hillCarX / HILL_LEN));
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(20, 10, HILL_W - 40, 16);
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(22, 12, (HILL_W - 44) * pct, 12);
  ctx.strokeStyle = '#88661acc';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(20, 10, HILL_W - 40, 16);
  ctx.fillStyle = '#ffaa33';
  ctx.font = '14px "VT323", monospace';
  ctx.textAlign = 'right';
  const kmh = Math.round(Math.max(0, hillVx) * 3.6);
  ctx.fillText(`${kmh} km/h`, HILL_W - 20, 42);
  ctx.textAlign = 'left';
  ctx.fillText(`${Math.round(hillCarX)}m / ${HILL_LEN}m`, 20, 42);
}

function drawHillObstacle(ctx, ob, sx, sy) {
  switch(ob.type) {
    case 'log': {
      ctx.fillStyle = '#5a3318';
      ctx.beginPath();
      ctx.ellipse(sx, sy - 8, 14, 8, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#3a1f0a';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Bark rings
      ctx.strokeStyle = '#7a4a28';
      ctx.beginPath();
      ctx.ellipse(sx - 6, sy - 8, 4, 5, 0, 0, Math.PI*2);
      ctx.stroke();
      break;
    }
    case 'rock': {
      ctx.fillStyle = '#6a6258';
      ctx.beginPath();
      ctx.moveTo(sx - 14, sy);
      ctx.lineTo(sx - 8, sy - 14);
      ctx.lineTo(sx + 4, sy - 16);
      ctx.lineTo(sx + 14, sy - 8);
      ctx.lineTo(sx + 10, sy);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3a3830';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      break;
    }
    case 'hay': {
      ctx.fillStyle = '#c8a44a';
      ctx.fillRect(sx - 14, sy - 18, 28, 18);
      ctx.strokeStyle = '#7a5a18';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx - 14, sy - 18, 28, 18);
      // Hay strands
      ctx.strokeStyle = '#8a6a1a';
      ctx.beginPath();
      for(let i = 0; i < 5; i++) {
        ctx.moveTo(sx - 12 + i*6, sy - 18);
        ctx.lineTo(sx - 12 + i*6, sy);
      }
      ctx.stroke();
      break;
    }
    case 'fence': {
      ctx.fillStyle = '#3a2818';
      ctx.fillRect(sx - 2, sy - 22, 4, 22);
      ctx.fillRect(sx - 12, sy - 16, 24, 2);
      ctx.fillRect(sx - 12, sy - 8,  24, 2);
      break;
    }
    case 'fridge': {
      ctx.fillStyle = '#d8d4ca';
      ctx.fillRect(sx - 10, sy - 28, 20, 28);
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx - 10, sy - 28, 20, 28);
      // Handle
      ctx.fillStyle = '#888';
      ctx.fillRect(sx + 6, sy - 22, 2, 8);
      // Door split
      ctx.fillStyle = '#888';
      ctx.fillRect(sx - 10, sy - 14, 20, 1);
      break;
    }
    case 'sheep': {
      // Scatters when "hit" — just don't draw
      if(ob.hit) return;
      ctx.fillStyle = '#e0dccc';
      ctx.beginPath();
      ctx.ellipse(sx, sy - 8, 10, 7, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(sx + 8, sy - 9, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillRect(sx - 8, sy - 1, 2, 3);
      ctx.fillRect(sx + 6, sy - 1, 2, 3);
      break;
    }
    case 'finish': {
      // Chequered flag pole
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(sx - 1, sy - 50, 2, 50);
      // Flag (8x8 chequer pattern)
      for(let r = 0; r < 4; r++) for(let cc = 0; cc < 4; cc++) {
        ctx.fillStyle = ((r + cc) % 2 === 0) ? '#fff' : '#000';
        ctx.fillRect(sx + 1 + cc*5, sy - 50 + r*5, 5, 5);
      }
      // FINISH banner
      ctx.fillStyle = '#ff8800';
      ctx.font = '12px "VT323", monospace';
      ctx.textAlign = 'center';
      ctx.fillText('FINISH', sx, sy - 56);
      ctx.textAlign = 'left';
      break;
    }
  }
}

function showHillResult(kind) {
  const el = document.getElementById('hill-result');
  el.style.display = 'flex';
  const title  = (kind === 'win')    ? "MADE IT TO MACCAS"
               : (kind === 'flip')   ? "ON YA ROOF"
               : (kind === 'bogged') ? "BOGGED!"
               : "FAILED";
  const sub    = (kind === 'win')    ? "Sharon's got the McChickens. Brett hands over the double perc."
               : (kind === 'flip')   ? "Wheels up in a paddock. Have another crack — the Ranjer's tough."
               : (kind === 'bogged') ? "Stuck in the dry creek bed. Hit retry and gun it harder."
               : "";
  const colour = (kind === 'win') ? '#ffaa33' : '#ff5544';
  // Losing screens show both RETRY (re-launch the hill climb) and GIVE UP
  // (back to Macca dialogue). Winning shows only CONTINUE.
  const buttonsHtml = (kind === 'win')
    ? `<button class="restart-btn" id="hill-continue-btn">[ CONTINUE ]</button>`
    : `<div style="display:flex; gap:14px;">
         <button class="restart-btn" id="hill-retry-btn">[ RETRY ]</button>
         <button class="restart-btn" id="hill-quit-btn" style="background:rgba(80,80,90,0.15); border-color:#555; color:#aaa;">[ GIVE UP ]</button>
       </div>`;
  el.innerHTML = `
    <div style="font-size:42px; color:${colour}; text-shadow:0 0 24px ${colour}88; margin-bottom:18px;">${title}</div>
    <div style="font-size:16px; color:#ffd17a; margin-bottom:34px; text-align:center; padding:0 30px;">${sub}</div>
    ${buttonsHtml}
  `;
  setTimeout(() => {
    const cont = document.getElementById('hill-continue-btn');
    if(cont) cont.onclick = () => {
      gotoDialogue('macca_post_win');
      gameProgress.penrithBeaten = true;
    };
    const retry = document.getElementById('hill-retry-btn');
    if(retry) retry.onclick = () => {
      // Hide the result overlay and re-launch the hill climb in place
      el.style.display = 'none';
      // Stop any pending animation frame from the previous run
      if(hillRAF) { cancelAnimationFrame(hillRAF); hillRAF = null; }
      gotoHill();
    };
    const quit = document.getElementById('hill-quit-btn');
    if(quit) quit.onclick = () => gotoDialogue('macca_post_lose');
  }, 0);
}


// =============================================
//  KHOA'S CABRA CARPARK STEALTH DEAL
//  Top-down Maccas carpark. Khoa hands you the ongbay through the
//  window. A cop car circles the lot with a side-facing spotlight that
//  sweeps the carpark interior. Tap the action button when the spotlight
//  is NOT on you to advance through 3 QTEs:
//    1) PEEK BAG  2) SNIFF TEST  3) HAND CASH
//  Tap while lit = BUSTED. Let too many cop loops pass = Khoa walks.
// =============================================
const SESH_W = 390;
const SESH_H = 724;
// Carpark playfield (the interior the cop circles around). The cop
// drives on the perimeter just OUTSIDE this rect.
const SESH_PF_X = 30;
const SESH_PF_Y = 60;
const SESH_PF_W = 330;
const SESH_PF_H = 380;
// Player + Khoa parked side-by-side in the middle-bottom of the field
const SESH_PLAYER_CAR = { cx: 150, cy: 350, w: 60, h: 100 };
const SESH_KHOA_CAR   = { cx: 220, cy: 350, w: 60, h: 100 };
// Cop loop timing — speeds up after each QTE completes
const SESH_LOOP_SECS = [8, 6.5, 5];  // index = current QTE step — tighter loops
// Cone tuning. Wider + reaches further now, with a scan wobble that
// sweeps the beam back and forth while the cop drives.
const SESH_BEAM_LEN          = 290;          // base beam reach (was 220)
const SESH_BEAM_HALF_ANG     = Math.PI * 0.42; // ≈75° half (cone 150°, was 70°)
const SESH_BEAM_SWEEP_AMP    = Math.PI * 0.12; // ±22° wobble
const SESH_BEAM_SWEEP_SECS   = 1.6;          // full sweep period
const SESH_QTE_LABELS = ['PEEK BAG', 'SNIFF TEST', 'HAND CASH'];

// State
let seshActive = false, seshFinished = false, seshRAF = null;
let seshLastTs = null;
let seshCopT = 0;            // 0..1 along perimeter
let seshStep = 0;            // 0..2 current QTE
let seshPatience = 3;
let seshLoopsCompleted = 0;
let seshResult = null;       // 'win' | 'bust' | 'walked'
let seshFlashT = 0;          // brief feedback flash after a tap
let seshFlashKind = null;    // 'good' | 'bad'

function gotoSesh() {
  showScreen('sesh-screen');
  seshActive = false; seshFinished = false; seshResult = null;
  seshCopT = 0;
  seshStep = 0;
  seshPatience = 3;
  seshLoopsCompleted = 0;
  seshFlashT = 0;
  seshLastTs = null;

  document.getElementById('sesh-result').style.display = 'none';
  const cd = document.getElementById('sesh-countdown');
  cd.style.display = 'flex';
  cd.innerHTML = "CABRA MACCAS CARPARK<br><br>" +
                 "<span style='font-size:14px; color:#ccddee'>" +
                 "Tap when the spotlight isn't on you.<br>" +
                 "3 transactions. Don't get nicked.</span>";
  setTimeout(() => { cd.innerHTML = 'WAIT FOR IT...'; }, 1800);
  setTimeout(() => { cd.innerHTML = 'GO'; cd.style.fontSize = '60px'; }, 3000);
  setTimeout(() => {
    cd.style.display = 'none';
    cd.style.fontSize = '';
    seshActive = true;
    seshRAF = requestAnimationFrame(seshLoop);
  }, 3700);

  // Wire action button (tap to advance current QTE)
  const btn = document.getElementById('sesh-action-btn');
  btn.textContent = SESH_QTE_LABELS[0];
  btn.classList.remove('danger');
  btn.onpointerdown = onSeshTap;
}

function seshLoop(ts) {
  if(!seshActive) return;
  if(seshLastTs === null) seshLastTs = ts;
  const dt = Math.min(0.05, (ts - seshLastTs) / 1000);
  seshLastTs = ts;

  if(!seshFinished) seshTick(dt);
  drawSesh(ts);

  if(!seshFinished) seshRAF = requestAnimationFrame(seshLoop);
}

function seshTick(dt) {
  // Advance cop position along the perimeter
  const loopSecs = SESH_LOOP_SECS[Math.min(seshStep, SESH_LOOP_SECS.length-1)];
  const prevT = seshCopT;
  seshCopT = (seshCopT + dt / loopSecs) % 1;
  // Detect loop wrap (one full pass without progress)
  if(prevT > 0.95 && seshCopT < 0.05) {
    seshLoopsCompleted++;
    seshPatience--;
    if(seshPatience <= 0) {
      seshFinished = true;
      seshResult = 'walked';
      showSeshResult('walked');
    }
  }
  // Decay flash
  if(seshFlashT > 0) seshFlashT = Math.max(0, seshFlashT - dt);

  // Update button visuals based on whether tap right now would be safe
  const armed = !seshCopLightOnPlayer();
  const btn = document.getElementById('sesh-action-btn');
  if(btn && !seshFinished) {
    btn.classList.toggle('armed', armed);
    btn.classList.toggle('danger', !armed);
  }
}

// Compute cop position + heading from seshCopT
function seshCopPose() {
  // Perimeter loop: a rectangle just outside the playfield
  const margin = 24;
  const x0 = SESH_PF_X - margin, y0 = SESH_PF_Y - margin;
  const x1 = SESH_PF_X + SESH_PF_W + margin, y1 = SESH_PF_Y + SESH_PF_H + margin;
  const w = x1 - x0, h = y1 - y0;
  const perim = 2 * (w + h);
  const d = seshCopT * perim;
  let cx, cy, heading;
  if(d < w) {                            // top edge L->R
    cx = x0 + d;       cy = y0;          heading = 0;            // facing east
  } else if(d < w + h) {                 // right edge T->B
    cx = x1;           cy = y0 + (d-w);  heading = Math.PI/2;    // facing south
  } else if(d < 2*w + h) {               // bottom edge R->L
    cx = x1 - (d-w-h); cy = y1;          heading = Math.PI;      // facing west
  } else {                               // left edge B->T
    cx = x0;           cy = y1 - (d-2*w-h); heading = -Math.PI/2; // facing north
  }
  return { cx, cy, heading };
}

// Beam direction = perpendicular-to-heading (right-mounted spotlight) +
// a slow back-and-forth scan wobble so the cone visibly sweeps even when
// the cop is driving straight. Returned in radians.
function seshBeamAngle() {
  const pose = seshCopPose();
  const t = (performance.now() / 1000) / SESH_BEAM_SWEEP_SECS;
  const sweep = Math.sin(t * Math.PI * 2) * SESH_BEAM_SWEEP_AMP;
  return pose.heading + Math.PI/2 + sweep;
}

// Cop side-spotlight — wider + reaches further now, with a sweep wobble.
function seshCopLightOnPlayer() {
  const pose = seshCopPose();
  const beamAng = seshBeamAngle();
  const beamX = Math.cos(beamAng), beamY = Math.sin(beamAng);
  const dx = SESH_PLAYER_CAR.cx - pose.cx;
  const dy = SESH_PLAYER_CAR.cy - pose.cy;
  const dist = Math.hypot(dx, dy);
  if(dist > SESH_BEAM_LEN) return false;
  const cosAng = (dx * beamX + dy * beamY) / Math.max(0.01, dist);
  // Cone half-angle threshold
  return cosAng > Math.cos(SESH_BEAM_HALF_ANG);
}

function onSeshTap() {
  if(!seshActive || seshFinished) return;
  const armed = !seshCopLightOnPlayer();
  if(!armed) {
    // BUSTED
    seshFinished = true;
    seshResult = 'bust';
    seshFlashT = 0.6; seshFlashKind = 'bad';
    showSeshResult('bust');
    return;
  }
  // Advance QTE
  seshFlashT = 0.6; seshFlashKind = 'good';
  seshStep++;
  if(seshStep >= 3) {
    seshFinished = true;
    seshResult = 'win';
    showSeshResult('win');
    return;
  }
  // Update button label for the next QTE
  const btn = document.getElementById('sesh-action-btn');
  if(btn) btn.textContent = SESH_QTE_LABELS[seshStep];
}

function drawSesh(time) {
  const c = document.getElementById('sesh-canvas');
  if(!c) return;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- BACKDROP — Cabra carpark tarmac at night ----
  ctx.fillStyle = '#0a0a0d';
  ctx.fillRect(0, 0, SESH_W, SESH_H);

  // Maccas building silhouette across the top
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(0, 0, SESH_W, 50);
  // Yellow arches glow
  ctx.fillStyle = 'rgba(255,200,0,0.30)';
  ctx.beginPath();
  ctx.arc(SESH_W/2 - 12, 30, 18, Math.PI, 0); ctx.fill();
  ctx.beginPath();
  ctx.arc(SESH_W/2 + 12, 30, 18, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#ffcc00';
  ctx.font = '14px "VT323", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('MACCAS DRIVE-THRU', SESH_W/2, 48);
  ctx.textAlign = 'left';

  // Playfield (carpark tarmac)
  ctx.fillStyle = '#15171c';
  ctx.fillRect(SESH_PF_X, SESH_PF_Y, SESH_PF_W, SESH_PF_H);

  // Painted parking bay lines (rows of 'L' shape lines)
  ctx.strokeStyle = '#fff7';
  ctx.lineWidth = 2;
  const bayW = 50, bayH = 80;
  for(let r = 0; r < 4; r++) {
    for(let cc = 0; cc < 6; cc++) {
      const bx = SESH_PF_X + 15 + cc * (bayW + 4);
      const by = SESH_PF_Y + 20 + r * (bayH + 12);
      if(bx + bayW > SESH_PF_X + SESH_PF_W - 10) continue;
      ctx.beginPath();
      ctx.moveTo(bx, by); ctx.lineTo(bx, by + bayH);
      ctx.moveTo(bx + bayW, by); ctx.lineTo(bx + bayW, by + bayH);
      ctx.stroke();
    }
  }

  // ---- DRIVING LANE (perimeter the cop circles) ----
  // Subtle darker tarmac ring around the playfield to show the cop's lane
  ctx.strokeStyle = '#0a0a0d';
  ctx.lineWidth = 26;
  ctx.strokeRect(SESH_PF_X - 13, SESH_PF_Y - 13, SESH_PF_W + 26, SESH_PF_H + 26);
  // Lane edge stripes
  ctx.strokeStyle = '#ffcc0044';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(SESH_PF_X - 2, SESH_PF_Y - 2, SESH_PF_W + 4, SESH_PF_H + 4);

  // Lamp pole pools of warm light at the corners
  const lampSpots = [
    [SESH_PF_X + 12,            SESH_PF_Y + 12],
    [SESH_PF_X + SESH_PF_W - 12, SESH_PF_Y + 12],
    [SESH_PF_X + 12,            SESH_PF_Y + SESH_PF_H - 12],
    [SESH_PF_X + SESH_PF_W - 12, SESH_PF_Y + SESH_PF_H - 12],
  ];
  for(const [lx, ly] of lampSpots) {
    const g = ctx.createRadialGradient(lx, ly, 4, lx, ly, 60);
    g.addColorStop(0, 'rgba(255,200,80,0.30)');
    g.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(lx, ly, 60, 0, Math.PI*2); ctx.fill();
    // Pole
    ctx.fillStyle = '#222';
    ctx.fillRect(lx - 1, ly - 4, 2, 8);
  }

  // ---- PLAYER + KHOA cars (top-down sprites) ----
  // Khoa first (passenger side), then player so player draws on top
  const khoaCar   = SPRITES['car_silvia'];
  const playerCar = SPRITES['car_player'];
  if(khoaCar) {
    // frame 3 (north-facing, index 3 of 4-frame sheet)
    const fw = khoaCar.width / 4;
    ctx.drawImage(khoaCar, fw*3, 0, fw, khoaCar.height,
      SESH_KHOA_CAR.cx - SESH_KHOA_CAR.w/2,
      SESH_KHOA_CAR.cy - SESH_KHOA_CAR.h/2,
      SESH_KHOA_CAR.w, SESH_KHOA_CAR.h);
  } else {
    ctx.fillStyle = '#e0e0e0';
    ctx.fillRect(SESH_KHOA_CAR.cx - 30, SESH_KHOA_CAR.cy - 50, 60, 100);
  }
  if(playerCar) {
    const fw = playerCar.width / 4;
    ctx.drawImage(playerCar, fw*3, 0, fw, playerCar.height,
      SESH_PLAYER_CAR.cx - SESH_PLAYER_CAR.w/2,
      SESH_PLAYER_CAR.cy - SESH_PLAYER_CAR.h/2,
      SESH_PLAYER_CAR.w, SESH_PLAYER_CAR.h);
  } else {
    ctx.fillStyle = '#2244aa';
    ctx.fillRect(SESH_PLAYER_CAR.cx - 30, SESH_PLAYER_CAR.cy - 50, 60, 100);
  }

  // ---- COP CAR (top-down, rotated by heading) ----
  const pose = seshCopPose();
  const copImg = SPRITES['car_police'];
  ctx.save();
  ctx.translate(pose.cx, pose.cy);
  // Sprite frames face N (3), E (0), S (2), W (1). Pick frame matching
  // heading. heading: 0=E, π/2=S, π=W, -π/2=N.
  let frameIdx;
  if(Math.abs(pose.heading) < 0.1) frameIdx = 0;           // east
  else if(pose.heading > 0.1 && pose.heading < Math.PI/2 + 0.1) frameIdx = 2; // south
  else if(pose.heading >= Math.PI/2 + 0.1) frameIdx = 1;   // west
  else frameIdx = 3;                                       // north
  if(copImg) {
    const fw = copImg.width / 4;
    ctx.drawImage(copImg, fw * frameIdx, 0, fw, copImg.height,
      -30, -22, 60, 44);
  } else {
    // Procedural fallback
    ctx.fillStyle = '#fff';
    ctx.fillRect(-22, -16, 44, 32);
    ctx.fillStyle = '#2266ff';
    ctx.fillRect(-22, -16, 44, 8);
    ctx.fillRect(-22, 8, 44, 8);
    ctx.fillStyle = '#1133aa';
    ctx.fillRect(-8, -4, 16, 6);  // lightbar
  }
  ctx.restore();

  // ---- SPOTLIGHT CONE — wider, longer reach, sweeps back and forth ----
  const beamAng = seshBeamAngle();
  const beamLen = SESH_BEAM_LEN;
  const beamHalfAng = SESH_BEAM_HALF_ANG;
  const onPlayer = seshCopLightOnPlayer();
  const beamColor = onPlayer ? 'rgba(255,80,60,' : 'rgba(255,220,120,';
  const grad = ctx.createRadialGradient(pose.cx, pose.cy, 10, pose.cx, pose.cy, beamLen);
  grad.addColorStop(0,    beamColor + (onPlayer ? '0.65' : '0.50') + ')');
  grad.addColorStop(0.7,  beamColor + (onPlayer ? '0.35' : '0.20') + ')');
  grad.addColorStop(1,    beamColor + '0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(pose.cx, pose.cy);
  ctx.arc(pose.cx, pose.cy, beamLen, beamAng - beamHalfAng, beamAng + beamHalfAng);
  ctx.closePath();
  ctx.fill();
  // Bright core stripe in the centre of the sweep
  ctx.strokeStyle = beamColor + '0.85)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(pose.cx, pose.cy);
  ctx.lineTo(pose.cx + Math.cos(beamAng) * beamLen, pose.cy + Math.sin(beamAng) * beamLen);
  ctx.stroke();

  // ---- KHOA leaning out window (mini char sprite over Khoa's car) ----
  const khoaChar = SPRITES['char_khoa'];
  if(khoaChar) {
    const fw = khoaChar.width / 4;
    // Frame 1 = west-facing (toward player car), at the driver's window
    ctx.drawImage(khoaChar, fw*1, 0, fw, khoaChar.height,
      SESH_KHOA_CAR.cx - 16, SESH_KHOA_CAR.cy - 26, 28, 36);
  }

  // ---- HUD ----
  // Stars (QTE progress) top-left
  ctx.font = '24px "VT323", monospace';
  ctx.textAlign = 'left';
  for(let i = 0; i < 3; i++) {
    ctx.fillStyle = (i < seshStep) ? '#ffcc44' : '#33333a';
    ctx.fillText('★', 14 + i * 22, SESH_H - 174);
  }
  // Patience (hearts) top-right
  ctx.textAlign = 'right';
  for(let i = 0; i < 3; i++) {
    ctx.fillStyle = (i < seshPatience) ? '#ff5566' : '#33333a';
    ctx.fillText('♥', SESH_W - 14 - (2 - i) * 22, SESH_H - 174);
  }
  ctx.textAlign = 'left';

  // Current QTE label hint (above button area)
  ctx.fillStyle = onPlayer ? '#ff7766' : '#88ccff';
  ctx.font = '20px "VT323", monospace';
  ctx.textAlign = 'center';
  const hint = onPlayer ? 'COP\'S WATCHIN\'!' : 'NOW — TAP IT';
  ctx.fillText(hint, SESH_W/2, SESH_H - 144);
  ctx.textAlign = 'left';

  // Flash overlay on good/bad tap
  if(seshFlashT > 0) {
    const a = seshFlashT * 0.6;
    ctx.fillStyle = (seshFlashKind === 'good')
      ? `rgba(60,220,90,${a})`
      : `rgba(220,40,40,${a})`;
    ctx.fillRect(0, 0, SESH_W, SESH_H);
  }
}

function showSeshResult(kind) {
  const el = document.getElementById('sesh-result');
  el.style.display = 'flex';
  const title = (kind === 'win')    ? "GOT THE ONGBAY"
              : (kind === 'bust')   ? "BUSTED"
              : (kind === 'walked') ? "KHOA WALKED"
              : "FAILED";
  const sub   = (kind === 'win')    ? "Khoa slaps the dash. Penrith next bro."
              : (kind === 'bust')   ? "Pig saw the deal. Bag back in the boot."
              : (kind === 'walked') ? "Khoa's patience ran out. 'Make up your mind bro.'"
              : "";
  const colour = (kind === 'win') ? '#66ee77' : '#ff5544';
  el.innerHTML = `
    <div style="font-size:42px; color:${colour}; text-shadow:0 0 24px ${colour}88; margin-bottom:18px; text-align:center;">${title}</div>
    <div style="font-size:16px; color:#ccddee; margin-bottom:34px; text-align:center; padding:0 30px;">${sub}</div>
    <button class="restart-btn" id="sesh-continue-btn">[ CONTINUE ]</button>
  `;
  setTimeout(() => {
    const btn = document.getElementById('sesh-continue-btn');
    if(btn) btn.onclick = () => {
      const dialogue = (kind === 'win') ? 'khoa_post_win' : 'khoa_post_lose';
      if(kind === 'win') gameProgress.cabramattaBeaten = true;
      gotoDialogue(dialogue);
    };
  }, 0);
}


// =============================================
//  TITLE-SCREEN HAND-DRAWN CITY (top half)
//  Real-time canvas animation. Night sky + twinkling stars + city
//  skyline silhouette with lit windows + horizon glow. Same coordinate
//  system as the road below so the two halves blend seamlessly.
// =============================================
const TC_W = 390;
const TC_H = 422;

// Pre-built city skyline geometry (deterministic so it doesn't reshuffle
// every frame). Building x, w, h, palette index.
const TC_BUILDINGS = (() => {
  // 22 buildings spanning the full width, varying heights, deterministic seed
  const arr = [];
  const seed = (n) => { const x = Math.sin(n * 12.9898) * 43758.5453; return x - Math.floor(x); };
  let x = -5;
  for(let i = 0; i < 22 && x < TC_W + 5; i++) {
    const w = 18 + Math.floor(seed(i * 3) * 38);
    // Skyline shape: taller in mid, shorter on sides
    const heightBias = 1 - Math.abs((x + w/2) / TC_W - 0.5) * 1.4;
    const h = Math.max(60, Math.round(120 + seed(i*5) * 130 * heightBias));
    arr.push({
      x, w, h,
      shade: Math.floor(seed(i*7) * 4),         // 0..3 palette tone
      hasNeon: seed(i*11) > 0.6,                // some have a neon sign
      neonColor: seed(i*13) > 0.5 ? 'pink' : 'orange',
    });
    x += w + Math.floor(seed(i*9) * 4 + 1);
  }
  return arr;
})();

// 80 deterministic stars
const TC_STARS = (() => {
  const arr = [];
  const seed = (n) => { const x = Math.sin(n * 78.233) * 43758.5453; return x - Math.floor(x); };
  for(let i = 0; i < 80; i++) {
    arr.push({
      x: Math.floor(seed(i*2) * TC_W),
      y: Math.floor(seed(i*2+1) * TC_H * 0.55),
      baseBright: 0.4 + seed(i*3) * 0.5,
      twinkleSpeed: 0.5 + seed(i*5) * 2.0,
      twinklePhase: seed(i*7) * Math.PI * 2,
    });
  }
  return arr;
})();

// Pre-built window grid per building, deterministic. Generated lazily.
const TC_WINDOWS = (() => {
  const arr = [];
  const seed = (n) => { const x = Math.sin(n * 53.789) * 43758.5453; return x - Math.floor(x); };
  TC_BUILDINGS.forEach((b, bi) => {
    const cols = Math.max(2, Math.floor(b.w / 7));
    const rows = Math.max(3, Math.floor(b.h / 9));
    const winColW = (b.w - 6) / cols;
    const winRowH = (b.h - 8) / rows;
    for(let r = 0; r < rows; r++) {
      for(let c = 0; c < cols; c++) {
        if(seed(bi*100 + r*10 + c) < 0.55) {
          arr.push({
            bi,
            wx: b.x + 3 + c * winColW + winColW * 0.2,
            // building base sits at TC_H, so window y is TC_H - building height + offset
            wy: TC_H - b.h + 4 + r * winRowH + winRowH * 0.2,
            wSize: 2,
            // twinkle: a few flicker, most are static
            flicker: seed(bi*200 + r*7 + c) < 0.18,
            flickerSpeed: 1 + seed(bi*201 + r*11 + c) * 3,
            flickerPhase: seed(bi*203 + r*5 + c) * Math.PI * 2,
            // warm yellow/orange variance
            hue: seed(bi*205 + r*3 + c),
          });
        }
      }
    }
  });
  return arr;
})();

let _titleCityRAF = null;

function drawTitleCity(time) {
  const canvas = document.getElementById('title-city-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- SKY GRADIENT ----
  const sky = ctx.createLinearGradient(0, 0, 0, TC_H);
  sky.addColorStop(0,   '#050714');
  sky.addColorStop(0.4, '#0a0f24');
  sky.addColorStop(0.85,'#1a1530');
  sky.addColorStop(1,   '#2a1530'); // warm tint near horizon
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, TC_W, TC_H);

  // ---- STARS (twinkling) ----
  const tSec = time / 1000;
  TC_STARS.forEach(s => {
    const flicker = 0.5 + 0.5 * Math.sin(tSec * s.twinkleSpeed + s.twinklePhase);
    const bright = s.baseBright * (0.55 + 0.45 * flicker);
    ctx.fillStyle = `rgba(255,255,${220 + Math.floor(flicker*35)},${bright.toFixed(2)})`;
    ctx.fillRect(s.x, s.y, 2, 2);
  });

  // ---- DISTANT MOON (top right) ----
  ctx.fillStyle = 'rgba(255,255,230,0.85)';
  ctx.beginPath(); ctx.arc(330, 50, 14, 0, Math.PI*2); ctx.fill();
  // Crescent shadow
  ctx.fillStyle = sky.startsWith ? '#0a0f24' : '#0a0f24';
  ctx.beginPath(); ctx.arc(335, 47, 12, 0, Math.PI*2); ctx.fill();
  // Moon glow halo
  const moonGlow = ctx.createRadialGradient(330, 50, 0, 330, 50, 60);
  moonGlow.addColorStop(0, 'rgba(255,255,210,0.18)');
  moonGlow.addColorStop(1, 'rgba(255,255,210,0)');
  ctx.fillStyle = moonGlow;
  ctx.fillRect(270, 0, 120, 110);

  // ---- BUILDING SILHOUETTES ----
  const palette = ['#0a0d1c', '#0e1226', '#101633', '#0c1024'];
  TC_BUILDINGS.forEach(b => {
    ctx.fillStyle = palette[b.shade];
    ctx.fillRect(b.x, TC_H - b.h, b.w, b.h);
    // Roof line (slightly darker top edge for definition)
    ctx.fillStyle = '#04060f';
    ctx.fillRect(b.x, TC_H - b.h, b.w, 1);
    // Some buildings have a rooftop antenna/water tank
    if(b.shade === 1 && b.w > 30) {
      ctx.fillStyle = '#04060f';
      ctx.fillRect(b.x + b.w/2 - 1, TC_H - b.h - 7, 2, 7);  // antenna
      ctx.fillRect(b.x + b.w/2 - 4, TC_H - b.h - 4, 8, 3); // tank
    }
  });

  // ---- BUILDING WINDOWS (with sparse twinkle) ----
  TC_WINDOWS.forEach(w => {
    const base = w.hue;
    // Warm orange yellow window light
    const r = 255;
    const g = 160 + Math.floor(base * 70);
    const bb = 40 + Math.floor(base * 50);
    let bright = 0.75;
    if(w.flicker) {
      const f = 0.5 + 0.5 * Math.sin(tSec * w.flickerSpeed + w.flickerPhase);
      bright = 0.4 + f * 0.55;
    }
    ctx.fillStyle = `rgba(${r},${g},${bb},${bright.toFixed(2)})`;
    ctx.fillRect(Math.floor(w.wx), Math.floor(w.wy), w.wSize, w.wSize);
  });

  // ---- NEON ROOFTOP SIGNS (on some buildings) ----
  TC_BUILDINGS.forEach((b, bi) => {
    if(!b.hasNeon || b.w < 28) return;
    const ny = TC_H - b.h - 11;
    const nx = b.x + 4;
    const nw = b.w - 8;
    // Neon "sign" — pulse with time
    const pulse = 0.7 + 0.3 * Math.sin(tSec * 1.2 + bi);
    if(b.neonColor === 'pink') {
      ctx.fillStyle = `rgba(255,80,180,${pulse.toFixed(2)})`;
    } else {
      ctx.fillStyle = `rgba(255,140,40,${pulse.toFixed(2)})`;
    }
    ctx.fillRect(nx, ny, nw, 3);
    // Glow halo
    const glowCol = b.neonColor === 'pink'
      ? `rgba(255,80,180,${(pulse * 0.25).toFixed(2)})`
      : `rgba(255,140,40,${(pulse * 0.25).toFixed(2)})`;
    ctx.fillStyle = glowCol;
    ctx.fillRect(nx - 4, ny - 3, nw + 8, 9);
  });

  // ---- HORIZON GLOW BAND (bottom of canvas, blends into the road above) ----
  const glow = ctx.createLinearGradient(0, TC_H - 60, 0, TC_H);
  glow.addColorStop(0,   'rgba(255,140,40,0)');
  glow.addColorStop(0.6, 'rgba(255,140,40,0.18)');
  glow.addColorStop(1,   'rgba(255,140,40,0.45)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, TC_H - 60, TC_W, 60);

  // ---- BOTTOM EDGE BAND: very low silhouette of foreground rooftops that
  //      meets the road canvas below (creates the visual handshake) ----
  // Mirrors the same warm/dark tones as the road's distant building band
  const fgBuildings = [
    {x: -2, w: 22, h: 18}, {x: 18, w: 30, h: 24}, {x: 46, w: 18, h: 12},
    {x: 64, w: 28, h: 20}, {x: 90, w: 24, h: 16}, {x: 110, w: 20, h: 12},
    {x: 130, w: 28, h: 22}, {x: 156, w: 18, h: 10}, {x: 172, w: 12, h: 6},
    {x: 188, w: 14, h: 8}, {x: 200, w: 14, h: 6}, {x: 216, w: 18, h: 10},
    {x: 232, w: 28, h: 20}, {x: 258, w: 22, h: 16}, {x: 278, w: 26, h: 22},
    {x: 302, w: 18, h: 12}, {x: 318, w: 30, h: 24}, {x: 348, w: 22, h: 18},
    {x: 368, w: 26, h: 22}
  ];
  fgBuildings.forEach((b, i) => {
    ctx.fillStyle = '#08091a';
    ctx.fillRect(b.x, TC_H - b.h, b.w, b.h);
    // A few warm lit windows on the foreground band
    if((i * 7) % 3 !== 0 && b.w > 14) {
      const fy = TC_H - b.h + 4;
      const fr = 0.3 + 0.7 * ((i * 31) % 100) / 100;
      ctx.fillStyle = `rgba(255,${150 + i*5 % 80},${60 + i*7 % 40},${(0.5 + fr * 0.5).toFixed(2)})`;
      ctx.fillRect(b.x + 4, fy, 2, 2);
      if(b.w > 22) ctx.fillRect(b.x + b.w - 6, fy + 4, 2, 2);
    }
  });
}

function titleCityLoop(ts) {
  if(currentScreen !== 'title-screen') {
    _titleCityRAF = null;
    return;
  }
  drawTitleCity(ts);
  _titleCityRAF = requestAnimationFrame(titleCityLoop);
}

function startTitleCityAnim() {
  if(_titleCityRAF != null) return;
  _titleCityRAF = requestAnimationFrame(titleCityLoop);
}


// =============================================
//  TITLE-SCREEN HAND-DRAWN PERSPECTIVE ROAD
//  Real-time canvas animation. Perspective road narrowing to a vanishing
//  point at the top, with scrolling lane lines giving the illusion of
//  forward motion. Pure hand-drawn pixel art — no PixelLab, no GIF.
// =============================================
const TR_W = 390;       // title road canvas width (matches CSS scale)
const TR_H = 422;       // canvas height (bottom half of 844 title screen)
const TR_VP_X = TR_W / 2;
const TR_ROAD_HALF_BOTTOM = 195; // road half-width at bottom edge (full)

let _titleRoadRAF = null;

function drawTitleRoad(time) {
  const canvas = document.getElementById('title-road-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // ---- BACKDROP (under the road perspective) ----
  // Gradient from horizon dusk down to dark roadside ground
  const grad = ctx.createLinearGradient(0, 0, 0, TR_H);
  grad.addColorStop(0,   '#0a0d1e');
  grad.addColorStop(0.15,'#101524');
  grad.addColorStop(1,   '#0a0a14');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, TR_W, TR_H);

  // Subtle horizon glow band right at the join with the city
  const glow = ctx.createLinearGradient(0, 0, 0, 28);
  glow.addColorStop(0, 'rgba(255,140,40,0.30)');
  glow.addColorStop(1, 'rgba(255,140,40,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, TR_W, 28);

  // ---- ROAD (scanline-by-scanline perspective) ----
  // For each canvas Y, compute road half-width using inverse-depth mapping.
  // World scrolls toward viewer => scrollZ grows with time, dashes move down.
  const scrollZ = time * 0.18;
  const MIN_T = 0.02; // start drawing road just below horizon

  for(let y = 0; y < TR_H; y++) {
    // Linear perspective: t=0 at horizon, t=1 at the bottom (closest)
    const t = y / TR_H;
    if(t < MIN_T) continue;

    const halfW = TR_ROAD_HALF_BOTTOM * t;
    const left  = TR_VP_X - halfW;
    const right = TR_VP_X + halfW;

    // Synthetic "depth": closer pixels have smaller depth values
    // Higher depth (= further away at the top) cycles slower per pixel
    const depth = 1 / Math.max(0.001, t) * 30; // 1500 at top → 30 at bottom
    const worldZ = scrollZ + depth;

    // Asphalt with subtle scanline shade banding (gives forward-motion feel)
    const shade = Math.floor(worldZ / 14) % 2;
    ctx.fillStyle = shade ? '#262630' : '#22222a';
    ctx.fillRect(Math.floor(left), y, Math.ceil(right - left), 1);

    // Solid white edge stripes (scaled by perspective so they taper to horizon)
    const edgeW = Math.max(1, Math.round(halfW * 0.025));
    ctx.fillStyle = '#e8e8e8';
    ctx.fillRect(Math.floor(left), y, edgeW, 1);
    ctx.fillRect(Math.floor(right - edgeW), y, edgeW, 1);

    // Dashed white lane dividers (between same-direction lanes)
    // 4 lanes total -> divider at x = ±halfW/2
    const dashCycle = Math.floor(worldZ / 22) % 2;
    if(dashCycle === 0 && halfW > 10) {
      const dW = Math.max(1, Math.round(halfW * 0.018));
      ctx.fillStyle = '#c8c8c8';
      ctx.fillRect(Math.floor(TR_VP_X - halfW * 0.5 - dW/2), y, dW, 1);
      ctx.fillRect(Math.floor(TR_VP_X + halfW * 0.5 - dW/2), y, dW, 1);
    }

    // Yellow centre dashed line (slightly offset cycle so it leads the eye)
    const yCycle = Math.floor((worldZ + 11) / 18) % 2;
    if(yCycle === 0 && halfW > 6) {
      const cW = Math.max(1, Math.round(halfW * 0.030));
      // Soft glow halo first
      ctx.fillStyle = 'rgba(255,180,0,0.20)';
      ctx.fillRect(Math.floor(TR_VP_X - cW), y, cW * 2, 1);
      // Bright yellow dash on top
      ctx.fillStyle = '#f0c020';
      ctx.fillRect(Math.floor(TR_VP_X - cW/2), y, cW, 1);
    }
  }

  // ---- ROADSIDE ANIMATED ELEMENTS (above & around the road) ----
  // First line of distant buildings at the horizon — bridges the city
  // skyline GIF above into the road perspective. Static, drawn behind
  // the roadside items + distant traffic.
  drawHorizonBuildings(ctx);

  // Hand-drawn power-line poles flanking the road, scrolling past
  // in perspective with wires draping between consecutive poles.
  drawRoadsideItems(ctx, scrollZ);

  // Distant flowing car lights along the horizon edge of the road
  // — gives the impression of far-away traffic
  drawDistantTraffic(ctx, scrollZ);

  // Very soft vignette darken only at the extreme left/right (not over the road)
  const vig = ctx.createLinearGradient(0, 0, TR_W, 0);
  vig.addColorStop(0,    'rgba(0,0,0,0.45)');
  vig.addColorStop(0.04, 'rgba(0,0,0,0)');
  vig.addColorStop(0.96, 'rgba(0,0,0,0)');
  vig.addColorStop(1,    'rgba(0,0,0,0.45)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, TR_W, TR_H);
}

// --- Hand-drawn pixel art roadside item rendering ---
// Every slot is a telephone pole. Wires drape between consecutive poles
// to create a continuous power line that recedes to the horizon.
const RSIDE_NUM_SLOTS  = 8;
const RSIDE_SLOT_GAP   = 1 / RSIDE_NUM_SLOTS; // depth gap (normalized 0..1)
const RSIDE_SCROLL_K   = 0.00018;             // tuned so items flow with road

function drawRoadsideItems(ctx, scrollZ) {
  const phase = (scrollZ * RSIDE_SCROLL_K) % RSIDE_SLOT_GAP;
  for(let side = -1; side <= 1; side += 2) {
    // Pass 1: collect visible pole positions for this side
    const poles = [];
    for(let i = 0; i < RSIDE_NUM_SLOTS; i++) {
      let d = i * RSIDE_SLOT_GAP + RSIDE_SLOT_GAP - phase;
      if(d <= 0.02 || d >= 1.0) continue;
      const t = 1 - d;            // y param: 1 at bottom (close), 0 at top
      const screenY = TR_H * t;
      const halfW   = TR_ROAD_HALF_BOTTOM * t;
      const itemX   = TR_VP_X + side * (halfW + 6 * t + 4);
      const scale   = Math.max(0.15, t * 0.95);
      const poleH   = Math.round(72 * scale);
      poles.push({ x: itemX, y: screenY, scale, side, top: screenY - poleH });
    }

    // Pass 2: drape wires between consecutive poles (drawn behind the poles).
    // Two cross-arms per pole, so two parallel wires connecting each pair.
    if(poles.length >= 2) {
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      // Upper wire and lower wire heights as offsets from pole top
      const armOffsets = [6, 14];
      armOffsets.forEach(armOff => {
        for(let i = 0; i < poles.length - 1; i++) {
          const a = poles[i];
          const b = poles[i + 1];
          // Use the average scale for the wire's slight sag
          const sag = Math.round(2 * (a.scale + b.scale) * 0.5);
          const yA = a.top + Math.round(armOff * a.scale);
          const yB = b.top + Math.round(armOff * b.scale);
          const midY = (yA + yB) / 2 + sag;
          ctx.moveTo(a.x, yA);
          ctx.quadraticCurveTo((a.x + b.x) / 2, midY, b.x, yB);
        }
      });
      ctx.stroke();
    }

    // Pass 3: draw all the poles on top of the wires
    poles.forEach(p => drawPixelTelephonePole(ctx, p.x, p.y, p.scale, p.side));
  }
}

// Distant building silhouettes at the very top of the road canvas — the
// "first line of buildings" that the city skyline GIF above blends down into.
// Drawn once per frame (static, no scroll), procedural pixel art.
function drawHorizonBuildings(ctx) {
  // Layout: a row of small dark building tops with lit windows. They get
